// ══ SCRATCH TASK ══
let _scratchTask=null,_scratchProg=0,_scratchSide=1,_scratchFlashes=[],_scratchRaf=null,_scratchListener=null;

function drawClaw(ctx,cx,cy,mirror,alpha){
  // 4 diagonal claw marks, top-left to bottom-right
  const claws=[
    {ox:-80,oy:-110, ex:10,  ey:110,  ctrl:[{x:-50,y:-20},{x:30,y:40}]},
    {ox:-35,oy:-120, ex:50,  ey:100,  ctrl:[{x:-5, y:-30},{x:70,y:30}]},
    {ox: 15,oy:-115, ex:95,  ey:95,   ctrl:[{x:40, y:-25},{x:110,y:25}]},
    {ox: 65,oy:-110, ex:140, ey:90,   ctrl:[{x:90, y:-20},{x:155,y:20}]},
  ];
  ctx.save();
  ctx.translate(cx,cy);
  if(mirror)ctx.scale(-1,1);
  ctx.globalAlpha=alpha;
  claws.forEach((c,i)=>{
    const w=Math.max(1,7-i*0.8);
    ctx.beginPath();
    ctx.moveTo(c.ox,c.oy);
    ctx.bezierCurveTo(c.ctrl[0].x,c.ctrl[0].y,c.ctrl[1].x,c.ctrl[1].y,c.ex,c.ey);
    // outer glow
    ctx.shadowColor='#ff0000';ctx.shadowBlur=18;
    ctx.strokeStyle=`rgb(255,${30+i*15},0)`;
    ctx.lineWidth=w+4;ctx.lineCap='round';
    ctx.globalAlpha=alpha*0.35;ctx.stroke();
    // inner bright
    ctx.globalAlpha=alpha;
    ctx.strokeStyle=`rgb(255,${80+i*20},${i*10})`;
    ctx.lineWidth=w;ctx.stroke();
    ctx.shadowBlur=0;
  });
  ctx.restore();
}

function drawScratchPost(ctx,W,H){
  const pw=W*0.28, cx=W/2;
  // base platform
  const bh=H*0.06, by=H*0.90;
  ctx.fillStyle='#5c3a10';
  ctx.beginPath();
  ctx.ellipse(cx,by+bh*0.5,pw*0.7,bh*0.5,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#7a4e1c';
  ctx.fillRect(cx-pw*0.65,by,pw*1.3,bh*0.5);
  // rope-wrapped pole
  const poleTop=H*0.10, poleH=H*0.80;
  const rw=pw*0.38;
  // base pole color
  ctx.fillStyle='#8B6914';
  ctx.fillRect(cx-rw/2,poleTop,rw,poleH);
  // rope segments (alternating bands)
  const nSegs=28;
  const segH=poleH/nSegs;
  for(let i=0;i<nSegs;i++){
    ctx.fillStyle=i%2===0?'#c8922a':'#a87020';
    ctx.fillRect(cx-rw/2,poleTop+i*segH,rw,segH);
    // rope twist lines
    ctx.strokeStyle=i%2===0?'#a87020':'#c8922a';
    ctx.lineWidth=1.5;ctx.globalAlpha=0.5;
    ctx.beginPath();
    ctx.moveTo(cx-rw/2,poleTop+i*segH+segH*0.3);
    ctx.lineTo(cx+rw/2,poleTop+i*segH+segH*0.7);
    ctx.stroke();
    ctx.globalAlpha=1;
  }
  // pole border
  ctx.strokeStyle='#6b4a08';ctx.lineWidth=3;
  ctx.strokeRect(cx-rw/2,poleTop,rw,poleH);
  // top cap
  ctx.fillStyle='#7a4e1c';
  ctx.beginPath();ctx.ellipse(cx,poleTop,rw*0.58,rw*0.18,0,0,Math.PI*2);ctx.fill();
}

function scratchLoop(){
  const ov=document.getElementById('scratch-ov');
  if(ov.style.display==='none')return;
  const sc=document.getElementById('scratch-c');
  const ctx=sc.getContext('2d');
  sc.width=innerWidth;sc.height=innerHeight;
  const W=sc.width,H=sc.height;
  // dark bg
  ctx.fillStyle='#0a0500';ctx.fillRect(0,0,W,H);
  // scratching post
  drawScratchPost(ctx,W,H);
  // draw all active flashes
  _scratchFlashes=_scratchFlashes.filter(f=>{
    f.alpha-=0.055;
    if(f.alpha<=0)return false;
    drawClaw(ctx,f.x,f.y,f.mirror,f.alpha);
    return true;
  });
  _scratchRaf=requestAnimationFrame(scratchLoop);
}

function openScratchTask(task){
  _scratchTask=task;_scratchProg=0;_scratchSide=1;_scratchFlashes=[];
  const ov=document.getElementById('scratch-ov');
  ov.style.display='block';
  document.getElementById('scratch-bar').style.height='0%';
  document.getElementById('scratch-hint').style.opacity='1';
  cancelAnimationFrame(_scratchRaf);
  scratchLoop();
  window.scratchTap=(e)=>{
    e.preventDefault();
    _doScratch();
  };
  _scratchListener=(e)=>{
    if(e.code!=='ControlLeft'&&e.code!=='ControlRight')return;
    e.preventDefault();
    if(ov.style.display==='none')return;
    _doScratch();
  };
  let _meowIndex=0;
  function _playMeow(){
    try{
      const ac=getAC();
      const type=_meowIndex%3;_meowIndex++;
      const master=ac.createGain();master.connect(ac.destination);

      if(type===0){
        // miado curto agudo: "miau!" rápido
        const dur=0.38;
        const osc=ac.createOscillator();osc.type='triangle';
        const form=ac.createBiquadFilter();form.type='bandpass';form.frequency.value=1100;form.Q.value=1.8;
        const g=ac.createGain();
        osc.frequency.setValueAtTime(680,ac.currentTime);
        osc.frequency.linearRampToValueAtTime(820,ac.currentTime+0.08);
        osc.frequency.linearRampToValueAtTime(420,ac.currentTime+dur);
        g.gain.setValueAtTime(0,ac.currentTime);
        g.gain.linearRampToValueAtTime(0.55,ac.currentTime+0.04);
        g.gain.linearRampToValueAtTime(0.4,ac.currentTime+0.15);
        g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
        osc.connect(form);form.connect(g);g.connect(master);
        osc.start();osc.stop(ac.currentTime+dur);

      } else if(type===1){
        // miado longo reclamão: "miaaaau~"
        const dur=0.65;
        const osc=ac.createOscillator();osc.type='sawtooth';
        const form=ac.createBiquadFilter();form.type='bandpass';form.frequency.value=900;form.Q.value=2.2;
        const form2=ac.createBiquadFilter();form2.type='peaking';form2.frequency.value=2200;form2.gain.value=10;form2.Q.value=1.5;
        const g=ac.createGain();
        osc.frequency.setValueAtTime(520,ac.currentTime);
        osc.frequency.linearRampToValueAtTime(760,ac.currentTime+0.12);
        osc.frequency.setValueAtTime(760,ac.currentTime+0.12);
        osc.frequency.linearRampToValueAtTime(580,ac.currentTime+0.4);
        osc.frequency.linearRampToValueAtTime(340,ac.currentTime+dur);
        g.gain.setValueAtTime(0,ac.currentTime);
        g.gain.linearRampToValueAtTime(0.5,ac.currentTime+0.06);
        g.gain.setValueAtTime(0.45,ac.currentTime+0.35);
        g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
        osc.connect(form);form.connect(form2);form2.connect(g);g.connect(master);
        osc.start();osc.stop(ac.currentTime+dur);

      } else {
        // miado rouco surpreso: "rreow!" com vibrato
        const dur=0.45;
        const osc=ac.createOscillator();osc.type='sawtooth';
        const vib=ac.createOscillator();vib.type='sine';vib.frequency.value=7;
        const vibG=ac.createGain();vibG.gain.value=28;
        const form=ac.createBiquadFilter();form.type='bandpass';form.frequency.value=800;form.Q.value=1.5;
        const hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=200;
        const g=ac.createGain();
        osc.frequency.setValueAtTime(300,ac.currentTime);
        osc.frequency.linearRampToValueAtTime(700,ac.currentTime+0.07);
        osc.frequency.linearRampToValueAtTime(500,ac.currentTime+dur);
        vib.connect(vibG);vibG.connect(osc.frequency);
        g.gain.setValueAtTime(0,ac.currentTime);
        g.gain.linearRampToValueAtTime(0.5,ac.currentTime+0.05);
        g.gain.setValueAtTime(0.42,ac.currentTime+0.2);
        g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
        osc.connect(form);form.connect(hp);hp.connect(g);g.connect(master);
        vib.start();osc.start();
        osc.stop(ac.currentTime+dur);vib.stop(ac.currentTime+dur);
      }
      master.gain.value=0.7;
    }catch(e){}
  }

  function _doScratch(){
    if(ov.style.display==='none')return;
    // add flash
    // spawn claws inside the post area
    const _pw=innerWidth*0.28*0.38;
    const cx=innerWidth/2+(_pw/2-Math.random()*_pw);
    const cy=innerHeight*(0.12+Math.random()*0.74);
    _scratchFlashes.push({x:cx,y:cy,mirror:_scratchSide<0,alpha:1.0});
    _scratchSide*=-1;
    _playMeow();
    // fill bar
    _scratchProg=Math.min(100,_scratchProg+6.5);
    document.getElementById('scratch-bar').style.height=_scratchProg+'%';
    // drain slowly
    clearTimeout(window._scratchDrain);
    window._scratchDrain=setTimeout(()=>{
      const drain=setInterval(()=>{
        _scratchProg=Math.max(0,_scratchProg-1.2);
        const b=document.getElementById('scratch-bar');
        if(b)b.style.height=_scratchProg+'%';
        if(_scratchProg<=0||ov.style.display==='none')clearInterval(drain);
      },80);
    },600);
    if(_scratchProg>=100){
      document.removeEventListener('keydown',_scratchListener);
      setTimeout(()=>{closeScratchTask();completeTask(_scratchTask);},350);
    }
  }
  document.addEventListener('keydown',_scratchListener);
}

window.closeScratchTask=()=>{
  document.getElementById('scratch-ov').style.display='none';
  cancelAnimationFrame(_scratchRaf);_scratchRaf=null;
  if(_scratchListener){document.removeEventListener('keydown',_scratchListener);_scratchListener=null;}
  clearTimeout(window._scratchDrain);
};

// ══ BEDS TASK ══
let _bedsTask=null,_bedsMade=0,_bedsPawX=0,_bedsPawY=0,_bedsPawPulse=0,_bedsRaf=null,_bedsClick=null;

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

function drawBed(ctx,x,y,w,h,messy){
  // frame
  const fr=ctx.createLinearGradient(x,y,x,y+h);
  fr.addColorStop(0,'#5a3210');fr.addColorStop(1,'#3a1f08');
  ctx.fillStyle=fr;rr(ctx,x,y,w,h,10);ctx.fill();
  ctx.strokeStyle='#7a4820';ctx.lineWidth=2;ctx.stroke();
  // mattress
  ctx.fillStyle='#d4c4a8';rr(ctx,x+6,y+6,w-12,h-12,7);ctx.fill();
  // pillow
  ctx.fillStyle='#f0e8d0';rr(ctx,x+10,y+10,w-20,32,6);ctx.fill();
  ctx.strokeStyle='#c8bca0';ctx.lineWidth=1;ctx.stroke();
  if(messy){
    const bx=x+8,by=y+44,ww=w-16;
    ctx.fillStyle='#6a4fbc';
    ctx.beginPath();
    ctx.moveTo(bx,by);ctx.lineTo(bx+ww,by);
    ctx.bezierCurveTo(bx+ww*.8,by+h*.35,bx+ww*.5,by+h*.25,bx+ww*.7,by+h*.5);
    ctx.bezierCurveTo(bx+ww*.9,by+h*.65,bx+ww*.4,by+h*.55,bx+ww*.6,by+h*.7);
    ctx.lineTo(bx,by+h*.55);
    ctx.bezierCurveTo(bx+w*.15,by+h*.45,bx+w*.05,by+h*.25,bx,by);
    ctx.fill();
    ctx.strokeStyle='#5a3fac';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(bx+10,by+15);ctx.bezierCurveTo(bx+30,by+5,bx+50,by+25,bx+70,by+10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx+20,by+30);ctx.bezierCurveTo(bx+45,by+20,bx+60,by+40,bx+80,by+25);ctx.stroke();
    // cat peeking out
    const hx=x+w/2-12,hy=y+h-38;
    ctx.fillStyle='#888';ctx.beginPath();ctx.arc(hx+12,hy+12,12,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(hx+2,hy+4);ctx.lineTo(hx-4,hy-6);ctx.lineTo(hx+8,hy+2);ctx.fill();
    ctx.beginPath();ctx.moveTo(hx+22,hy+4);ctx.lineTo(hx+28,hy-6);ctx.lineTo(hx+16,hy+2);ctx.fill();
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(hx+7,hy+12,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+17,hy+12,2,0,Math.PI*2);ctx.fill();
  } else {
    const bx=x+8,by=y+44,bw=w-16,bh=h-50;
    const ng=ctx.createLinearGradient(bx,by,bx,by+bh);
    ng.addColorStop(0,'#8a6fdc');ng.addColorStop(1,'#5a3fac');
    ctx.fillStyle=ng;rr(ctx,bx,by,bw,bh,5);ctx.fill();
    ctx.strokeStyle='#a080ec';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(bx,by+22);ctx.lineTo(bx+bw,by+22);ctx.stroke();
    ctx.fillStyle='#b090fc';rr(ctx,bx,by,bw,22,5);ctx.fill();
    ctx.fillStyle='rgba(0,255,136,0.9)';ctx.font=`bold ${Math.floor(h*.3)}px sans-serif`;
    ctx.textAlign='center';ctx.fillText('✓',x+w/2,y+h*.78);
  }
}

function drawPaw(ctx,x,y,pulse){
  const s=1+Math.sin(pulse)*.12;
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  // glow
  ctx.shadowColor='#ffaaaa';ctx.shadowBlur=20;
  // palm
  ctx.fillStyle='#f4a0a0';
  ctx.beginPath();ctx.arc(0,8,22,0,Math.PI*2);ctx.fill();
  // toe pads
  const toes=[{x:-16,y:-12},{x:-6,y:-20},{x:6,y:-20},{x:16,y:-12}];
  toes.forEach(t=>{ctx.beginPath();ctx.ellipse(t.x,t.y,8,10,0,0,Math.PI*2);ctx.fill();});
  ctx.shadowBlur=0;
  // inner pink
  ctx.fillStyle='#e08080';
  ctx.beginPath();ctx.arc(0,10,14,0,Math.PI*2);ctx.fill();
  toes.forEach(t=>{ctx.beginPath();ctx.ellipse(t.x,t.y,5,6,0,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}

function bedsLoop(){
  const ov=document.getElementById('beds-ov');
  if(ov.style.display==='none')return;
  const sc=document.getElementById('beds-c');
  const ctx=sc.getContext('2d');
  sc.width=innerWidth;sc.height=innerHeight;
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,sc.width,sc.height);
  // title + progress drawn on canvas
  ctx.fillStyle='#aaa';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText('😴 Arrumar Camas — clique na patinha!',sc.width/2,34);
  ctx.fillStyle='#00ff88';ctx.font='bold 13px sans-serif';
  ctx.fillText(`Camas arrumadas: ${_bedsMade} / 3`,sc.width/2,56);
  // draw 3 beds
  const bw=160,bh=120,gap=60;
  const totalW=bw*3+gap*2;
  const bx0=sc.width/2-totalW/2;
  const by=sc.height/2-bh/2-10;
  for(let i=0;i<3;i++){
    drawBed(ctx,bx0+i*(bw+gap),by,bw,bh,i>=_bedsMade);
  }
  // paw
  _bedsPawPulse+=0.07;
  drawPaw(ctx,_bedsPawX,_bedsPawY,_bedsPawPulse);
  _bedsRaf=requestAnimationFrame(bedsLoop);
}

function movePaw(){
  const sc=document.getElementById('beds-c');
  const margin=80;
  _bedsPawX=margin+Math.random()*(sc.width-margin*2);
  _bedsPawY=margin+Math.random()*(sc.height-margin*2);
}

function openBedsTask(task){
  _bedsTask=task;_bedsMade=0;
  const ov=document.getElementById('beds-ov');
  ov.style.display='block';
  cancelAnimationFrame(_bedsRaf);
  movePaw();
  bedsLoop();
  function _playFluff(){
    try{
      const ac=getAC();
      const sr=ac.sampleRate;
      const dur=0.22+Math.random()*0.12;
      const buf=ac.createBuffer(1,Math.ceil(sr*dur),sr);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++){
        const t=i/sr;
        const env=Math.pow(t/dur,0.3)*Math.pow(1-t/dur,1.8);
        d[i]=(Math.random()*2-1)*env;
      }
      const src=ac.createBufferSource();src.buffer=buf;
      // whoosh: lowpass que abre e fecha rápido
      const lp=ac.createBiquadFilter();lp.type='lowpass';
      lp.frequency.setValueAtTime(200,ac.currentTime);
      lp.frequency.linearRampToValueAtTime(2800,ac.currentTime+dur*0.35);
      lp.frequency.exponentialRampToValueAtTime(300,ac.currentTime+dur);
      lp.Q.value=1.5;
      const g=ac.createGain();g.gain.value=0.9;
      src.connect(lp);lp.connect(g);g.connect(ac.destination);
      src.start();src.stop(ac.currentTime+dur);
    }catch(e){}
  }
  _bedsClick=(e)=>{
    if(ov.style.display==='none')return;
    const dx=e.clientX-_bedsPawX,dy=e.clientY-_bedsPawY;
    if(Math.hypot(dx,dy)<38){
      _bedsMade++;
      _playFluff();
      if(_bedsMade>=3){
        ov.removeEventListener('click',_bedsClick);
        setTimeout(()=>{closeBedsTask();completeTask(_bedsTask);},400);
      } else {
        movePaw();
      }
    }
  };
  ov.addEventListener('click',_bedsClick);
}

// ══ REFEIT TASK ══
let _refeitTask=null,_refeitListener=null,_refeitServed=0,_refeitRaf=null,_refeitShake=0,_refeitFlying=[];
const _refeitTotal=4;

function drawSandwich(ctx,cx,cy,sc){
  // tray
  ctx.fillStyle='#2255cc';rr(ctx,cx-sc*90,cy+sc*20,sc*180,sc*22,sc*6);ctx.fill();
  // plate
  ctx.fillStyle='#ccc';ctx.beginPath();ctx.ellipse(cx,cy+sc*18,sc*70,sc*14,0,0,Math.PI*2);ctx.fill();
  // bread bottom
  ctx.fillStyle='#c8860a';rr(ctx,cx-sc*58,cy-sc*10,sc*116,sc*28,sc*8);ctx.fill();
  ctx.fillStyle='#e09a18';rr(ctx,cx-sc*58,cy-sc*10,sc*116,sc*12,sc*4);ctx.fill();
  // lettuce
  ctx.fillStyle='#2a8a2a';
  for(let i=0;i<8;i++){ctx.beginPath();ctx.ellipse(cx-sc*50+i*sc*14,cy-sc*14,sc*12,sc*8,Math.sin(i)*0.4,0,Math.PI*2);ctx.fill();}
  // bread top
  ctx.fillStyle='#c8860a';rr(ctx,cx-sc*55,cy-sc*44,sc*110,sc*32,sc*14);ctx.fill();
  ctx.fillStyle='#dda020';rr(ctx,cx-sc*55,cy-sc*44,sc*110,sc*14,sc*10);ctx.fill();
  // sign stick
  ctx.fillStyle='#8B5A2B';ctx.fillRect(cx-sc*2,cy-sc*80,sc*4,sc*40);
  // sign board
  ctx.fillStyle='#e8c84a';rr(ctx,cx-sc*62,cy-sc*120,sc*124,sc*44,sc*6);ctx.fill();
  ctx.strokeStyle='#8B5A2B';ctx.lineWidth=sc*2;ctx.stroke();
  // sign text
  ctx.fillStyle='#1a3a0a';ctx.font=`bold ${Math.floor(sc*11)}px 'Courier New',monospace`;ctx.textAlign='center';
  ctx.fillText('🐾 SANDUÍCHE',cx,cy-sc*96);
  ctx.fillText('COM ERVA DE GATO 🐾',cx,cy-sc*82);
}

function drawRefeitScene(ctx,w,h,served,shake){
  ctx.fillStyle='#060606';ctx.fillRect(0,0,w,h);
  const cx=w/2+Math.sin(shake*0.8)*6*Math.max(0,1-shake*0.15);
  const cy=h*0.54;
  const sc=Math.min(w,h)/420;
  // heart pixel art
  const hx=cx-sc*110,hy=cy-sc*155;
  ctx.fillStyle='#e0305a';
  [[1,0],[2,0],[0,1],[1,1],[2,1],[3,1],[0,2],[1,2],[2,2],[3,2],[1,3],[2,3],[2,4]].forEach(([px,py])=>{
    ctx.fillRect(hx+px*sc*9,hy+py*sc*9,sc*8,sc*8);
  });
  // cat body (pixel blocks)
  const bx=cx,by=cy-sc*60;
  // body
  ctx.fillStyle='#e07818';ctx.beginPath();ctx.ellipse(bx,by,sc*42,sc*52,0,0,Math.PI*2);ctx.fill();
  // belly
  ctx.fillStyle='#f5d0a0';ctx.beginPath();ctx.ellipse(bx,by+sc*14,sc*22,sc*28,0,0,Math.PI*2);ctx.fill();
  // head
  ctx.fillStyle='#e07818';ctx.beginPath();ctx.arc(bx,by-sc*50,sc*36,0,Math.PI*2);ctx.fill();
  // ears
  ctx.fillStyle='#e07818';
  ctx.beginPath();ctx.moveTo(bx-sc*26,by-sc*78);ctx.lineTo(bx-sc*38,by-sc*100);ctx.lineTo(bx-sc*10,by-sc*80);ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+sc*26,by-sc*78);ctx.lineTo(bx+sc*38,by-sc*100);ctx.lineTo(bx+sc*10,by-sc*80);ctx.fill();
  // inner ears pink
  ctx.fillStyle='#f090a0';
  ctx.beginPath();ctx.moveTo(bx-sc*24,by-sc*80);ctx.lineTo(bx-sc*33,by-sc*96);ctx.lineTo(bx-sc*13,by-sc*81);ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+sc*24,by-sc*80);ctx.lineTo(bx+sc*33,by-sc*96);ctx.lineTo(bx+sc*13,by-sc*81);ctx.fill();
  // stripes
  ctx.fillStyle='#8b3a00';
  [[bx-sc*10,by-sc*84],[bx,by-sc*88],[bx+sc*10,by-sc*84]].forEach(([sx,sy])=>{ctx.fillRect(sx-sc*3,sy-sc*4,sc*6,sc*10);});
  // face white muzzle
  ctx.fillStyle='#f5f0e0';ctx.beginPath();ctx.ellipse(bx,by-sc*42,sc*18,sc*13,0,0,Math.PI*2);ctx.fill();
  // eyes
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(bx-sc*13,by-sc*55,sc*5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(bx+sc*13,by-sc*55,sc*5,0,Math.PI*2);ctx.fill();
  // nose
  ctx.fillStyle='#cc4466';ctx.beginPath();ctx.arc(bx,by-sc*44,sc*3,0,Math.PI*2);ctx.fill();
  // whiskers
  ctx.strokeStyle='#fff';ctx.lineWidth=sc;
  [[-sc*18,-sc*41,-sc*36,-sc*39],[sc*18,-sc*41,sc*36,-sc*39],[-sc*18,-sc*38,-sc*36,-sc*40],[sc*18,-sc*38,sc*36,-sc*40]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(bx+x1,by+y1);ctx.lineTo(bx+x2,by+y2);ctx.stroke();});
  // collar red
  ctx.fillStyle='#cc2222';rr(ctx,bx-sc*22,by-sc*18,sc*44,sc*10,sc*5);ctx.fill();
  // arms holding tray
  ctx.fillStyle='#e07818';
  ctx.beginPath();ctx.ellipse(bx-sc*65,by+sc*10,sc*18,sc*10,Math.PI*0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(bx+sc*65,by+sc*10,sc*18,sc*10,-Math.PI*0.3,0,Math.PI*2);ctx.fill();
  // tail
  ctx.strokeStyle='#e07818';ctx.lineWidth=sc*10;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(bx+sc*40,by+sc*20);ctx.bezierCurveTo(bx+sc*80,by+sc*40,bx+sc*100,by-sc*20,bx+sc*80,by-sc*50);ctx.stroke();
  // legs
  ctx.fillStyle='#e07818';ctx.beginPath();ctx.ellipse(bx-sc*18,by+sc*62,sc*14,sc*20,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(bx+sc*18,by+sc*62,sc*14,sc*20,0,0,Math.PI*2);ctx.fill();
  // sandwich
  drawSandwich(ctx,cx,cy+sc*10,sc);
  // progress text
  const done=served>=_refeitTotal;
  ctx.fillStyle=done?'#00ff88':'#ffcc44';
  ctx.font=`bold ${Math.floor(sc*18)}px sans-serif`;ctx.textAlign='center';
  ctx.shadowColor=done?'#00ff88':'#ff8800';ctx.shadowBlur=16;
  ctx.fillText(done?'✅ Todos servidos!':`Pressione qualquer tecla para servir! (${served}/${_refeitTotal})`,w/2,h*0.92);
  ctx.shadowBlur=0;
}

function drawFlyingPiece(ctx,f){
  ctx.save();
  ctx.translate(f.x,f.y);
  ctx.rotate(f.rot);
  ctx.globalAlpha=Math.max(0,f.alpha);
  const s=f.size;
  // bread bottom
  ctx.fillStyle='#c8860a';rr(ctx,-s,-s*0.3,s*2,s*0.7,s*0.2);ctx.fill();
  // lettuce
  ctx.fillStyle='#2a8a2a';
  for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(-s*0.6+i*s*0.4,0,s*0.3,s*0.2,Math.sin(i)*0.5,0,Math.PI*2);ctx.fill();}
  // bread top
  ctx.fillStyle='#d4920e';rr(ctx,-s,-s,s*2,s*0.75,s*0.35);ctx.fill();
  ctx.restore();
}

function refeitLoop(){
  const ov=document.getElementById('refeit-ov');
  if(ov.style.display==='none')return;
  const sc=document.getElementById('refeit-c');
  const ctx=sc.getContext('2d');
  sc.width=innerWidth;sc.height=innerHeight;
  drawRefeitScene(ctx,sc.width,sc.height,_refeitServed,_refeitShake);
  if(_refeitShake>0)_refeitShake--;
  // update + draw flying pieces
  _refeitFlying=_refeitFlying.filter(f=>{
    f.x+=f.vx; f.y+=f.vy; f.vy+=f.grav;
    f.rot+=f.rotSpd;
    f.alpha-=0.012;
    drawFlyingPiece(ctx,f);
    return f.alpha>0;
  });
  _refeitRaf=requestAnimationFrame(refeitLoop);
}

function openRefeitTask(task){
  _refeitTask=task;_refeitServed=0;_refeitShake=0;_refeitFlying=[];
  const ov=document.getElementById('refeit-ov');
  ov.style.display='block';
  cancelAnimationFrame(_refeitRaf);
  refeitLoop();
  let _refeitLastPress=0;
  function _playSwoosh(){
    try{
      const ac=getAC();
      const sr=ac.sampleRate;
      const dur=0.18+Math.random()*0.08;
      const buf=ac.createBuffer(1,Math.ceil(sr*dur),sr);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++){
        const t=i/sr;
        const env=Math.pow(1-t/dur,2.5);
        d[i]=(Math.random()*2-1)*env;
      }
      const src=ac.createBufferSource();src.buffer=buf;
      // sweep de highpass descendente: som de objeto cortando o ar
      const hp=ac.createBiquadFilter();hp.type='highpass';
      hp.frequency.setValueAtTime(3200,ac.currentTime);
      hp.frequency.exponentialRampToValueAtTime(180,ac.currentTime+dur);
      // leve reforço de presença
      const pk=ac.createBiquadFilter();pk.type='peaking';
      pk.frequency.value=1200;pk.gain.value=7;pk.Q.value=1.0;
      const g=ac.createGain();g.gain.value=0.7;
      src.connect(hp);hp.connect(pk);pk.connect(g);g.connect(ac.destination);
      src.start();src.stop(ac.currentTime+dur);
    }catch(e){}
  }
  function _doRefeit(){
    const now=Date.now();if(now-_refeitLastPress<1000)return;_refeitLastPress=now;
    if(_refeitServed>=_refeitTotal)return;
    _refeitServed++;_refeitShake=8;_playSwoosh();
    const sc2=document.getElementById('refeit-c');
    const cx=sc2.width/2, cy=sc2.height*0.54;
    const angle=(Math.random()*Math.PI*1.4)-Math.PI*0.7-Math.PI/2;
    const spd=8+Math.random()*6;
    _refeitFlying.push({x:cx,y:cy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-4,grav:0.28,rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-0.5)*0.22,size:18+Math.random()*12,alpha:1});
    if(_refeitServed>=_refeitTotal){
      document.removeEventListener('keydown',_refeitListener);_refeitListener=null;
      setTimeout(()=>{closeRefeitTask();completeTask(_refeitTask);},700);
    }
  }
  window.refeitTap=(e)=>{e.preventDefault();_doRefeit();};
  _refeitListener=(e)=>{
    if(['Escape','F1','F2','F3','F4','F5','F11','F12'].includes(e.key))return;
    if(e.repeat)return;
    e.preventDefault();
    _doRefeit();
  };
  document.addEventListener('keydown',_refeitListener);
}

window.closeRefeitTask=()=>{
  document.getElementById('refeit-ov').style.display='none';
  cancelAnimationFrame(_refeitRaf);_refeitRaf=null;
  if(_refeitListener){document.removeEventListener('keydown',_refeitListener);_refeitListener=null;}
};

window.closeBedsTask=()=>{
  const ov=document.getElementById('beds-ov');
  ov.style.display='none';
  cancelAnimationFrame(_bedsRaf);_bedsRaf=null;
  if(_bedsClick){ov.removeEventListener('click',_bedsClick);_bedsClick=null;}
};

// ══ SANDBOX TASK ══
let _sandboxTask=null,_sandboxRaf=null,_sandboxClick=null;
let _sandboxPoops=[];
let _sandboxPawAnim=null;
let _sandboxSand=[];

function _initSandboxPoops(W,H){
  // box bounds (inside sandbox rect)
  const bx=W*0.06+10,by=H*0.18+10,bw=W*0.88-20,bh=H*0.62-20;
  _sandboxPoops=[
    {x:bx+bw*0.15,y:by+bh*0.25,hp:1},
    {x:bx+bw*0.78,y:by+bh*0.18,hp:1},
    {x:bx+bw*0.42,y:by+bh*0.55,hp:1},
    {x:bx+bw*0.20,y:by+bh*0.72,hp:1},
    {x:bx+bw*0.68,y:by+bh*0.68,hp:1},
  ];
}

function sandboxLoop(){
  const ov=document.getElementById('sandbox-ov');
  if(ov.style.display==='none'){return;}
  const cv=document.getElementById('sandbox-c');
  const W=cv.width,H=cv.height;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);

  // background
  ctx.fillStyle='#0a0806';
  ctx.fillRect(0,0,W,H);

  // title
  ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.round(H*0.05)}px Segoe UI,Arial`;
  ctx.textAlign='center';
  ctx.fillText('Clique várias vezes na bosta para limpar!',W/2,H*0.10);

  // sandbox box
  const bx=W*0.06,by=H*0.18,bw=W*0.88,bh=H*0.62;
  // sand fill
  ctx.fillStyle='#c8a84b';
  ctx.fillRect(bx,by,bw,bh);
  // sand texture (random dots - drawn once as pattern via a subtle grain)
  ctx.fillStyle='rgba(0,0,0,0.08)';
  // just a few fixed grain marks for consistency
  const grains=[[0.1,0.2],[0.3,0.1],[0.5,0.4],[0.7,0.15],[0.85,0.5],[0.2,0.6],[0.6,0.7],[0.4,0.85],[0.9,0.8],[0.15,0.9]];
  grains.forEach(([gx,gy])=>{
    ctx.beginPath();ctx.ellipse(bx+bw*gx,by+bh*gy,bw*0.02,bh*0.01,0,0,Math.PI*2);ctx.fill();
  });
  // box border
  ctx.strokeStyle='#8B6914';ctx.lineWidth=6;
  ctx.strokeRect(bx,by,bw,bh);
  // wood plank lines
  ctx.strokeStyle='rgba(100,60,0,0.3)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(bx,by+bh*0.33);ctx.lineTo(bx+bw,by+bh*0.33);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx,by+bh*0.66);ctx.lineTo(bx+bw,by+bh*0.66);ctx.stroke();

  // draw poops
  const pr=Math.min(W,H)*0.055;
  _sandboxPoops.forEach(p=>{
    if(p.hp<=0)return;
    const alpha=p.hp;
    const scale=0.7+0.3*p.hp;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(p.x,p.y);
    ctx.scale(scale,scale);
    // poop emoji-style drawing
    // bottom mound
    ctx.fillStyle='#5c3317';
    ctx.beginPath();ctx.ellipse(0,pr*0.4,pr*0.9,pr*0.55,0,0,Math.PI*2);ctx.fill();
    // mid swirl
    ctx.beginPath();ctx.ellipse(0,-pr*0.05,pr*0.65,pr*0.45,0,0,Math.PI*2);ctx.fill();
    // top swirl
    ctx.beginPath();ctx.ellipse(0,-pr*0.5,pr*0.38,pr*0.35,0,0,Math.PI*2);ctx.fill();
    // tip
    ctx.beginPath();ctx.ellipse(0,-pr*0.82,pr*0.18,pr*0.2,0,0,Math.PI*2);ctx.fill();
    // shine
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.beginPath();ctx.ellipse(-pr*0.18,-pr*0.75,pr*0.07,pr*0.05,-0.5,0,Math.PI*2);ctx.fill();
    // eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(-pr*0.2,-pr*0.05,pr*0.12,pr*0.12,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(pr*0.2,-pr*0.05,pr*0.12,pr*0.12,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a0800';
    ctx.beginPath();ctx.ellipse(-pr*0.2,-pr*0.05,pr*0.065,pr*0.065,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(pr*0.2,-pr*0.05,pr*0.065,pr*0.065,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // sand particles
  _sandboxSand=_sandboxSand.filter(s=>{
    s.x+=s.vx;s.y+=s.vy;s.vy+=s.grav;s.alpha-=0.035;
    if(s.alpha<=0)return false;
    ctx.globalAlpha=s.alpha;
    ctx.fillStyle='#1a0a00';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    return true;
  });

  // paw animation
  if(_sandboxPawAnim){
    const pa=_sandboxPawAnim;
    pa.alpha-=0.045;
    pa.scale+=0.04;
    const pawR=pr*0.8*pa.scale;
    ctx.save();
    ctx.globalAlpha=Math.max(0,pa.alpha);
    ctx.translate(pa.x,pa.y);
    // main pad
    ctx.fillStyle='#e07070';
    ctx.beginPath();ctx.ellipse(0,0,pawR*0.55,pawR*0.48,0,0,Math.PI*2);ctx.fill();
    // toe pads
    const toes=[[-0.5,-0.7],[0,-0.85],[0.5,-0.7],[-0.75,-0.3]];
    toes.forEach(([tx,ty])=>{
      ctx.beginPath();ctx.ellipse(pawR*tx*0.6,pawR*ty*0.5,pawR*0.2,pawR*0.18,0,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();
    if(pa.alpha<=0)_sandboxPawAnim=null;
  }

  // progress bar bottom
  const total=_sandboxPoops.length;
  const done=_sandboxPoops.filter(p=>p.hp<=0).length;
  const pct=done/total;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(bx,by+bh+12,bw,18);
  ctx.fillStyle=pct>=1?'#00ff88':'#ffaa00';
  ctx.fillRect(bx,by+bh+12,bw*pct,18);
  ctx.strokeStyle='#555';ctx.lineWidth=2;
  ctx.strokeRect(bx,by+bh+12,bw,18);
  ctx.fillStyle='#fff';
  ctx.font=`${Math.round(H*0.032)}px Segoe UI,Arial`;
  ctx.textAlign='center';
  ctx.fillText(`${done}/${total} limpas`,W/2,by+bh+26);

  _sandboxRaf=requestAnimationFrame(sandboxLoop);
}

function _makePawCursor(){
  const sz=64;
  const off=document.createElement('canvas');
  off.width=sz;off.height=sz;
  const ctx=off.getContext('2d');
  ctx.translate(sz/2,sz/2);
  ctx.shadowColor='#ffaaaa';ctx.shadowBlur=8;
  ctx.fillStyle='#f4a0a0';
  ctx.beginPath();ctx.arc(0,8,18,0,Math.PI*2);ctx.fill();
  const toes=[{x:-13,y:-10},{x:-5,y:-17},{x:5,y:-17},{x:13,y:-10}];
  toes.forEach(t=>{ctx.beginPath();ctx.ellipse(t.x,t.y,6,8,0,0,Math.PI*2);ctx.fill();});
  ctx.shadowBlur=0;
  ctx.fillStyle='#e08080';
  ctx.beginPath();ctx.arc(0,10,11,0,Math.PI*2);ctx.fill();
  toes.forEach(t=>{ctx.beginPath();ctx.ellipse(t.x,t.y,4,5,0,0,Math.PI*2);ctx.fill();});
  return `url(${off.toDataURL()}) ${sz/2} ${sz/2}, pointer`;
}

function openSandboxTask(task){
  _sandboxTask=task;
  const ov=document.getElementById('sandbox-ov');
  ov.style.display='block';
  ov.style.cursor=_makePawCursor();
  const cv=document.getElementById('sandbox-c');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  _initSandboxPoops(cv.width,cv.height);
  _sandboxPawAnim=null;_sandboxSand=[];
  cancelAnimationFrame(_sandboxRaf);
  sandboxLoop();

  function _playCrack(){
    try{
      const ac=getAC();
      const sr=ac.sampleRate;
      const master=ac.createGain();master.gain.value=1.0;master.connect(ac.destination);

      // transiente inicial: click seco curtíssimo
      const clickDur=0.004;
      const cb=ac.createBuffer(1,Math.ceil(sr*clickDur),sr);
      const cd=cb.getChannelData(0);
      for(let i=0;i<cd.length;i++) cd[i]=(Math.random()*2-1)*Math.pow(1-i/cd.length,2);
      const cSrc=ac.createBufferSource();cSrc.buffer=cb;
      const cG=ac.createGain();cG.gain.value=1.8;
      cSrc.connect(cG);cG.connect(master);
      cSrc.start(ac.currentTime);

      // corpo do estalo: ruído curto ressonante (osso quebrando)
      const crackDur=0.055+Math.random()*0.03;
      const nb=ac.createBuffer(1,Math.ceil(sr*crackDur),sr);
      const nd=nb.getChannelData(0);
      for(let i=0;i<nd.length;i++){
        const t=i/sr;
        const env=Math.pow(1-t/crackDur,3);
        nd[i]=(Math.random()*2-1)*env;
      }
      const nSrc=ac.createBufferSource();nSrc.buffer=nb;
      // bandpass estreito para dar o "estalo" com timbre de osso
      const bp=ac.createBiquadFilter();bp.type='bandpass';
      bp.frequency.value=900+Math.random()*400;bp.Q.value=4+Math.random()*3;
      // reforço de sub para deixar "gordo"
      const pk=ac.createBiquadFilter();pk.type='peaking';
      pk.frequency.value=120+Math.random()*60;pk.gain.value=12;pk.Q.value=1.2;
      const nG=ac.createGain();nG.gain.value=1.4;
      nSrc.connect(bp);bp.connect(pk);pk.connect(nG);nG.connect(master);
      nSrc.start(ac.currentTime+0.001);

      // cauda: ressonância curta (eco do osso)
      const tailDur=0.12;
      const tb=ac.createBuffer(1,Math.ceil(sr*tailDur),sr);
      const td2=tb.getChannelData(0);
      for(let i=0;i<td2.length;i++){
        const t=i/sr;
        td2[i]=(Math.random()*2-1)*Math.pow(1-t/tailDur,6);
      }
      const tSrc=ac.createBufferSource();tSrc.buffer=tb;
      const tbp=ac.createBiquadFilter();tbp.type='bandpass';
      tbp.frequency.value=300+Math.random()*200;tbp.Q.value=8;
      const tG=ac.createGain();tG.gain.value=0.35;
      tSrc.connect(tbp);tbp.connect(tG);tG.connect(master);
      tSrc.start(ac.currentTime+0.02);
    }catch(e){}
  }

  function _playFart(){
    try{
      const ac=getAC();
      const sr=ac.sampleRate;
      const master=ac.createGain();master.gain.value=1.0;master.connect(ac.destination);

      // múltiplas bolhas líquidas sobrepostas — cada uma curta e mole
      const nBubbles=5+Math.floor(Math.random()*4);
      for(let b=0;b<nBubbles;b++){
        const delay=b*0.04+Math.random()*0.03;
        const bDur=0.06+Math.random()*0.10;
        const buf=ac.createBuffer(1,Math.ceil(sr*bDur),sr);
        const d=buf.getChannelData(0);
        // ruído filtrado com envelope suave (sem ataque duro)
        let lp_s=0;
        for(let i=0;i<d.length;i++){
          const t=i/sr;
          const white=Math.random()*2-1;
          // lowpass simples no domínio do tempo → som mole
          lp_s=lp_s*0.82+white*0.18;
          // envelope: sobe rápido, cai lento
          const env=Math.pow(t/bDur,0.1)*Math.pow(1-t/bDur,1.2);
          d[i]=lp_s*env*2.2;
        }
        const src=ac.createBufferSource();src.buffer=buf;
        // bandpass centrado em frequência baixa-média → molhado, não grave
        const bp=ac.createBiquadFilter();bp.type='bandpass';
        bp.frequency.value=180+Math.random()*260;
        bp.Q.value=0.4+Math.random()*0.5;
        // leve pitch wobble via segundo filter
        const notch=ac.createBiquadFilter();notch.type='peaking';
        notch.frequency.value=80+Math.random()*60;
        notch.gain.value=8;notch.Q.value=1.5;
        const g=ac.createGain();g.gain.value=0.28+Math.random()*0.18;
        src.connect(bp);bp.connect(notch);notch.connect(g);g.connect(master);
        src.start(ac.currentTime+delay);
        src.stop(ac.currentTime+delay+bDur);
      }
    }catch(e){}
  }
  _sandboxClick=(e)=>{
    const cv=document.getElementById('sandbox-c');
    const rect=cv.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(cv.width/rect.width);
    const my=(e.clientY-rect.top)*(cv.height/rect.height);
    const pr=Math.min(cv.width,cv.height)*0.055;
    let hit=false;
    _sandboxPoops.forEach(p=>{
      if(p.hp<=0)return;
      const dx=mx-p.x,dy=my-p.y;
      if(Math.sqrt(dx*dx+dy*dy)<pr*1.1){
        p.hp=Math.max(0,p.hp-0.2);
        _sandboxPawAnim={x:mx,y:my,alpha:1.2,scale:0.6};_playCrack();
        // spawn sand particles
        for(let i=0;i<12;i++){
          const ang=Math.random()*Math.PI*2;
          const spd=1.5+Math.random()*4;
          _sandboxSand.push({x:p.x,y:p.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,grav:0.18,alpha:1,r:2+Math.random()*3});
        }
        hit=true;
      }
    });
    if(!hit)return;
    if(_sandboxPoops.every(p=>p.hp<=0)){
      setTimeout(()=>{closeSandboxTask();completeTask(_sandboxTask);},500);
    }
  };
  ov.addEventListener('click',_sandboxClick);
}

  ov.style.display='none';
  cancelAnimationFrame(_sandboxRaf);_sandboxRaf=null;

// 🎲 ROLETA RUSSA — quando VOCÊ é o impostor, ninguém vota: a sorte sorteia quem vai embora
function russianRoulette(){
  document.getElementById('meet-ov').classList.add('active');
  document.getElementById('mtitle').textContent='🎲 ROLETA RUSSA!';
  document.getElementById('msub').textContent='Há um impostor entre nós... ninguém sabe quem! A sorte decide quem será ejetado 😼';
  document.getElementById('vtimer').textContent='';
  const vg=document.getElementById('vgrid');vg.innerHTML='';
  const alive=[G.player,...G.bots].filter(c=>c.alive);
  const cards=[];
  alive.forEach(c=>{
    const card=document.createElement('div');card.className='vcard';
    const mc=document.createElement('canvas');mc.width=58;mc.height=70;
    drawCat(mc.getContext('2d'),29,44,{color:c.color,eye:c.eye,hat:c.hat,pattern:c.pattern,dir:1,scale:1.1});
    card.appendChild(mc);const nd=document.createElement('div');nd.className='vname';nd.textContent=(c.isPlayer?'👤 ':'')+c.name;card.appendChild(nd);
    vg.appendChild(card);cards.push(card);
  });
  const pick=Math.floor(Math.random()*alive.length);
  const stops=alive.length*3+pick; // ~3 voltas + parada no sorteado
  let i=0,delay=70;
  function spin(){
    cards.forEach(c=>c.classList.remove('roulette-on'));
    const idx=i%alive.length;
    cards[idx].classList.add('roulette-on');_playRRTick();
    if(i>=stops){cards[idx].classList.add('roulette-pick');_playRRBang();_rrTimer=setTimeout(()=>endMeeting(alive[idx].id),1400);return;}
    if(stops-i<alive.length+2)delay+=42; // desacelera no fim (suspense)
    i++;_rrTimer=setTimeout(spin,delay);
  }
  spin();
}
function _playRRTick(){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=900;g.gain.setValueAtTime(.0001,ac.currentTime);g.gain.linearRampToValueAtTime(.1,ac.currentTime+.004);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.06);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.07);}catch(e){}}
function _playRRBang(){try{const ac=getAC(),dur=.55,buf=ac.createBuffer(1,ac.sampleRate*dur|0,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);const src=ac.createBufferSource();src.buffer=buf;const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1000;const g=ac.createGain();g.gain.value=.9;src.connect(lp);lp.connect(g);g.connect(ac.destination);src.start();const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(240,ac.currentTime);o.frequency.exponentialRampToValueAtTime(45,ac.currentTime+dur);const g2=ac.createGain();g2.gain.setValueAtTime(.5,ac.currentTime);g2.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);o.connect(g2);g2.connect(ac.destination);o.start();o.stop(ac.currentTime+dur);}catch(e){}}

function checkWin(){
  const imp=[G.player,...G.bots].find(c=>c.isImp);
  const crew=[G.player,...G.bots].filter(c=>c.alive&&!c.isImp);
  if(!imp.alive){setTimeout(()=>endGame(true,'O impostor foi eliminado! 🎉'),600);return;}
  if(G.tasks.every(t=>t.done)){setTimeout(()=>endGame(true,'Todas as tarefas completas! 🎊'),600);return;}
  if(crew.length<=0){setTimeout(()=>endGame(false,`${imp.name} eliminou todos! 😈`),700);}
}

function crewWinAnim(survivors){
  _cinStop=false;
  const ec=document.getElementById('crew-win-c');
  ec.width=innerWidth;ec.height=innerHeight;ec.style.display='block';
  const ctx=ec.getContext('2d');
  const n=survivors.length||1;
  // Scale pattern: alternating bigger/smaller like the reference image
  const scalePattern=[0.82,1.1,1.38,1.55,1.38,1.1,0.82,0.95,1.2,1.0];
  const baseY=innerHeight*0.62;
  const maxSpacing=Math.min(100,innerWidth*0.78/Math.max(n,1));
  const totalW=maxSpacing*(n-1);
  const startX=innerWidth/2-totalW/2;
  let prog=0;let held=0;const holdFrames=150;
  function draw(){
    if(_cinStop){ec.style.display='none';return;}
    ec.width=innerWidth;ec.height=innerHeight;
    // Dark BG
    ctx.fillStyle='#080c08';ctx.fillRect(0,0,ec.width,ec.height);
    // Green radial glow behind cats
    const grd=ctx.createRadialGradient(innerWidth/2,baseY-20,10,innerWidth/2,baseY-20,innerWidth*0.5);
    grd.addColorStop(0,'rgba(0,255,136,0.15)');grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;ctx.fillRect(0,0,ec.width,ec.height);
    // TRIPULAÇÃO top
    const tAlpha=Math.min(1,prog*2.5);
    ctx.globalAlpha=tAlpha;
    const tSize=Math.min(Math.floor(innerWidth*0.13),84);
    ctx.font=`900 ${tSize}px sans-serif`;ctx.textAlign='center';
    ctx.shadowColor='#00ff88';ctx.shadowBlur=40;
    ctx.fillStyle='#ffffff';
    ctx.fillText('TRIPULAÇÃO',innerWidth/2,innerHeight*0.14);
    // VENCE bottom
    const vSize=Math.min(Math.floor(innerWidth*0.17),110);
    ctx.font=`900 ${vSize}px sans-serif`;
    ctx.fillStyle='#00ff88';ctx.shadowColor='#00ff88';ctx.shadowBlur=60;
    ctx.fillText('VENCE',innerWidth/2,innerHeight*0.93);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    // Draw each survivor with staggered slide-up
    survivors.forEach((c,i)=>{
      const sc=scalePattern[i%scalePattern.length];
      const x=startX+i*maxSpacing;
      const delay=i/n*0.45;
      const cp=Math.max(0,Math.min(1,(prog-delay)*2.8));
      const eased=1-Math.pow(1-cp,3);
      const slideY=(1-eased)*100;
      ctx.globalAlpha=eased;
      drawCat(ctx,x,baseY+slideY,{color:c.color,eye:c.eye,hat:c.hat,pattern:c.pattern,name:c.name,dir:1,scale:sc});
      ctx.globalAlpha=1;
    });
    prog+=0.016;
    if(prog<1.1){requestAnimationFrame(draw);}
    else{
      held++;
      if(held<holdFrames){requestAnimationFrame(draw);}
      else if(held===holdFrames){
        let fadeAlpha=1;
        (function fadeOut(){
          if(_cinStop){ec.style.display='none';document.getElementById('end-ov').classList.add('active');return;}
          ec.width=innerWidth;ec.height=innerHeight;
          ctx.fillStyle='#080c08';ctx.fillRect(0,0,ec.width,ec.height);
          const grd2=ctx.createRadialGradient(innerWidth/2,baseY-20,10,innerWidth/2,baseY-20,innerWidth*0.5);
          grd2.addColorStop(0,'rgba(0,255,136,0.15)');grd2.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle=grd2;ctx.fillRect(0,0,ec.width,ec.height);
          ctx.globalAlpha=fadeAlpha;
          ctx.font=`900 ${Math.min(Math.floor(innerWidth*0.13),84)}px sans-serif`;ctx.textAlign='center';
          ctx.shadowColor='#00ff88';ctx.shadowBlur=40;ctx.fillStyle='#ffffff';
          ctx.fillText('TRIPULAÇÃO',innerWidth/2,innerHeight*0.14);
          ctx.font=`900 ${Math.min(Math.floor(innerWidth*0.17),110)}px sans-serif`;
          ctx.fillStyle='#00ff88';ctx.shadowColor='#00ff88';ctx.shadowBlur=60;
          ctx.fillText('VENCE',innerWidth/2,innerHeight*0.93);
          ctx.shadowBlur=0;
          survivors.forEach((c,i)=>{
            const sc=scalePattern[i%scalePattern.length];
            const x=startX+i*maxSpacing;
            drawCat(ctx,x,baseY,{color:c.color,eye:c.eye,hat:c.hat,pattern:c.pattern,name:c.name,dir:1,scale:sc});
          });
          ctx.globalAlpha=1;
          fadeAlpha-=0.035;
          if(fadeAlpha>0)requestAnimationFrame(fadeOut);
          else{ec.style.display='none';document.getElementById('end-ov').classList.add('active');}
        })();
      }
    }
  }
  draw();
}

  ctx.beginPath();ctx.moveTo(3*s,-40*s);ctx.lineTo(6*s,-22*s);ctx.lineTo(9*s,-40*s);ctx.fill();
  ctx.beginPath();ctx.moveTo(-20*s,-38*s);ctx.lineTo(-17*s,-26*s);ctx.lineTo(-14*s,-38*s);ctx.fill();
  ctx.beginPath();ctx.moveTo(14*s,-38*s);ctx.lineTo(17*s,-26*s);ctx.lineTo(20*s,-38*s);ctx.fill();
  // whiskers
  ctx.strokeStyle='rgba(180,255,180,0.7)';ctx.lineWidth=1.2*s;
  for(var w=0;w<3;w++){
    ctx.beginPath();ctx.moveTo(-10*s,(-44+w*6)*s);ctx.lineTo(-72*s,(-50+w*7)*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(10*s,(-44+w*6)*s);ctx.lineTo(72*s,(-50+w*7)*s);ctx.stroke();
  }
  // nose
  ctx.shadowColor='#ff44aa';ctx.shadowBlur=8*s;
  ctx.beginPath();ctx.arc(0,-44*s,4*s,0,Math.PI*2);ctx.fillStyle='#ff44aa';ctx.fill();

}

function impWinAnim(imp){
  _cinStop=false;
  const ec=document.getElementById('crew-win-c');
  ec.width=innerWidth;ec.height=innerHeight;ec.style.display='block';
  const ctx=ec.getContext('2d');
  let prog=0;let held=0;const holdFrames=160;
  const catScale=3.5;
  function draw(){
    if(_cinStop){ec.style.display='none';return;}
    ec.width=innerWidth;ec.height=innerHeight;
    // Dark to red gradient background (top dark, bottom red)
    const bg=ctx.createLinearGradient(0,0,0,ec.height);
    bg.addColorStop(0,'#0a0000');bg.addColorStop(0.5,'#3a0000');bg.addColorStop(1,'#cc0000');
    ctx.fillStyle=bg;ctx.fillRect(0,0,ec.width,ec.height);
    // Red radial glow behind cat
    const catY=innerHeight*0.58;
    const grd=ctx.createRadialGradient(innerWidth/2,catY,10,innerWidth/2,catY,innerWidth*0.45);
    grd.addColorStop(0,'rgba(255,0,0,0.55)');grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;ctx.fillRect(0,0,ec.width,ec.height);
    const alpha=Math.min(1,prog*2);
    ctx.globalAlpha=alpha;
    // "Assassino" top — yellow, pixel-style
    const tSize=Math.min(Math.floor(innerWidth*0.14),90);
    ctx.font=`900 ${tSize}px 'Courier New', monospace`;ctx.textAlign='center';
    ctx.shadowColor='#ffcc00';ctx.shadowBlur=30;
    ctx.fillStyle='#ffcc00';
    ctx.fillText('Assassino',innerWidth/2,innerHeight*0.14);
    // "Venceu!" bottom
    const vSize=Math.min(Math.floor(innerWidth*0.15),96);
    ctx.font=`900 ${vSize}px 'Courier New', monospace`;
    ctx.fillStyle='#ff4444';ctx.shadowColor='#ff0000';ctx.shadowBlur=50;
    ctx.fillText('Venceu!',innerWidth/2,innerHeight*0.92);
    ctx.shadowBlur=0;
    // Cat slides up from below center, large
    const cp=Math.max(0,Math.min(1,prog*2.2));
    const eased=1-Math.pow(1-cp,3);
    const slideY=(1-eased)*120;
    ctx.globalAlpha=eased;
    drawAlienCat(ctx,innerWidth/2,catY+slideY,catScale*0.28);
    ctx.globalAlpha=1;
    prog+=0.016;
    if(prog<1.1){requestAnimationFrame(draw);}
    else{
      held++;
      if(held<holdFrames){requestAnimationFrame(draw);}
      else if(held===holdFrames){
        let fadeAlpha=1;
        (function fadeOut(){
          if(_cinStop){ec.style.display='none';document.getElementById('end-ov').classList.add('active');return;}
          ec.width=innerWidth;ec.height=innerHeight;
          const bg2=ctx.createLinearGradient(0,0,0,ec.height);
          bg2.addColorStop(0,'#0a0000');bg2.addColorStop(0.5,'#3a0000');bg2.addColorStop(1,'#cc0000');
          ctx.fillStyle=bg2;ctx.fillRect(0,0,ec.width,ec.height);
          const grd2=ctx.createRadialGradient(innerWidth/2,catY,10,innerWidth/2,catY,innerWidth*0.45);
          grd2.addColorStop(0,'rgba(255,0,0,0.55)');grd2.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle=grd2;ctx.fillRect(0,0,ec.width,ec.height);
          ctx.globalAlpha=fadeAlpha;
          ctx.font=`900 ${Math.min(Math.floor(innerWidth*0.14),90)}px 'Courier New', monospace`;ctx.textAlign='center';
          ctx.shadowColor='#ffcc00';ctx.shadowBlur=30;ctx.fillStyle='#ffcc00';
          ctx.fillText('Assassino',innerWidth/2,innerHeight*0.14);
          ctx.font=`900 ${Math.min(Math.floor(innerWidth*0.15),96)}px 'Courier New', monospace`;
          ctx.fillStyle='#ff4444';ctx.shadowColor='#ff0000';ctx.shadowBlur=50;
          ctx.fillText('Venceu!',innerWidth/2,innerHeight*0.92);
          ctx.shadowBlur=0;
          drawAlienCat(ctx,innerWidth/2,catY,catScale*0.28);
          ctx.globalAlpha=1;
          fadeAlpha-=0.035;
          if(fadeAlpha>0)requestAnimationFrame(fadeOut);
          else{ec.style.display='none';document.getElementById('end-ov').classList.add('active');}
        })();
      }
    }
  }
  draw();
}

function drawMap(){

    ctx.strokeStyle='rgba(255,255,255,.025)';ctx.lineWidth=1;for(let gx=r.x;gx<r.x+r.w;gx+=28){ctx.beginPath();ctx.moveTo(gx-camX,r.y-camY);ctx.lineTo(gx-camX,r.y+r.h-camY);ctx.stroke();}for(let gy=r.y;gy<r.y+r.h;gy+=28){ctx.beginPath();ctx.moveTo(r.x-camX,gy-camY);ctx.lineTo(r.x+r.w-camX,gy-camY);ctx.stroke();}

  });

  {const lx=LPANEL.x-camX,ly=LPANEL.y-camY,sab=!!G.sabotage,pul=sab?(Math.sin(Date.now()/120)*.4+.6):1;ctx.fillStyle=sab?`rgba(255,${~~(60*pul)},${~~(40*pul)},.9)`:'rgba(255,204,51,.5)';ctx.fillRect(lx-16,ly-12,32,24);ctx.strokeStyle=sab?'#ff5533':'#ffcc33';ctx.lineWidth=2;ctx.strokeRect(lx-16,ly-12,32,24);ctx.font='15px Arial';ctx.textAlign='center';ctx.fillText('💡',lx,ly+5);}
}

function drawChars(){
  const me=G.player;
  const tgt=(me.isImp&&me.alive)?G.bots.filter(b=>b.alive&&!b.isImp&&dst(me,b)<58).sort((a,b)=>dst(me,a)-dst(me,b))[0]:null;
  G.bots.forEach(b=>{if(!b.alive)return;const bb=b.walkPhase?Math.abs(Math.sin(b.walkPhase))*2.2:0;drawCat(ctx,b.x-camX,b.y-camY,{color:b.color,eye:b.eye,hat:b.hat,pattern:b.pattern,name:b.name,dir:b.dir,bob:bb});if(b.panic)_drawPanic(b.x-camX,b.y-camY-bb);else if(watched(b,b===tgt?me:null))_drawEye(b.x-camX,b.y-camY-bb);});
  const p=G.player;if(G.inHatch==null){const pb=(p.alive&&p.walkPhase)?Math.abs(Math.sin(p.walkPhase))*2.2:0;drawCat(ctx,p.x-camX,p.y-camY,{color:p.color,eye:p.eye,hat:p.hat,pattern:p.pattern,name:p.name,dir:p.dir,dead:!p.alive,alpha:p.alive?1:.45,isPlayer:true,bob:pb});if(p.alive&&watched(p,tgt))_drawEye(p.x-camX,p.y-camY-pb);}
}
function _drawEye(sx,sy){

}
function _drawPanic(sx,sy){ // 🏃 testemunha correndo pro botão

function drawHUD2(){

  if(G.sabotage){ctx.font='bold 13px Arial';ctx.fillStyle='#ffcc33';ctx.textAlign='center';ctx.fillText('💡 LUZES SABOTADAS',gc.width/2,26);}
  drawMinimap();
}

function drawMinimap(){
  const mw=Math.min(132,gc.width*.32),sc=mw/WW,mh=WH*sc;
  const ox=gc.width-mw-10,oy=46;
  ctx.save();
  ctx.fillStyle='rgba(3,8,20,.7)';ctx.fillRect(ox-4,oy-4,mw+8,mh+8);
  ctx.strokeStyle='rgba(100,160,255,.35)';ctx.lineWidth=1;ctx.strokeRect(ox-4,oy-4,mw+8,mh+8);
  CORR.forEach(c=>{ctx.fillStyle='rgba(40,70,110,.5)';ctx.fillRect(ox+c.x*sc,oy+c.y*sc,c.w*sc,c.h*sc);});
  ROOMS.forEach(r=>{ctx.fillStyle=r.clr;ctx.fillRect(ox+r.x*sc,oy+r.y*sc,r.w*sc,r.h*sc);ctx.strokeStyle='rgba(120,170,230,.4)';ctx.lineWidth=.6;ctx.strokeRect(ox+r.x*sc,oy+r.y*sc,r.w*sc,r.h*sc);});
  // tarefas
  G.tasks.forEach(t=>{ctx.fillStyle=t.done?'#00ff88':'#ffcc33';ctx.beginPath();ctx.arc(ox+t.x*sc,oy+t.y*sc,2.2,0,Math.PI*2);ctx.fill();});
  // botão de emergência
  ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(ox+EMG.x*sc,oy+EMG.y*sc,2.6,0,Math.PI*2);ctx.fill();
  // painel de luz
  ctx.fillStyle=G.sabotage?'#ff5533':'#ffcc33';ctx.beginPath();ctx.arc(ox+LPANEL.x*sc,oy+LPANEL.y*sc,2.4,0,Math.PI*2);ctx.fill();
  // bots no minimap
  G.bots.forEach(b=>{
    if(!b.alive)return;
    // impostor: só visível para o próprio impostor
    if(b.isImp&&!G.player.isImp)return;
    ctx.fillStyle=b.isImp?'#ff3355':'#4488ff';
    ctx.beginPath();ctx.arc(ox+b.x*sc,oy+b.y*sc,2.4,0,Math.PI*2);ctx.fill();
  });
  // player (pisca)
  const p=G.player;if(p.alive){const pl=Math.sin(Date.now()/250)*.4+.6;ctx.fillStyle=`rgba(0,255,170,${pl})`;ctx.beginPath();ctx.arc(ox+p.x*sc,oy+p.y*sc,3.2,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=.8;ctx.stroke();}
  ctx.restore();
}

function drawLighting(){
  const p=G.player;const px=p.x-camX,py=p.y-camY;
  if(G.sabotage){
    G.sabFlick=(G.sabFlick||0)+.35;
    const flick=Math.sin(G.sabFlick)*.03+Math.random()*.025;
    const vis=(p.isImp?.34:.19)+flick; // impostor enxerga um pouco mais no escuro
    const rr=Math.max(gc.width,gc.height);
    const g=ctx.createRadialGradient(px,py,rr*vis*.45,px,py,rr*vis*1.35);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(.55,'rgba(2,4,12,.6)');
    g.addColorStop(1,'rgba(0,0,2,.98)');
    ctx.fillStyle=g;ctx.fillRect(0,0,gc.width,gc.height);
    return;
  }
  const r=Math.max(gc.width,gc.height)*.62;
  const g=ctx.createRadialGradient(px,py,r*.32,px,py,r);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(.7,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(2,5,14,.5)');
  ctx.fillStyle=g;ctx.fillRect(0,0,gc.width,gc.height);
}

// ══ GAMEPAD (Xbox) ══
let _gpBtnA=false,_gpBtnX=false,_gpBtnB=false,_gpBtnY=false,_gpBtnLB=false;
function pollGamepad(){
  const gps=navigator.getGamepads?navigator.getGamepads():[];
  for(const gp of gps){
    if(!gp)continue;
    // analógico esquerdo → movimento
    const ax=gp.axes[0],ay=gp.axes[1];
    const dead=0.18;
    _jvx=Math.abs(ax)>dead?ax:0;
    _jvy=Math.abs(ay)>dead?ay:0;

    // Botão A (índice 0) → usar/interagir
    const btnA=gp.buttons[0]?.pressed;
    if(btnA&&!_gpBtnA&&G.phase==='play')tryUse();
    _gpBtnA=btnA;

    // Botão X (índice 2) → matar
    const btnX=gp.buttons[2]?.pressed;
    if(btnX&&!_gpBtnX&&G.phase==='play')tryKill();
    _gpBtnX=btnX;

    // Botão B (índice 1) → fechar overlay / fechar task
    const btnB=gp.buttons[1]?.pressed;
    if(btnB&&!_gpBtnB){
      if(G.inHatch!=null)exitHatch(G.inHatch);
      else if(document.getElementById('task-ov').classList.contains('active'))closeTask();
    }
    _gpBtnB=btnB;

    // Botão Y (índice 3) → sabotar luzes (impostor)
    const btnY=gp.buttons[3]?.pressed;
    if(btnY&&!_gpBtnY&&G.phase==='play')trySabotage();
    _gpBtnY=btnY;

    // LB (índice 4) → usar duto (impostor)
    const btnLB=gp.buttons[4]?.pressed;
    if(btnLB&&!_gpBtnLB&&G.phase==='play')tryVent();
    _gpBtnLB=btnLB;

    break; // usa só o primeiro controle
  }
  requestAnimationFrame(pollGamepad);
}

// LOBBY SCENE (tela de menu animada)
// ══════════════════════════════════════════════
const LNAMES=['Gatão','Miau','Bigode','Bolinha','Felpudo','Neve','Fumaça','Brasa','Ronrom','Patinhas','Tufão','Peludo','Fofo','Faísca','Trovão','Capim','Relâmpago','Biscoito'];
let _lRAF=null,_lCats=[],_lLastEvt=0,_lCtx=null,_lW=0,_lH=0;

function startLobby(){
  const c=document.getElementById('lobby-c');
  _lW=c.width=innerWidth;_lH=c.height=innerHeight;
  _lCtx=c.getContext('2d');
  _lCats=[];
  for(let i=0;i<6;i++)_lCats.push(_mkLC(true));
  _lLastEvt=Date.now()-4000;
  if(_lRAF)cancelAnimationFrame(_lRAF);
  _lRAF=requestAnimationFrame(_lTick);
}
function stopLobby(){if(_lRAF){cancelAnimationFrame(_lRAF);_lRAF=null;}}

function _lFloor(){
  const s=Math.min(_lW,_lH)/680;
  const W=_lW,H=_lH,cx=W/2,cy=H/2;
  const bodyW=Math.min(W*.6,540*s);
  const bodyTop=H*.13,bodyBot=H*.76,bodyH=bodyBot-bodyTop;
  const fw=Math.min(bodyW*.74,430*s);
  const fh=Math.min(bodyH*.46,280*s);
  const fy=bodyTop+bodyH*.4;
  return{x:cx-fw/2,y:fy,w:fw,h:fh,s,cx,cy,bodyW,bodyTop,bodyBot};
}

function _mkLC(initial){
  const f=_lFloor();
  const x=initial?f.x+16+Math.random()*(f.w-32):(Math.random()<.5?f.x-10:f.x+f.w+10);
  const y=f.y+16+Math.random()*(f.h-32);
  const spd=(0.35+Math.random()*.55)*f.s;
  const vx=(Math.random()-.5)*spd*2,vy=(Math.random()-.5)*spd;
  return{
    name:LNAMES[Math.random()*LNAMES.length|0],
    color:COLORS[Math.random()*COLORS.length|0],
    hat:HATS[Math.random()*HATS.length|0].id,
    pattern:PATS[Math.random()*PATS.length|0].id,
    eye:EYEC[Math.random()*EYEC.length|0],
    x,y,vx,vy,dir:vx>=0?1:-1,
    alpha:initial?1:0,
    sc:(0.8+Math.random()*.4)*f.s,
    ttl:12000+Math.random()*16000,
    born:Date.now(),
    idleT:Math.random()*2000,
    leaving:false,
  };
}

function _lTick(){
  _lRAF=requestAnimationFrame(_lTick);
  const ctx=_lCtx,W=_lW,H=_lH,f=_lFloor(),now=Date.now();
  ctx.clearRect(0,0,W,H);
  _drawLRoom(ctx,W,H,f);

  _lCats.sort((a,b)=>a.y-b.y);
  for(let i=_lCats.length-1;i>=0;i--){
    const c=_lCats[i];
    if(!c.leaving)c.alpha=Math.min(1,c.alpha+.022);
    else{c.alpha=Math.max(0,c.alpha-.022);if(c.alpha<=0){_lCats.splice(i,1);continue;}}
    c.idleT-=16;
    if(c.idleT<=0){
      if(Math.random()<.38){c.vx=0;c.vy=0;c.idleT=500+Math.random()*1800;if(Math.random()<.28)_lMeow(.15);}
      else{const spd=(0.3+Math.random()*.65)*f.s;c.vx=(Math.random()-.5)*spd*2;c.vy=(Math.random()-.5)*spd;c.idleT=900+Math.random()*2800;}
    }
    c.x+=c.vx;c.y+=c.vy;
    if(c.vx!==0)c.dir=c.vx>0?1:-1;
    const m=10;
    if(c.x<f.x+m){c.x=f.x+m;c.vx=Math.abs(c.vx)+.15*f.s;}
    if(c.x>f.x+f.w-m){c.x=f.x+f.w-m;c.vx=-(Math.abs(c.vx)+.15*f.s);}
    if(c.y<f.y+m){c.y=f.y+m;c.vy=Math.abs(c.vy)+.1*f.s;}
    if(c.y>f.y+f.h-m){c.y=f.y+f.h-m;c.vy=-(Math.abs(c.vy)+.1*f.s);}
    if(!c.leaving&&now-c.born>c.ttl){c.leaving=true;_lLog(c.name+' saiu 🚪');}
    ctx.save();ctx.globalAlpha=c.alpha;
    drawCat(ctx,c.x,c.y,{color:c.color,eye:c.eye,hat:c.hat,pattern:c.pattern,name:c.name,dir:c.dir,scale:c.sc});
    ctx.restore();
  }

  if(now-_lLastEvt>3200+Math.random()*3500&&_lCats.filter(c=>!c.leaving).length<9){
    _lLastEvt=now;
    const cat=_mkLC(false);_lCats.push(cat);
    _lLog(cat.name+' entrou 🐾');_lMeow(.32);
  }
}

function _drawLRoom(ctx,W,H,f){
  const{cx,s,bodyW,bodyTop,bodyBot}=f;
  const bx=cx-bodyW/2,bw=bodyW,bodyH=bodyBot-bodyTop,t=Date.now();

  // Fundo espacial + estrelas subindo (sensação de decolagem)
  const bg=ctx.createRadialGradient(cx,H*.4,0,cx,H*.5,Math.max(W,H)*.75);
  bg.addColorStop(0,'#0e1c38');bg.addColorStop(1,'#02060d');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  _drawLStars(ctx,W,H);

  // ── Turbinas + fogo (na base, uma de cada lado) ──
  const tbY=bodyBot-4*s,tbW=bodyW*.18;
  [-1,1].forEach(side=>{
    const txc=cx+side*bodyW*.26;
    _drawFlame(ctx,txc,tbY+16*s,tbW*.82,t+side*140);
    ctx.fillStyle='#2e3645';ctx.beginPath();
    ctx.moveTo(txc-tbW*.34,tbY-16*s);ctx.lineTo(txc+tbW*.34,tbY-16*s);
    ctx.lineTo(txc+tbW*.5,tbY+16*s);ctx.lineTo(txc-tbW*.5,tbY+16*s);ctx.closePath();
    ctx.fill();ctx.strokeStyle='#525d70';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#14181f';ctx.beginPath();ctx.ellipse(txc,tbY+16*s,tbW*.5,5*s,0,0,Math.PI*2);ctx.fill();
  });

  // ── Aletas (fins) ──
  [-1,1].forEach(side=>{
    const fxb=cx+side*bodyW/2;
    ctx.fillStyle='#b23a2a';ctx.strokeStyle='#d9583e';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(fxb,bodyBot-bodyH*.22);ctx.lineTo(fxb+side*bodyW*.2,bodyBot+10*s);ctx.lineTo(fxb,bodyBot+2*s);ctx.closePath();ctx.fill();ctx.stroke();
  });

  // ── Nariz/cone ──
  const noseH=bodyTop*.62;
  const ng=ctx.createLinearGradient(bx,0,bx+bw,0);ng.addColorStop(0,'#cc4444');ng.addColorStop(.5,'#ee6666');ng.addColorStop(1,'#aa3333');
  ctx.fillStyle=ng;
  ctx.beginPath();ctx.moveTo(cx,bodyTop-noseH);ctx.quadraticCurveTo(bx+bw*.5,bodyTop-noseH*.2,bx+bw*.16,bodyTop);ctx.lineTo(bx+bw*.84,bodyTop);ctx.quadraticCurveTo(bx+bw*.5,bodyTop-noseH*.2,cx,bodyTop-noseH);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#ff8888';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#9fd8ff';ctx.beginPath();ctx.arc(cx,bodyTop-noseH*.42,7*s,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#cfe8ff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,bodyTop-noseH*.42,7*s,0,Math.PI*2);ctx.stroke();

  // ── Corpo metálico arredondado ──
  const rad=22*s;
  function bodyPath(){ctx.beginPath();ctx.moveTo(bx+rad,bodyTop);ctx.lineTo(bx+bw-rad,bodyTop);ctx.quadraticCurveTo(bx+bw,bodyTop,bx+bw,bodyTop+rad);ctx.lineTo(bx+bw,bodyBot-rad);ctx.quadraticCurveTo(bx+bw,bodyBot,bx+bw-rad,bodyBot);ctx.lineTo(bx+rad,bodyBot);ctx.quadraticCurveTo(bx,bodyBot,bx,bodyBot-rad);ctx.lineTo(bx,bodyTop+rad);ctx.quadraticCurveTo(bx,bodyTop,bx+rad,bodyTop);ctx.closePath();}
  const bgr=ctx.createLinearGradient(bx,0,bx+bw,0);bgr.addColorStop(0,'#2a3a50');bgr.addColorStop(.5,'#3a4e68');bgr.addColorStop(1,'#243246');
  bodyPath();ctx.fillStyle=bgr;ctx.fill();
  bodyPath();ctx.strokeStyle='#52708e';ctx.lineWidth=4;ctx.stroke();
  ctx.save();bodyPath();ctx.clip();
  ctx.strokeStyle='rgba(60,85,115,.55)';ctx.lineWidth=6*s;
  for(let y=bodyTop+18*s;y<bodyBot;y+=26*s){ctx.beginPath();ctx.moveTo(bx,y);ctx.lineTo(bx+bw,y);ctx.stroke();}
  ctx.fillStyle='rgba(200,60,50,.5)';ctx.fillRect(bx,bodyTop+bodyH*.12,bw,10*s); // faixa vermelha
  ctx.fillStyle='rgba(150,180,210,.5)';
  for(let y=bodyTop+10*s;y<bodyBot;y+=26*s){ctx.beginPath();ctx.arc(bx+8*s,y,2.2*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(bx+bw-8*s,y,2.2*s,0,Math.PI*2);ctx.fill();}
  ctx.restore();

  // Grade do piso (área dos gatos)
  const gs=f.w/7;
  ctx.strokeStyle='rgba(70,100,130,.3)';ctx.lineWidth=1;
  for(let x=f.x;x<=f.x+f.w;x+=gs){ctx.beginPath();ctx.moveTo(x,f.y);ctx.lineTo(x,f.y+f.h);ctx.stroke();}
  for(let y=f.y;y<=f.y+f.h;y+=gs){ctx.beginPath();ctx.moveTo(f.x,y);ctx.lineTo(f.x+f.w,y);ctx.stroke();}

  // Porta central com luz verde
  const dw=46*s,dh=58*s,dx=cx-dw/2,dy=bodyTop+bodyH*.2;
  ctx.fillStyle='#263848';ctx.fillRect(dx,dy,dw,dh);
  ctx.strokeStyle='#4a6a80';ctx.lineWidth=2.5;ctx.strokeRect(dx,dy,dw,dh);
  ctx.fillStyle='#1a2c3c';ctx.fillRect(dx+4,dy+4,dw-8,dh-8);
  ctx.strokeStyle='#304858';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,dy+4);ctx.lineTo(cx,dy+dh-4);ctx.stroke();
  const glt=Math.sin(t/750)>.1;
  ctx.fillStyle=glt?'#00ff88':'#009955';ctx.shadowColor='#00ff88';ctx.shadowBlur=glt?14:2;
  ctx.beginPath();ctx.arc(cx,dy+dh-11*s,5*s,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;

  // Vigias laterais (portinholas)
  [-1,1].forEach(side=>{
    const wx=cx+side*bodyW*.32,wy=bodyTop+bodyH*.34;
    ctx.fillStyle='#0a1a2a';ctx.beginPath();ctx.arc(wx,wy,13*s,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#5a7a96';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='rgba(120,200,255,.35)';ctx.beginPath();ctx.arc(wx-3,wy-3,5*s,0,Math.PI*2);ctx.fill();
  });

  // Cadeiras laterais (nas margens do corpo)
  const sw=14*s,sh=20*s,sgp=6*s,tyS=f.y+8*s;
  for(let i=0;i<3;i++)_dSeat(ctx,bx+10*s,tyS+i*(sh+sgp),sw,sh);
  for(let i=0;i<3;i++)_dSeat(ctx,bx+bw-10*s-sw,tyS+i*(sh+sgp),sw,sh);

  // Caixas verdes
  _dCrate(ctx,f.x+f.w*.12,f.y+f.h*.72,30*s,30*s);
  _dCrate(ctx,f.x+f.w*.78,f.y+f.h*.74,24*s,24*s);
}

let _lStars=null;
function _drawLStars(ctx,W,H){
  if(!_lStars||_lStars.W!==W||_lStars.H!==H){_lStars={W,H,arr:Array.from({length:70},()=>({x:Math.random()*W,y:Math.random()*H,len:Math.random()*22+6,spd:Math.random()*7+3}))};}
  ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1.4;ctx.beginPath();
  _lStars.arr.forEach(st=>{ctx.moveTo(st.x,st.y);ctx.lineTo(st.x,st.y+st.len);st.y+=st.spd;if(st.y>H){st.y=-st.len;st.x=Math.random()*W;}});
  ctx.stroke();
}
function _drawFlame(ctx,fx,fy,fw,t){
  const flick=Math.sin(t/55)*.5+.5,flick2=Math.sin(t/23+1)*.5+.5;
  const len=fw*(2.0+flick*1.2)+flick2*fw*.5;
  const halo=ctx.createRadialGradient(fx,fy+len*.3,0,fx,fy+len*.3,fw*1.4);
  halo.addColorStop(0,'rgba(255,150,40,.4)');halo.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=halo;ctx.beginPath();ctx.arc(fx,fy+len*.3,fw*1.4,0,Math.PI*2);ctx.fill();
  const g1=ctx.createLinearGradient(fx,fy,fx,fy+len);
  g1.addColorStop(0,'rgba(255,210,60,.95)');g1.addColorStop(.5,'rgba(255,110,20,.92)');g1.addColorStop(1,'rgba(255,40,0,0)');
  ctx.fillStyle=g1;ctx.beginPath();ctx.moveTo(fx-fw/2,fy);ctx.quadraticCurveTo(fx-fw*.25,fy+len*.55,fx,fy+len);ctx.quadraticCurveTo(fx+fw*.25,fy+len*.55,fx+fw/2,fy);ctx.closePath();ctx.fill();
  const len2=len*.6;
  const g2=ctx.createLinearGradient(fx,fy,fx,fy+len2);
  g2.addColorStop(0,'rgba(255,255,235,.95)');g2.addColorStop(.55,'rgba(255,225,90,.75)');g2.addColorStop(1,'rgba(255,150,0,0)');
  ctx.fillStyle=g2;ctx.beginPath();ctx.moveTo(fx-fw*.26,fy);ctx.quadraticCurveTo(fx-fw*.1,fy+len2*.7,fx,fy+len2);ctx.quadraticCurveTo(fx+fw*.1,fy+len2*.7,fx+fw*.26,fy);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(120,180,255,.5)';ctx.beginPath();ctx.ellipse(fx,fy+2,fw*.34,fw*.18,0,0,Math.PI*2);ctx.fill();
  for(let i=0;i<3;i++){const spx=fx+(Math.random()-.5)*fw*.9,spy=fy+len*(.4+Math.random()*.6);ctx.fillStyle='rgba(255,'+(150+Math.random()*100|0)+',50,'+(Math.random()*.6+.2)+')';ctx.beginPath();ctx.arc(spx,spy,Math.random()*2+.6,0,Math.PI*2);ctx.fill();}
}

function _dSeat(ctx,x,y,w,h){
  // Encosto
  ctx.fillStyle='#1e4868';
  ctx.fillRect(x,y,w,h*.72);
  ctx.strokeStyle='#3a6e90';ctx.lineWidth=1.2;ctx.strokeRect(x,y,w,h*.72);
  // Tela com brilho
  ctx.fillStyle='rgba(0,180,255,.18)';ctx.fillRect(x+2,y+2,w-4,h*.58);
  // Silhueta do ocupante
  ctx.fillStyle='rgba(0,200,255,.28)';
  ctx.beginPath();ctx.ellipse(x+w/2,y+h*.28,w*.2,h*.2,0,0,Math.PI*2);ctx.fill();
  // Base da cadeira
  ctx.fillStyle='#102438';ctx.fillRect(x-2,y+h*.68,w+4,h*.32);
  ctx.strokeStyle='#1e3850';ctx.lineWidth=1;ctx.strokeRect(x-2,y+h*.68,w+4,h*.32);
}

function _dCrate(ctx,x,y,w,h){
  ctx.fillStyle='#2a4e2a';ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#3a6e3a';ctx.lineWidth=1.5;ctx.strokeRect(x,y,w,h);
  ctx.strokeStyle='#1e3e1e';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x+w/2,y);ctx.lineTo(x+w/2,y+h);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y+h/2);ctx.lineTo(x+w,y+h/2);ctx.stroke();
  ctx.fillStyle='rgba(0,200,80,.13)';ctx.fillRect(x+w*.18,y+h*.18,w*.3,h*.3);
}

function _lMeow(vol){
  try{
    const ac=getAC(),g=ac.createGain();g.connect(ac.destination);
    const osc=ac.createOscillator();osc.type='triangle';
    const filt=ac.createBiquadFilter();filt.type='bandpass';filt.frequency.value=800+Math.random()*400;filt.Q.value=2;
    const dur=.22+Math.random()*.22,bf=360+Math.random()*320;
    osc.frequency.setValueAtTime(bf,ac.currentTime);
    osc.frequency.linearRampToValueAtTime(bf*1.45,ac.currentTime+.08);
    osc.frequency.linearRampToValueAtTime(bf*.62,ac.currentTime+dur);
    g.gain.setValueAtTime(0,ac.currentTime);
    g.gain.linearRampToValueAtTime(vol,ac.currentTime+.03);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);
    osc.connect(filt);filt.connect(g);osc.start();osc.stop(ac.currentTime+dur);
  }catch(e){}
}

function _lLog(msg){
  const el=document.getElementById('lobby-log');if(!el)return;
  const d=document.createElement('div');d.className='llog-item';d.textContent=msg;
  el.appendChild(d);setTimeout(()=>d.remove(),3500);
}

buildUI();
</script>
