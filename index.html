<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐱 Gatos no Espaço</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050810;color:#fff;font-family:'Segoe UI',Arial,sans-serif}
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
#menu{background:radial-gradient(ellipse at 50% 30%,#0d1b3e 0%,#030810 100%)}
.title{font-size:clamp(2rem,5vw,3.2rem);font-weight:900;background:linear-gradient(135deg,#ff9a6c,#ff6b9d,#c44dff,#7af);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;text-align:center}
.subtitle{color:#446;font-size:1rem;margin-bottom:44px}
.mbtn{background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;padding:13px 42px;border-radius:30px;font-size:1rem;font-weight:700;cursor:pointer;margin:6px;box-shadow:0 4px 20px #667eea44;transition:transform .15s,box-shadow .15s}
.mbtn:hover{transform:translateY(-2px);box-shadow:0 6px 28px #667eea55}
.mbtn.sec{background:linear-gradient(135deg,#1a1a3a,#0d0d20);box-shadow:none}
#star-c{position:fixed;inset:0;pointer-events:none;z-index:0}
.menu-ct{position:relative;z-index:1;text-align:center}
#customize{background:radial-gradient(ellipse at 50% 30%,#0d1b3e,#030810);flex-direction:row;gap:0}
.cl{width:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;border-right:1px solid #1a2a4a}
.cr{flex:1;padding:20px 28px;overflow-y:auto;display:flex;flex-direction:column;gap:18px;max-height:100vh}
.pvbox{width:148px;height:148px;background:#0d1530;border-radius:14px;border:2px solid #1e3a6a;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.slbl{font-size:.68rem;text-transform:uppercase;letter-spacing:1.5px;color:#446;font-weight:700;margin-bottom:8px}
.cgrid{display:flex;flex-wrap:wrap;gap:6px}
.cbtn{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
.cbtn.sel{border-color:#fff;transform:scale(1.25)}
.hgrid{display:flex;flex-wrap:wrap;gap:6px}
.hbtn{padding:6px 10px;background:#0d1530;border:2px solid #1e3a6a;border-radius:8px;cursor:pointer;font-size:1rem;transition:all .15s;text-align:center}
.hbtn.sel{border-color:#667eea;background:#1a2a6a}
.pgrid{display:flex;flex-wrap:wrap;gap:6px}
.pbtn{padding:6px 13px;background:#0d1530;border:2px solid #1e3a6a;border-radius:8px;cursor:pointer;font-size:.78rem;color:#99a;transition:all .15s}
.pbtn.sel{border-color:#667eea;color:#fff}
.ninput{background:#0d1530;border:2px solid #1e3a6a;color:#fff;padding:9px 12px;border-radius:9px;font-size:.95rem;width:100%;outline:none}
.ninput:focus{border-color:#667eea}
.playbtn{background:linear-gradient(135deg,#00c6ff,#0072ff);border:none;color:#fff;padding:14px;border-radius:13px;font-size:.95rem;font-weight:700;cursor:pointer;width:100%;margin-top:8px;transition:transform .15s}
.playbtn:hover{transform:translateY(-2px)}
.back{background:none;border:none;color:#446;cursor:pointer;font-size:.82rem;margin-top:8px}
#game{background:#000;padding:0;justify-content:flex-start;align-items:flex-start}
#gc{position:absolute;top:0;left:0}
.ov{display:none;position:fixed;inset:0;background:rgba(3,6,20,.93);z-index:200;align-items:center;justify-content:center;flex-direction:column}
.ov.active{display:flex}
#role-ov .rcard{background:#0d1b3e;border-radius:18px;padding:36px 52px;text-align:center;border:2px solid #2a4a8a;max-width:340px}
.ri{font-size:3.5rem;margin-bottom:10px}
.rt{font-size:1.6rem;font-weight:800;margin-bottom:8px}
.rd{color:#889;font-size:.85rem;line-height:1.65;margin-bottom:22px;white-space:pre-line}
#meet-ov{background:rgba(2,4,15,.97)}
.mtitle{font-size:1.7rem;font-weight:800;color:#ff4444;margin-bottom:6px}
.msub{color:#778;font-size:.83rem;margin-bottom:22px}
.vgrid{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:660px;margin-bottom:18px}
.vcard{background:#0d1b3e;border:2px solid #1e3a6a;border-radius:12px;padding:12px 14px;cursor:pointer;text-align:center;min-width:105px;transition:all .15s}
.vcard:hover{border-color:#667eea;background:#162a5a}
.vcard.voted{border-color:#00ff88;background:#002a16;pointer-events:none}
.vcard.skip{border-color:#ff8800}
.vname{font-size:.74rem;color:#ccd;margin-top:6px}
.vtimer{font-size:1.25rem;font-weight:700;color:#ff8800;margin-top:12px}
#task-ov .tbox{background:#0d1b3e;border:2px solid #1e3a6a;border-radius:16px;padding:28px 34px;text-align:center;min-width:310px;max-width:420px}
.ttitle{font-size:1.15rem;font-weight:700;color:#c8d8ff;margin-bottom:16px}
.tbtn{background:#162a5a;border:2px solid #2a5aff;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.9rem;margin:4px;transition:all .15s}
.tbtn:hover{background:#2a5aff}
.tcls{background:none;border:1px solid #223;color:#556;padding:7px 16px;border-radius:7px;cursor:pointer;margin-top:12px}
#end-ov .ebox{text-align:center}
.etitle{font-size:2.6rem;font-weight:900;margin-bottom:10px}
.esub{color:#778;margin-bottom:26px;font-size:.93rem}
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
.taskbar{position:absolute;top:13px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.76);border-radius:18px;padding:7px 18px;min-width:250px;text-align:center}
.tblbl{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:#778;margin-bottom:3px}
.tbtrack{height:8px;background:#111;border-radius:8px;overflow:hidden}
.tbfill{height:100%;background:linear-gradient(to right,#00ff88,#00cc66);border-radius:8px;transition:width .5s}
.killbtn{position:absolute;bottom:22px;right:18px;background:#cc2244;border:none;color:#fff;padding:13px 20px;border-radius:14px;font-size:.9rem;font-weight:700;cursor:pointer;pointer-events:all;display:none;opacity:.35;transition:opacity .2s,transform .15s}
.killbtn.rdy{opacity:1;box-shadow:0 0 18px #ff335577}
.killbtn:active{transform:scale(.95)}
.usebtn{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);background:#1a3ecc;border:none;color:#fff;padding:12px 22px;border-radius:14px;font-size:.85rem;font-weight:700;cursor:pointer;pointer-events:all;display:none;white-space:nowrap}
#jzone{position:absolute;bottom:18px;left:18px;width:120px;height:120px;display:none;pointer-events:all}
.jbase{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.14)}
.jthumb{position:absolute;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.28);border:2px solid rgba(255,255,255,.45);top:50%;left:50%;transform:translate(-50%,-50%);transition:transform .05s}
.notif{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:rgba(255,50,50,.9);color:#fff;padding:9px 20px;border-radius:26px;font-weight:700;z-index:999;pointer-events:none;white-space:nowrap;font-size:.85rem;animation:fi 3.2s forwards}
@keyframes fi{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
@keyframes scanRot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(max-width:600px){#customize{flex-direction:column}.cl{width:100%;border-right:none;border-bottom:1px solid #1a2a4a;padding:16px;flex-direction:row;gap:16px;justify-content:center}.cr{padding:14px}#jzone{display:block}}
</style>
</head>
<body>
<canvas id="star-c"></canvas>

<!-- MENU -->
<div class="screen active" id="menu">
  <div class="menu-ct">
    <div style="font-size:2.8rem;margin-bottom:6px">🐱🚀🐱</div>
    <div class="title">Gatos no Espaço</div>
    <div class="subtitle">Among Us com gatinhos fofos</div>
    <button class="mbtn" onclick="go('customize')">🎮 Jogar</button><br>
    <button class="mbtn sec" onclick="showNotif('WASD/setas: mover  ·  E ou Espaço: usar/interagir  ·  K: matar (impostor)  ·  Clique nas tarefas ❗ para fazer  ·  Reporte corpos 📢 e vote!')">📖 Como Jogar</button>
  </div>
</div>

<!-- PERSONALIZAÇÃO -->
<div class="screen" id="customize">
  <div class="cl">
    <div class="pvbox"><canvas id="prev" width="136" height="136"></canvas></div>
    <button class="playbtn" onclick="startGame()">🚀 Jogar!</button>
    <button class="back" onclick="go('menu')">← Voltar</button>
  </div>
  <div class="cr">
    <div><div class="slbl">Nome</div><input class="ninput" id="pname" maxlength="12" value="Gatão" oninput="updPrev()"></div>
    <div><div class="slbl">Cor do pelo</div><div class="cgrid" id="cgrid"></div></div>
    <div><div class="slbl">Chapéu</div><div class="hgrid" id="hgrid"></div></div>
    <div><div class="slbl">Pelagem</div><div class="pgrid" id="pgrid"></div></div>
    <div><div class="slbl">Cor dos olhos</div><div class="cgrid" id="egrid"></div></div>
  </div>
</div>

<!-- JOGO -->
<div class="screen" id="game">
  <canvas id="gc"></canvas>
  <div id="hud">
    <div class="taskbar">
      <div class="tblbl">Tarefas da tripulação</div>
      <div class="tbtrack"><div class="tbfill" id="tbfill" style="width:0"></div></div>
    </div>
    <button class="killbtn" id="killbtn" onclick="tryKill()">☠️ Matar</button>
    <button class="usebtn" id="usebtn" onclick="tryUse()">⚡ Usar</button>
    <div id="jzone"><div class="jbase"></div><div class="jthumb" id="jthumb"></div></div>
  </div>
</div>

<!-- ROLE -->
<div class="ov" id="role-ov">
  <div class="rcard">
    <div class="ri" id="ri"></div>
    <div class="rt" id="rt"></div>
    <div class="rd" id="rd"></div>
    <button class="mbtn" onclick="closeOv('role-ov');G.phase='play';gameRunning=true;lastT=performance.now();loop(lastT)">Começar! 🚀</button>
  </div>
</div>

<!-- MEETING -->
<div class="ov" id="meet-ov">
  <div style="text-align:center">
    <div class="mtitle" id="mtitle"></div>
    <div class="msub" id="msub"></div>
    <div class="vgrid" id="vgrid"></div>
    <div class="vtimer" id="vtimer"></div>
  </div>
</div>

<!-- TASK -->
<div class="ov" id="task-ov">
  <div class="tbox">
    <div class="ttitle" id="ttitle"></div>
    <div id="tcontent"></div>
    <button class="tcls" onclick="closeTask()">✕ Fechar</button>
  </div>
</div>

<!-- END -->
<div class="ov" id="end-ov">
  <div class="ebox">
    <div class="etitle" id="etitle"></div>
    <div class="esub" id="esub"></div>
    <button class="mbtn" onclick="startGame()">🔄 Jogar Novamente</button><br>
    <button class="back" onclick="go('customize');closeAllOv()" style="margin-top:10px">← Personalizar</button>
  </div>
</div>

<script>
// ══ STARS ══
const SC=document.getElementById('star-c'),sCtx=SC.getContext('2d');
function drawStars(){SC.width=innerWidth;SC.height=innerHeight;for(let i=0;i<180;i++){const x=Math.random()*innerWidth,y=Math.random()*innerHeight,r=Math.random()*1.4+.2,a=Math.random()*.7+.2;sCtx.beginPath();sCtx.arc(x,y,r,0,Math.PI*2);sCtx.fillStyle=`rgba(255,255,255,${a})`;sCtx.fill();}}
drawStars();addEventListener('resize',drawStars);

// ══ CUSTOM DATA ══
const COLORS=['#ff4444','#ff8800','#ffcc00','#aaff44','#00cc55','#00ccff','#4488ff','#9933ff','#ff44aa','#ddddff','#889aaa','#335566','#cc7733','#44ffcc','#ff6699','#33ffee'];
const EYEC=['#00ee66','#44aaff','#ffaa00','#ff3344','#ffffff','#aa44ff','#ff8844','#00ffff'];
const HATS=[
  {id:'none',e:'🚫',l:'Nenhum'},{id:'crown',e:'👑',l:'Coroa'},{id:'tophat',e:'🎩',l:'Cartola'},
  {id:'cowboy',e:'🤠',l:'Cowboy'},{id:'wizard',e:'🧙',l:'Mago'},{id:'flower',e:'🌸',l:'Flor'},
  {id:'halo',e:'😇',l:'Auréola'},{id:'propeller',e:'🌀',l:'Hélice'},{id:'xmas',e:'🎄',l:'Natal'},
  {id:'party',e:'🎉',l:'Party'},{id:'horns',e:'😈',l:'Chifres'},{id:'bow',e:'🎀',l:'Laço'},
];
const PATS=[{id:'solid',l:'Sólida'},{id:'striped',l:'Listrada'},{id:'spotted',l:'Pintada'},{id:'tuxedo',l:'Smoking'}];
const C={name:'Gatão',color:COLORS[0],hat:'none',pattern:'solid',eye:EYEC[0]};

function buildUI(){
  const cg=document.getElementById('cgrid');
  COLORS.forEach(c=>{const b=document.createElement('div');b.className='cbtn'+(c===C.color?' sel':'');b.style.background=c;b.onclick=()=>{C.color=c;cg.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');updPrev();};cg.appendChild(b);});
  const hg=document.getElementById('hgrid');
  HATS.forEach(h=>{const b=document.createElement('div');b.className='hbtn'+(h.id===C.hat?' sel':'');b.title=h.l;b.innerHTML=`${h.e}<div style="font-size:.52rem;color:#667;margin-top:1px">${h.l}</div>`;b.onclick=()=>{C.hat=h.id;hg.querySelectorAll('.hbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');updPrev();};hg.appendChild(b);});
  const pg=document.getElementById('pgrid');
  PATS.forEach(p=>{const b=document.createElement('div');b.className='pbtn'+(p.id===C.pattern?' sel':'');b.textContent=p.l;b.onclick=()=>{C.pattern=p.id;pg.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');updPrev();};pg.appendChild(b);});
  const eg=document.getElementById('egrid');
  EYEC.forEach(c=>{const b=document.createElement('div');b.className='cbtn'+(c===C.eye?' sel':'');b.style.cssText=`background:${c};border-color:#1e3a6a`;b.onclick=()=>{C.eye=c;eg.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');updPrev();};eg.appendChild(b);});
  updPrev();
}

const prevC=document.getElementById('prev'),pCtx=prevC.getContext('2d');
function updPrev(){C.name=document.getElementById('pname').value||'Gatão';pCtx.clearRect(0,0,136,136);drawCat(pCtx,68,80,{...C,dir:1,scale:2.1,isPlayer:true});}

// ══ CAT DRAW ══
function drawCat(ctx,x,y,o={}){
  const{color='#f00',eye='#0f6',hat='none',pattern='solid',name='',dir=1,dead=false,alpha=1,scale=1,isPlayer=false}=o;
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);ctx.globalAlpha=alpha;
  if(dead){ctx.rotate(.38*dir);ctx.globalAlpha=alpha*.6;}
  const bw=19,bh=23;
  ctx.beginPath();ctx.ellipse(0,bh+3,bw*.72,4.5,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.28)';ctx.fill();
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=5.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-dir*bw*.75,bh*.4);ctx.quadraticCurveTo(-dir*bw*1.7,-bh*.1,-dir*bw*1.3,-bh*.75);ctx.stroke();ctx.restore();
  ctx.fillStyle=color;[-7,7].forEach(lx=>{ctx.beginPath();ctx.ellipse(lx,bh+3,5.5,7,0,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle=color;ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);ctx.fill();
  if(pattern==='striped'){ctx.save();ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);ctx.clip();ctx.strokeStyle=dk(color,.28);ctx.lineWidth=4;for(let i=-40;i<40;i+=8){ctx.beginPath();ctx.moveTo(i,-bh);ctx.lineTo(i,bh);ctx.stroke();}ctx.restore();}
  else if(pattern==='spotted'){ctx.save();ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);ctx.clip();ctx.fillStyle=dk(color,.28);[[-6,-9,4.5],[8,1,3.5],[-3,10,3.5],[9,-4,3]].forEach(([sx,sy,sr])=>{ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();});ctx.restore();}
  else if(pattern==='tuxedo'){ctx.save();ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);ctx.clip();ctx.fillStyle='#080f1a';ctx.beginPath();ctx.ellipse(0,4,bw*.46,bh*.6,0,0,Math.PI*2);ctx.fill();ctx.restore();}
  [[-1],[1]].forEach(([s])=>{ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(s*7,-bh+3);ctx.lineTo(s*15,-bh-11);ctx.lineTo(s*3,-bh-2);ctx.fill();ctx.fillStyle=lt(color,.36);ctx.beginPath();ctx.moveTo(s*7,-bh+2);ctx.lineTo(s*13,-bh-8);ctx.lineTo(s*4,-bh);ctx.fill();});
  const vx=dir*4;
  const vg=ctx.createRadialGradient(vx-2,-6,1,vx,-4,13);vg.addColorStop(0,'rgba(190,235,255,.88)');vg.addColorStop(1,'rgba(60,140,220,.6)');
  ctx.fillStyle=vg;ctx.beginPath();ctx.ellipse(vx,-4,12,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.34)';ctx.beginPath();ctx.ellipse(vx-3,-7,5,3,-.5,0,Math.PI*2);ctx.fill();
  if(!dead){
    [{ex:vx-5,ey:-5},{ex:vx+4,ey:-5}].forEach(({ex,ey})=>{ctx.fillStyle='white';ctx.beginPath();ctx.arc(ex,ey,3.5,0,Math.PI*2);ctx.fill();ctx.fillStyle=eye;ctx.beginPath();ctx.arc(ex,ey,2.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(ex+.3,ey,1,1.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.8)';ctx.beginPath();ctx.arc(ex+1,ey-1,.7,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#ff88aa';ctx.beginPath();ctx.arc(vx+dir*7.5,-1,2.5,0,Math.PI*2);ctx.fill();
    ctx.save();ctx.strokeStyle='rgba(255,255,255,.38)';ctx.lineWidth=.8;const wx=vx+dir*7.5;[0,2,-2].forEach(dy=>{ctx.beginPath();ctx.moveTo(wx,-1);ctx.lineTo(wx+dir*12,dy);ctx.stroke();});ctx.restore();
  } else {
    [{ex:vx-5,ey:-5},{ex:vx+4,ey:-5}].forEach(({ex,ey})=>{ctx.save();ctx.strokeStyle='#ff3333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ex-3,ey-3);ctx.lineTo(ex+3,ey+3);ctx.moveTo(ex+3,ey-3);ctx.lineTo(ex-3,ey+3);ctx.stroke();ctx.restore();});
  }
  drawHat(ctx,hat,dir,bw,bh);
  if(name){ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillText(name,1,bh+17);ctx.fillStyle=isPlayer?'#00ffaa':'white';ctx.fillText(name,0,bh+16);}
  ctx.restore();
}

function drawHat(ctx,hat,dir,bw,bh){
  const ty=-bh-12;ctx.save();
  switch(hat){
    case'crown':ctx.fillStyle='#ffd700';ctx.beginPath();ctx.moveTo(-11,ty+6);ctx.lineTo(-9,ty-5);ctx.lineTo(-3,ty+2);ctx.lineTo(0,ty-8);ctx.lineTo(3,ty+2);ctx.lineTo(9,ty-5);ctx.lineTo(11,ty+6);ctx.closePath();ctx.fill();ctx.fillStyle='#ff4444';[0,-7,7].forEach(jx=>{ctx.beginPath();ctx.arc(jx,ty-3,2,0,Math.PI*2);ctx.fill();});break;
    case'tophat':ctx.fillStyle='#1a1a1a';ctx.fillRect(-9,ty-13,18,13);ctx.fillRect(-12,ty,24,4);ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(-9,ty-13,18,13);break;
    case'cowboy':ctx.fillStyle='#8B6914';ctx.beginPath();ctx.ellipse(0,ty+2,13,4.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#a07820';ctx.beginPath();ctx.ellipse(0,ty-4,8,8,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8B6914';ctx.fillRect(-8,ty-6,16,6);break;
    case'wizard':ctx.fillStyle='#6633aa';ctx.beginPath();ctx.moveTo(-9,ty+4);ctx.lineTo(0,ty-19);ctx.lineTo(9,ty+4);ctx.closePath();ctx.fill();ctx.fillStyle='#4422aa';ctx.beginPath();ctx.ellipse(0,ty+4,11,3.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffdd00';[[0,ty-10],[-5,ty-4],[5,ty-2]].forEach(([sx,sy])=>{ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fill();});break;
    case'flower':ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(0,ty-2,4.5,0,Math.PI*2);ctx.fill();['#ff6688','#ff88cc','#ff44aa','#ffaa66','#ff66aa'].forEach((pc,i)=>{const a=i/5*Math.PI*2;ctx.fillStyle=pc;ctx.beginPath();ctx.ellipse(Math.cos(a)*8,ty-2+Math.sin(a)*8,4,3,a,0,Math.PI*2);ctx.fill();});ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(0,ty-2,3.5,0,Math.PI*2);ctx.fill();break;
    case'halo':ctx.save();ctx.strokeStyle='#ffee66';ctx.lineWidth=3;ctx.shadowColor='#ffee66';ctx.shadowBlur=10;ctx.beginPath();ctx.ellipse(0,ty-7,10,3.5,0,0,Math.PI*2);ctx.stroke();ctx.restore();break;
    case'propeller':ctx.fillStyle='#cc3333';ctx.beginPath();ctx.arc(0,ty-5,3.5,0,Math.PI*2);ctx.fill();const pa=Date.now()/300;for(let i=0;i<3;i++){ctx.save();ctx.translate(0,ty-5);ctx.rotate(pa+i*2.09);ctx.fillStyle='#5588ff';ctx.beginPath();ctx.ellipse(7,0,7,3,0,0,Math.PI*2);ctx.fill();ctx.restore();}break;
    case'xmas':ctx.fillStyle='#cc2222';ctx.beginPath();ctx.moveTo(-9,ty+4);ctx.lineTo(0,ty-17);ctx.lineTo(9,ty+4);ctx.closePath();ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,ty-17,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(0,ty-5,1.5,0,Math.PI*2);ctx.fill();break;
    case'party':ctx.fillStyle='#ff6622';ctx.beginPath();ctx.moveTo(-8,ty+4);ctx.lineTo(0,ty-16);ctx.lineTo(8,ty+4);ctx.closePath();ctx.fill();['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff'].forEach((pc,i)=>{const a=i/5*Math.PI*2-Math.PI/2;ctx.fillStyle=pc;ctx.beginPath();ctx.arc(Math.cos(a)*14,ty-8+Math.sin(a)*4,2,0,Math.PI*2);ctx.fill();});break;
    case'horns':ctx.fillStyle='#cc2200';[[-7,ty+3],[7,ty+3]].forEach(([hx,hy])=>{ctx.beginPath();ctx.moveTo(hx-4,hy+2);ctx.lineTo(hx,hy-12);ctx.lineTo(hx+4,hy+2);ctx.closePath();ctx.fill();});break;
    case'bow':ctx.fillStyle='#ff44aa';[-1,1].forEach(s=>{ctx.save();ctx.translate(s*6,ty-2);ctx.beginPath();ctx.ellipse(0,0,7,4,s*.5,0,Math.PI*2);ctx.fill();ctx.restore();});ctx.fillStyle='#ff66cc';ctx.beginPath();ctx.arc(0,ty-2,3,0,Math.PI*2);ctx.fill();break;
  }
  ctx.restore();
}

function dk(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${~~(r*(1-a))},${~~(g*(1-a))},${~~(b*(1-a))})`;}
function lt(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${~~(r+(255-r)*a)},${~~(g+(255-g)*a)},${~~(b+(255-b)*a)})`;}
function h2rgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}

// ══ GAME STATE ══
let G={},gameRunning=false,keys={},camX=0,camY=0;
let raf=null,mtIv=null,_cfIv=null,_scIv=null,lastT=0;
const BNAMES=['Bigodes','Fofinha','Garfield','Felix','Luna','Bolota'];
const BCLRS=['#4488ff','#00cc55','#ff8800','#9933ff','#00ccff','#cc7733'];
const BEYES=['#44aaff','#ffaa00','#00ee66','#ff3344','#ffffff','#aa44ff'];
const BHATS=['none','crown','flower','tophat','cowboy','wizard'];
const BPATS=['solid','striped','spotted','tuxedo','solid','solid'];

function resizeGc(){gc.width=Math.min(innerWidth,WW);gc.height=Math.min(innerHeight,WH);}

function startGame(){

  };

  }

function pickT(b){
  if(!b.alive)return;
  const r=ROOMS[Math.floor(Math.random()*ROOMS.length)];
  b.tRoom=r;b.tX=r.x+25+Math.random()*(r.w-50);b.tY=r.y+25+Math.random()*(r.h-50);b.timer=90+Math.random()*150;
}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function updBots(dt){
  if(G.phase!=='play')return;
  G.bots.forEach(b=>{
    if(!b.alive)return;
    if(b.isImp){
      b.killCD-=dt;
      if(b.killCD<=0){const tgts=[G.player,...G.bots].filter(c=>c.alive&&!c.isImp&&c.id!==b.id&&dst(b,c)<52);if(tgts.length){kill(tgts[0],b);b.killCD=12+Math.random()*8;return;}}
      if(b.killCD<6){const crew=[G.player,...G.bots].filter(c=>c.alive&&!c.isImp);if(crew.length){const nr=crew.sort((a,c)=>dst(b,a)-dst(b,c))[0];b.tX=nr.x;b.tY=nr.y;}}
    }
    const dx=b.tX-b.x,dy=b.tY-b.y,d=Math.hypot(dx,dy);
    if(d>5){const nx=b.x+dx/d*b.spd,ny=b.y+dy/d*b.spd;if(walkable(nx,b.y))b.x=nx;if(walkable(b.x,ny))b.y=ny;b.dir=dx>0?1:-1;}
    else{b.timer-=dt;if(b.timer<=0)pickT(b);}
  });
}

function kill(t,by){
  t.alive=false;
  G.bodies.push({x:t.x,y:t.y,color:t.color,eye:t.eye,hat:t.hat,pattern:t.pattern,name:t.name,dir:t.dir,reported:false});
  if(t.isPlayer)showNotif(`😿 Você foi eliminado por ${by.name}! Vire fantasma...`);
  checkWin();
}

function updPlayer(dt){
  if(G.phase!=='play')return;
  const p=G.player;if(!p.alive)return;
  let vx=0,vy=0;
  if(keys.ArrowLeft||keys.KeyA)vx=-1;if(keys.ArrowRight||keys.KeyD)vx=1;
  if(keys.ArrowUp||keys.KeyW)vy=-1;if(keys.ArrowDown||keys.KeyS)vy=1;
  if(_jvx||_jvy){vx=_jvx;vy=_jvy;}
  if(vx&&vy){vx*=.707;vy*=.707;}
  const nx=p.x+vx*p.spd,ny=p.y+vy*p.spd;
  if(vx&&walkable(nx,p.y))p.x=nx;if(vy&&walkable(p.x,ny))p.y=ny;
  if(vx)p.dir=vx>0?1:-1;
  if(p.isImp&&p.killCD>0)p.killCD-=dt/60;
  camX=Math.max(0,Math.min(p.x-gc.width/2,WW-gc.width));
  camY=Math.max(0,Math.min(p.y-gc.height/2,WH-gc.height));
  updUseBtn();
}

function updUseBtn(){
  const p=G.player,ub=document.getElementById('usebtn');
  if(!p.alive||G.phase!=='play'){ub.style.display='none';return;}
  if(dst(p,EMG)<48&&!G.emergUsed){ub.style.display='block';ub.textContent='🚨 Reunião!';return;}
  const nT=G.tasks.find(t=>!t.done&&dst(p,t)<42);
  if(nT){ub.style.display='block';ub.textContent='⚡ '+nT.lbl;return;}
  const nB=G.bodies.find(b=>!b.reported&&dst(p,b)<46);
  if(nB){ub.style.display='block';ub.textContent='📢 Reportar corpo!';return;}
  ub.style.display='none';
}

function tryUse(){
  const p=G.player;if(G.phase!=='play'||!p.alive)return;
  if(dst(p,EMG)<48&&!G.emergUsed){G.emergUsed=true;meeting('emergency',p.name,null);return;}
  const nT=G.tasks.find(t=>!t.done&&dst(p,t)<42);if(nT){openTask(nT);return;}
  const nB=G.bodies.find(b=>!b.reported&&dst(p,b)<46);if(nB){nB.reported=true;meeting('body',p.name,nB);return;}
}

function tryKill(){
  const p=G.player;if(!p.isImp||!p.alive||p.killCD>0)return;
  const t=G.bots.filter(b=>b.alive&&!b.isImp&&dst(p,b)<58).sort((a,b)=>dst(p,a)-dst(p,b))[0];
  if(t){kill(t,p);p.killCD=18;showNotif('☠️ '+t.name+' eliminado!');}
  else showNotif('Chegue mais perto de alguém!');
}

// ══ MEETING ══
function meeting(type,caller,body){
  G.phase='meeting';clearInterval(mtIv);
  clearInterval(_cfIv);_cfIv=null;
  document.getElementById('task-ov').classList.remove('active');
  document.getElementById('usebtn').style.display='none';
  const ov=document.getElementById('meet-ov');ov.classList.add('active');
  document.getElementById('mtitle').textContent=type==='body'?'💀 CORPO ENCONTRADO!':'🚨 REUNIÃO DE EMERGÊNCIA!';
  document.getElementById('msub').textContent=type==='body'?`${caller} encontrou ${body.name}. Quem foi?`:`${caller} convocou uma reunião. Discutam!`;
  G.voted=false;
  const vg=document.getElementById('vgrid');vg.innerHTML='';
  const alive=[G.player,...G.bots].filter(c=>c.alive);
  alive.forEach(c=>{
    const card=document.createElement('div');card.className='vcard';
    const mc=document.createElement('canvas');mc.width=58;mc.height=70;
    drawCat(mc.getContext('2d'),29,44,{color:c.color,eye:c.eye,hat:c.hat,pattern:c.pattern,dir:1,scale:1.1});
    card.appendChild(mc);const nd=document.createElement('div');nd.className='vname';nd.textContent=(c.isPlayer?'👤 ':'')+c.name;card.appendChild(nd);
    card.onclick=()=>doVote(c.id,card);vg.appendChild(card);
  });
  const skip=document.createElement('div');skip.className='vcard skip';skip.innerHTML='<div style="font-size:1.3rem;margin-bottom:5px">⏭️</div><div class="vname">Pular</div>';skip.onclick=()=>doVote('skip',skip);vg.appendChild(skip);
  let t=20;document.getElementById('vtimer').textContent='⏱ '+t;
  mtIv=setInterval(()=>{t--;const el=document.getElementById('vtimer');if(el)el.textContent='⏱ '+t;if(t<=0){clearInterval(mtIv);endMeeting('skip');}},1000);
}

function doVote(tid,card){
  if(G.voted)return;G.voted=true;
  document.querySelectorAll('.vcard').forEach(c=>c.style.pointerEvents='none');card.classList.add('voted');
  const votes={};if(tid!=='skip')votes[tid]=(votes[tid]||0)+2;
  G.bots.filter(b=>b.alive).forEach(b=>{
    const al=[G.player,...G.bots].filter(c=>c.alive&&c.id!==b.id);
    if(al.length&&Math.random()>.22){
      const tgt=b.isImp?(al.filter(c=>!c.isImp)[Math.floor(Math.random()*al.filter(c=>!c.isImp).length)]||al[0]):al[Math.floor(Math.random()*al.length)];
      if(tgt)votes[tgt.id]=(votes[tgt.id]||0)+1;
    }
  });
  setTimeout(()=>{clearInterval(mtIv);let mx=0,ej='skip';Object.entries(votes).forEach(([id,v])=>{if(v>mx){mx=v;ej=id;}});endMeeting(ej);},1500);
}

function endMeeting(ejId){
  clearInterval(mtIv);document.getElementById('meet-ov').classList.remove('active');G.phase='play';
  if(ejId==='skip'){showNotif('🗳️ Ninguém expulso. Continue!');return;}
  const ej=[G.player,...G.bots].find(c=>c.id===ejId);
  if(ej){ej.alive=false;showNotif(ej.isPlayer?`🚀 Você foi expulso! ${ej.isImp?'Você era o impostor 😈':'Você era inocente 😢'}`:`🚀 ${ej.name} foi expulso! ${ej.isImp?'Era o impostor! 🎉':'Era inocente 😢'}`);}
  checkWin();
}

function checkWin(){
  const imp=[G.player,...G.bots].find(c=>c.isImp);
  const crew=[G.player,...G.bots].filter(c=>c.alive&&!c.isImp);
  if(!imp.alive){setTimeout(()=>endGame(true,'O impostor foi eliminado! 🎉'),600);return;}
  if(G.tasks.every(t=>t.done)){setTimeout(()=>endGame(true,'Todas as tarefas completas! 🎊'),600);return;}
  if(crew.length<=1){setTimeout(()=>endGame(false,`${imp.name} eliminou todos! 😈`),700);}
}
function endGame(cw,msg){
  G.phase='end';gameRunning=false;
  document.getElementById('end-ov').classList.add('active');
  const t=document.getElementById('etitle');t.textContent=cw?'🎉 Tripulação Vence!':'😈 Impostor Vence!';t.style.color=cw?'#00ff88':'#ff4444';
  document.getElementById('esub').textContent=msg;
}

// ══ RENDER ══
function drawMap(){
  ctx.fillStyle='#040710';ctx.fillRect(0,0,gc.width,gc.height);
  CORR.forEach(r=>{ctx.fillStyle='#07101e';ctx.fillRect(r.x-camX,r.y-camY,r.w,r.h);ctx.strokeStyle='rgba(255,255,255,.02)';ctx.lineWidth=1;for(let gy=r.y;gy<r.y+r.h;gy+=28){ctx.beginPath();ctx.moveTo(r.x-camX,gy-camY);ctx.lineTo(r.x+r.w-camX,gy-camY);ctx.stroke();}});
  ROOMS.forEach(r=>{
    const g=ctx.createLinearGradient(r.x-camX,r.y-camY,r.x+r.w-camX,r.y+r.h-camY);g.addColorStop(0,r.clr);g.addColorStop(1,lt(r.clr,.04));ctx.fillStyle=g;ctx.fillRect(r.x-camX,r.y-camY,r.w,r.h);
    ctx.strokeStyle='rgba(100,160,255,.1)';ctx.lineWidth=2;ctx.strokeRect(r.x-camX,r.y-camY,r.w,r.h);
    ctx.strokeStyle='rgba(255,255,255,.025)';ctx.lineWidth=1;for(let gx=r.x;gx<r.x+r.w;gx+=28){ctx.beginPath();ctx.moveTo(gx-camX,r.y-camY);ctx.lineTo(gx-camX,r.y+r.h-camY);ctx.stroke();}for(let gy=r.y;gy<r.y+r.h;gy+=28){ctx.beginPath();ctx.moveTo(r.x-camX,gy-camY);ctx.lineTo(r.x+r.w-camX,gy-camY);ctx.stroke();}
    ctx.font='bold 10px Arial';ctx.fillStyle='rgba(255,255,255,.26)';ctx.textAlign='center';ctx.fillText(r.lbl,r.x+r.w/2-camX,r.y+16-camY);
    if(r.em){const bx=EMG.x-camX,by=EMG.y-camY,p=Math.sin(Date.now()/400)*.3+.7;ctx.beginPath();ctx.arc(bx,by,EMG.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,${~~(50*p)},${~~(50*p)},${p*.88})`;ctx.fill();ctx.strokeStyle='#ff6666';ctx.lineWidth=2;ctx.stroke();ctx.font='12px Arial';ctx.textAlign='center';ctx.fillText('🚨',bx,by+5);}
  });
  G.tasks.forEach(t=>{
    const tx=t.x-camX,ty=t.y-camY;
    if(t.done){ctx.beginPath();ctx.arc(tx,ty,13,0,Math.PI*2);ctx.fillStyle='rgba(0,255,136,.1)';ctx.fill();ctx.strokeStyle='#00ff88';ctx.lineWidth=2;ctx.stroke();ctx.font='12px Arial';ctx.textAlign='center';ctx.fillText('✅',tx,ty+5);}
    else{const p=Math.sin(Date.now()/600)*.35+.65;ctx.beginPath();ctx.arc(tx,ty,13,0,Math.PI*2);const {r,g,b}=h2rgb(t.clr);ctx.fillStyle=`rgba(${r},${g},${b},${p*.33})`;ctx.fill();ctx.strokeStyle=t.clr;ctx.lineWidth=2;ctx.stroke();ctx.font='12px Arial';ctx.textAlign='center';ctx.fillText('❗',tx,ty+4);}
  });
}

function drawBodies(){G.bodies.forEach(b=>{drawCat(ctx,b.x-camX,b.y-camY,{color:b.color,eye:b.eye,hat:b.hat,pattern:b.pattern,name:b.name,dead:true,dir:b.dir});});}

function drawChars(){
  G.bots.forEach(b=>{if(!b.alive)return;drawCat(ctx,b.x-camX,b.y-camY,{color:b.color,eye:b.eye,hat:b.hat,pattern:b.pattern,name:b.name,dir:b.dir});});
  const p=G.player;drawCat(ctx,p.x-camX,p.y-camY,{color:p.color,eye:p.eye,hat:p.hat,pattern:p.pattern,name:p.name,dir:p.dir,dead:!p.alive,alpha:p.alive?1:.45,isPlayer:true});
}

function drawHUD2(){
  const p=G.player,kb=document.getElementById('killbtn');
  if(p.isImp&&p.alive){kb.style.display='block';const near=G.bots.some(b=>b.alive&&!b.isImp&&dst(p,b)<58);const rdy=near&&p.killCD<=0;kb.classList.toggle('rdy',rdy);kb.textContent=p.killCD>0?`☠️ ${Math.ceil(p.killCD)}s`:'☠️ Matar';}
  else kb.style.display='none';
  if(p.isImp){ctx.font='bold 11px Arial';ctx.fillStyle='#ff3355';ctx.textAlign='left';ctx.fillText('😈 VOCÊ É O IMPOSTOR',10,gc.height-12);}
  const done=G.tasks.filter(t=>t.done).length;ctx.font='10px Arial';ctx.fillStyle='rgba(255,255,255,.38)';ctx.textAlign='right';ctx.fillText(`Tarefas: ${done}/${G.tasks.length}`,gc.width-10,gc.height-12);
}

function loop(ts){
  if(!gameRunning)return;
  const dt=Math.min((ts-lastT)/16,3);lastT=ts;
  updPlayer(dt);updBots(dt);drawMap();drawBodies();drawChars();drawHUD2();
  raf=requestAnimationFrame(loop);
}

// ══ INPUT ══
addEventListener('keydown',e=>{keys[e.code]=true;if((e.code==='KeyE'||e.code==='Space')&&G.phase==='play'){e.preventDefault();tryUse();}if(e.code==='KeyK'&&G.phase==='play')tryKill();});
addEventListener('keyup',e=>{keys[e.code]=false;});

// ══ JOYSTICK ══
let _jvx=0,_jvy=0;
const jz=document.getElementById('jzone'),jt=document.getElementById('jthumb');
function handleJoy(e){
  const rect=jz.getBoundingClientRect(),cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const touch=e.touches?e.touches[0]:e,dx=touch.clientX-cx,dy=touch.clientY-cy;
  const d=Math.hypot(dx,dy),max=48,cl=Math.min(d,max),ndx=dx/Math.max(d,1),ndy=dy/Math.max(d,1);
  jt.style.transform=`translate(calc(-50% + ${ndx*cl}px),calc(-50% + ${ndy*cl}px))`;
  _jvx=d>8?ndx:0;_jvy=d>8?ndy:0;
}
jz.addEventListener('touchstart',handleJoy,{passive:true});
jz.addEventListener('touchmove',handleJoy,{passive:true});
jz.addEventListener('touchend',()=>{_jvx=0;_jvy=0;jt.style.transform='translate(-50%,-50%)';},{passive:true});

// ══ SCREEN ══
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='customize')updPrev();}
function closeOv(id){document.getElementById(id).classList.remove('active');}
function closeAllOv(){document.querySelectorAll('.ov').forEach(o=>o.classList.remove('active'));}

// ══ NOTIF ══
function showNotif(msg){const old=document.querySelector('.notif');if(old)old.remove();const el=document.createElement('div');el.className='notif';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3200);}

addEventListener('resize',resizeGc);
buildUI();
</script>
