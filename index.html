<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐱 Gatos no Espaço</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050810;color:#fff;font-family:'Segoe UI',Arial,sans-serif}
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
#menu{background:radial-gradient(ellipse at 50% 30%,#0d1b3e 0%,#030810 100%)}
.title{font-size:clamp(2rem,5vw,3.2rem);font-weight:900;background:linear-gradient(135deg,#ff9a6c,#ff6b9d,#c44dff,#7af);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;text-align:center}
.subtitle{color:#446;font-size:1rem;margin-bottom:44px}
.mbtn{background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;padding:13px 42px;border-radius:30px;font-size:1rem;font-weight:700;cursor:pointer;margin:6px;box-shadow:0 4px 20px #667eea44;transition:transform .15s,box-shadow .15s}
.mbtn:hover{transform:translateY(-2px);box-shadow:0 6px 28px #667eea55}
.mbtn.sec{background:linear-gradient(135deg,#1a1a3a,#0d0d20);box-shadow:none}
#star-c{position:fixed;inset:0;pointer-events:none;z-index:0}
.menu-ct{position:relative;z-index:1;text-align:center}
#customize{background:radial-gradient(ellipse at 50% 30%,#0d1b3e,#030810);flex-direction:row;gap:0}
.cl{width:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;border-right:1px solid #1a2a4a}
.cr{flex:1;padding:20px 28px;overflow-y:auto;display:flex;flex-direction:column;gap:18px;max-height:100vh}
.pvbox{width:220px;height:220px;background:#0d1530;border-radius:14px;border:2px solid #1e3a6a;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.slbl{font-size:.68rem;text-transform:uppercase;letter-spacing:1.5px;color:#446;font-weight:700;margin-bottom:8px}
.cgrid{display:flex;flex-wrap:wrap;gap:6px}
.cbtn{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
.cbtn.sel{border-color:#fff;transform:scale(1.25)}
.hgrid{display:flex;flex-wrap:wrap;gap:6px}
.hbtn{padding:6px 10px;background:#0d1530;border:2px solid #1e3a6a;border-radius:8px;cursor:pointer;font-size:1rem;transition:all .15s;text-align:center}
.hbtn.sel{border-color:#667eea;background:#1a2a6a}
.pgrid{display:flex;flex-wrap:wrap;gap:6px}
.pbtn{padding:6px 13px;background:#0d1530;border:2px solid #1e3a6a;border-radius:8px;cursor:pointer;font-size:.78rem;color:#99a;transition:all .15s}
.pbtn.sel{border-color:#667eea;color:#fff}
.ninput{background:#0d1530;border:2px solid #1e3a6a;color:#fff;padding:9px 12px;border-radius:9px;font-size:.95rem;width:100%;outline:none}
.ninput:focus{border-color:#667eea}
.playbtn{background:linear-gradient(135deg,#00c6ff,#0072ff);border:none;color:#fff;padding:14px;border-radius:13px;font-size:.95rem;font-weight:700;cursor:pointer;width:100%;margin-top:8px;transition:transform .15s}
.playbtn:hover{transform:translateY(-2px)}
.back{background:none;border:none;color:#446;cursor:pointer;font-size:.82rem;margin-top:8px}
#game{background:#000;padding:0;justify-content:flex-start;align-items:flex-start}
#gc{position:absolute;top:0;left:0}
.ov{display:none;position:fixed;inset:0;background:rgba(3,6,20,.93);z-index:200;align-items:center;justify-content:center;flex-direction:column}
.ov.active{display:flex}
#role-ov .rcard{background:#0d1b3e;border-radius:18px;padding:36px 52px;text-align:center;border:2px solid #2a4a8a;max-width:340px}
.ri{font-size:3.5rem;margin-bottom:10px}
.rt{font-size:1.6rem;font-weight:800;margin-bottom:8px}
.rd{color:#889;font-size:.85rem;line-height:1.65;margin-bottom:22px;white-space:pre-line}
#meet-ov{background:rgba(2,4,15,.97)}
.mtitle{font-size:1.7rem;font-weight:800;color:#ff4444;margin-bottom:6px}
.msub{color:#778;font-size:.83rem;margin-bottom:22px}
.vgrid{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:660px;margin-bottom:18px}
.vcard{background:#0d1b3e;border:2px solid #1e3a6a;border-radius:12px;padding:12px 14px;cursor:pointer;text-align:center;min-width:105px;transition:all .15s}
.vcard:hover{border-color:#667eea;background:#162a5a}
.vcard.voted{border-color:#00ff88;background:#002a16;pointer-events:none}
.vcard.skip{border-color:#ff8800}
.vname{font-size:.74rem;color:#ccd;margin-top:6px}
.vtimer{font-size:1.25rem;font-weight:700;color:#ff8800;margin-top:12px}
#task-ov .tbox{background:#0d1b3e;border:2px solid #1e3a6a;border-radius:16px;padding:28px 34px;text-align:center;min-width:310px;max-width:420px}
.ttitle{font-size:1.15rem;font-weight:700;color:#c8d8ff;margin-bottom:16px}
.tbtn{background:#162a5a;border:2px solid #2a5aff;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.9rem;margin:4px;transition:all .15s}
.tbtn:hover{background:#2a5aff}
.tcls{background:none;border:1px solid #223;color:#556;padding:7px 16px;border-radius:7px;cursor:pointer;margin-top:12px}
#end-ov .ebox{text-align:center}
.etitle{font-size:2.6rem;font-weight:900;margin-bottom:10px}
.esub{color:#778;margin-bottom:26px;font-size:.93rem}
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
.taskbar{position:absolute;top:13px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.76);border-radius:18px;padding:7px 18px;min-width:250px;text-align:center}
.tblbl{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:#778;margin-bottom:3px}
.tbtrack{height:8px;background:#111;border-radius:8px;overflow:hidden}
.tbfill{height:100%;background:linear-gradient(to right,#00ff88,#00cc66);border-radius:8px;transition:width .5s}
.killbtn{position:absolute;bottom:22px;right:18px;background:#cc2244;border:none;color:#fff;padding:13px 20px;border-radius:14px;font-size:.9rem;font-weight:700;cursor:pointer;pointer-events:all;display:none;opacity:.35;transition:opacity .2s,transform .15s}
.killbtn.rdy{opacity:1;box-shadow:0 0 18px #ff335577}
.killbtn:active{transform:scale(.95)}
.usebtn{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);background:#1a3ecc;border:none;color:#fff;padding:12px 22px;border-radius:14px;font-size:.85rem;font-weight:700;cursor:pointer;pointer-events:all;display:none;white-space:nowrap}
#jzone{position:absolute;bottom:18px;left:18px;width:120px;height:120px;display:none;pointer-events:all}
.jbase{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.14)}
.jthumb{position:absolute;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.28);border:2px solid rgba(255,255,255,.45);top:50%;left:50%;transform:translate(-50%,-50%);transition:transform .05s}
.notif{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:rgba(255,50,50,.9);color:#fff;padding:9px 20px;border-radius:26px;font-weight:700;z-index:999;pointer-events:none;white-space:nowrap;font-size:.85rem;animation:fi 3.2s forwards}
@keyframes fi{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
@keyframes scanRot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@media(max-width:600px){#customize{flex-direction:column}.cl{width:100%;border-right:none;border-bottom:1px solid #1a2a4a;padding:16px;flex-direction:row;gap:16px;justify-content:center}.cr{padding:14px}#jzone{display:block}}
</style>
</head>
<body>
<canvas id="star-c"></canvas>

<!-- INTRO -->
<div id="intro-ov" style="position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer" onclick="skipIntro()">
  <canvas id="intro-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <div id="intro-tap" style="position:absolute;bottom:38px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.45);font-size:.85rem;letter-spacing:2px;pointer-events:none;animation:fi 2s ease-in-out infinite alternate">Toque para começar</div>
  <div style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:.7rem;letter-spacing:1.5px;pointer-events:none;white-space:nowrap;animation:blink 1.1s step-start infinite;color:rgba(180,140,255,0.7)">criado por Sarah e Sidney</div>
</div>

<!-- MENU -->
<div class="screen" id="menu">
  <div class="menu-ct">
    <div style="font-size:2.8rem;margin-bottom:6px">🐱🚀🐱</div>
    <div class="title">Gatos no Espaço</div>
    <div class="subtitle">Among Us com gatinhos fofos</div>
    <button class="mbtn" onclick="go('customize')">🎮 Jogar</button><br>
    <button class="mbtn sec" onclick="showNotif('WASD/setas: mover  ·  E ou Espaço: usar/interagir  ·  K: matar (impostor)  ·  Clique nas tarefas ❗ para fazer  ·  Reporte corpos 📢 e vote!')">📖 Como Jogar</button>
  </div>
</div>

<!-- PERSONALIZAÇÃO -->
<div class="screen" id="customize">
  <div class="cl">
    <div class="pvbox"><canvas id="prev" width="210" height="210"></canvas></div>
    <button class="playbtn" onclick="startGame()">🚀 Jogar!</button>
    <button class="back" onclick="go('menu')">← Voltar</button>
  </div>
  <div class="cr">
    <div><div class="slbl">Nome</div><input class="ninput" id="pname" maxlength="12" value="Gatão" oninput="updPrev()"></div>
    <div><div class="slbl">Cor do pelo</div><div class="cgrid" id="cgrid"></div></div>
    <div><div class="slbl">Chapéu</div><div class="hgrid" id="hgrid"></div></div>
    <div><div class="slbl">Pelagem</div><div class="pgrid" id="pgrid"></div></div>
    <div><div class="slbl">Cor dos olhos</div><div class="cgrid" id="egrid"></div></div>
  </div>
</div>

<!-- JOGO -->
<div class="screen" id="game">
  <canvas id="gc"></canvas>
  <!-- TELA DE EJEÇÃO -->
  <canvas id="eject-c" style="display:none;position:fixed;inset:0;z-index:900;width:100%;height:100%;"></canvas>
  <div id="hud">
    <div class="taskbar">
      <div class="tblbl">Tarefas da tripulação</div>
      <div class="tbtrack"><div class="tbfill" id="tbfill" style="width:0"></div></div>
    </div>
    <button class="killbtn" id="killbtn" onclick="tryKill()">☠️ Matar</button>
    <button class="usebtn" id="usebtn" onclick="tryUse()">⚡ Usar</button>
    <div id="jzone"><div class="jbase"></div><div class="jthumb" id="jthumb"></div></div>
  </div>
</div>

<!-- ROLE -->
<div class="ov" id="role-ov">
  <div class="rcard">
    <div class="ri" id="ri"></div>
    <div class="rt" id="rt"></div>
    <div class="rd" id="rd"></div>
    <button class="mbtn" onclick="closeOv('role-ov');G.phase='play';gameRunning=true;lastT=performance.now();loop(lastT)">Começar! 🚀</button>
  </div>
</div>

<!-- MEETING -->
<div class="ov" id="meet-ov">
  <div style="text-align:center">
    <div class="mtitle" id="mtitle"></div>
    <div class="msub" id="msub"></div>
    <div class="vgrid" id="vgrid"></div>
    <div class="vtimer" id="vtimer"></div>
  </div>
</div>

<!-- TASK -->
<div class="ov" id="task-ov">
  <div class="tbox">
    <div class="ttitle" id="ttitle"></div>
    <div id="tcontent"></div>
    <button class="tcls" onclick="closeTask()">✕ Fechar</button>
  </div>
</div>

<!-- REFEIT TASK OVERLAY -->
<div id="refeit-ov" style="display:none;position:fixed;inset:0;z-index:600;background:#000;overflow:hidden">
  <canvas id="refeit-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <button ontouchstart="refeitTap(event)" onmousedown="refeitTap(event)"
    style="position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
    background:linear-gradient(135deg,#cc6600,#ff9900);border:none;color:#fff;
    padding:20px 48px;border-radius:20px;font-size:1.3rem;font-weight:900;
    cursor:pointer;box-shadow:0 0 24px #ff880066;letter-spacing:1px;
    user-select:none;-webkit-user-select:none;touch-action:manipulation;z-index:2">
    🥪 DISTRIBUIR
  </button>
  <button onclick="closeRefeitTask()" style="position:absolute;top:18px;right:18px;background:rgba(0,0,0,.7);border:1px solid #444;color:#888;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;z-index:2">✕ Fechar</button>
</div>

<!-- BEDS TASK OVERLAY -->
<div id="beds-ov" style="display:none;position:fixed;inset:0;z-index:600;background:#000;overflow:hidden;cursor:default">
  <canvas id="beds-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <button onclick="closeBedsTask()" style="position:absolute;top:18px;right:18px;background:rgba(0,0,0,.7);border:1px solid #444;color:#888;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;z-index:2">✕ Fechar</button>
</div>

<!-- SANDBOX TASK OVERLAY -->
<div id="sandbox-ov" style="display:none;position:fixed;inset:0;z-index:600;background:#000;overflow:hidden;cursor:default">
  <canvas id="sandbox-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <button onclick="closeSandboxTask()" style="position:absolute;top:18px;right:18px;background:rgba(0,0,0,.7);border:1px solid #444;color:#888;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;z-index:2">✕ Fechar</button>
</div>

<!-- SCRATCH TASK OVERLAY -->
<div id="scratch-ov" style="display:none;position:fixed;inset:0;z-index:600;background:#000;overflow:hidden">
  <canvas id="scratch-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <!-- progress bar -->
  <div style="position:absolute;right:32px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="color:#ff2200;font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);margin-bottom:4px">Velocidade</div>
    <div id="scratch-bar-wrap" style="width:22px;height:220px;background:#1a0000;border:2px solid #550000;border-radius:11px;overflow:hidden;display:flex;flex-direction:column-reverse">
      <div id="scratch-bar" style="width:100%;height:0%;background:linear-gradient(to top,#ff0000,#ff6600);border-radius:11px;transition:height .08s"></div>
    </div>
    <div style="color:#550000;font-size:.6rem">🐾</div>
  </div>
  <!-- mobile tap button -->
  <button id="scratch-tap-btn" ontouchstart="scratchTap(event)" onmousedown="scratchTap(event)"
    style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
    background:linear-gradient(135deg,#cc2200,#ff4400);border:none;color:#fff;
    padding:22px 52px;border-radius:20px;font-size:1.4rem;font-weight:900;
    cursor:pointer;box-shadow:0 0 28px #ff220066;letter-spacing:2px;
    user-select:none;-webkit-user-select:none;touch-action:manipulation">
    🐾 ARRANHAR
  </button>
  <!-- hint -->
  <div id="scratch-hint" style="position:absolute;bottom:28px;left:50%;transform:translateX(-50%);color:#550000;font-size:.82rem;letter-spacing:1px;text-align:center">Pressione <b style="color:#ff4400">CTRL</b> ou toque o botão o mais rápido possível!</div>
  <!-- close -->
  <button onclick="closeScratchTask()" style="position:absolute;top:18px;right:18px;background:none;border:1px solid #330000;color:#550000;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem">✕ Fechar</button>
</div>

<!-- CREW WIN CINEMATIC -->
<canvas id="crew-win-c" style="display:none;position:fixed;inset:0;z-index:950;width:100%;height:100%"></canvas>

<!-- END -->
<div class="ov" id="end-ov">
  <div class="ebox">
    <div class="etitle" id="etitle"></div>
    <div class="esub" id="esub"></div>
    <button class="mbtn" onclick="startGame()">🔄 Jogar Novamente</button><br>
    <button class="back" onclick="go('customize');closeAllOv()" style="margin-top:10px">← Personalizar</button>
  </div>
</div>

<script>
// ══ STARS ══
const SC=document.getElementById('star-c'),sCtx=SC.getContext('2d');
function drawStars(){SC.width=innerWidth;SC.height=innerHeight;for(let i=0;i<180;i++){const x=Math.random()*innerWidth,y=Math.random()*innerHeight,r=Math.random()*1.4+.2,a=Math.random()*.7+.2;sCtx.beginPath();sCtx.arc(x,y,r,0,Math.PI*2);sCtx.fillStyle=`rgba(255,255,255,${a})`;sCtx.fill();}}
drawStars();addEventListener('resize',drawStars);

// ══ CUSTOM DATA ══
// ══ INTRO ══
(function(){
  const cv=document.getElementById('intro-c');
  const ctx=cv.getContext('2d');
  let _raf,_done=false;

  // stars (fixed seed-like positions)
  const stars=Array.from({length:220},()=>({
    x:Math.random(),y:Math.random(),
    r:Math.random()*1.3+0.2,
    a:Math.random()*0.6+0.2,
    twinkle:Math.random()*Math.PI*2
  }));

  // diagonal light streaks like the reference image
  const streaks=[
    {x1:0.62,y1:0,x2:0.72,y2:1},
    {x1:0.70,y1:0,x2:0.80,y2:1},
  ];

  // flying cats
  const catColors=['#cc5500','#ddddff','#ff4444','#4488ff','#00cc55','#ffcc00','#9933ff'];
  const catEyes  =['#00ee66','#44aaff','#ffaa00','#ffffff','#ff3344','#aa44ff'];
  const catPats  =['solid','striped','spotted','tuxedo'];
  const catHats  =['none','crown','tophat','cowboy','wizard','flower','halo'];
  const cats=Array.from({length:7},(_,i)=>({
    x:Math.random(),y:Math.random(),
    vx:(Math.random()-0.5)*0.0018,
    vy:(Math.random()-0.5)*0.0018,
    rot:Math.random()*Math.PI*2,
    rotSpd:(Math.random()-0.5)*0.025,
    scale:0.9+Math.random()*1.4,
    color:catColors[i%catColors.length],
    eye:catEyes[i%catEyes.length],
    hat:catHats[i%catHats.length],
    pattern:catPats[i%catPats.length],
    dir:Math.random()<0.5?1:-1,
  }));

  // logo fade
  let logoAlpha=0,t=0;

  function frame(){
    if(_done)return;
    cv.width=innerWidth;cv.height=innerHeight;
    const W=cv.width,H=cv.height;
    t+=0.016;

    // bg
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    // stars
    stars.forEach(s=>{
      const tw=0.55+0.45*Math.sin(s.twinkle+t*1.8);
      ctx.globalAlpha=s.a*tw;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;

    // diagonal streaks
    streaks.forEach(s=>{
      const grd=ctx.createLinearGradient(s.x1*W,0,s.x2*W,H);
      grd.addColorStop(0,'rgba(255,255,255,0)');
      grd.addColorStop(0.3,'rgba(255,255,255,0.045)');
      grd.addColorStop(0.7,'rgba(255,255,255,0.045)');
      grd.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=grd;
      ctx.beginPath();
      ctx.moveTo(s.x1*W,0);ctx.lineTo(s.x2*W,H);
      ctx.lineTo((s.x2+0.09)*W,H);ctx.lineTo((s.x1+0.09)*W,0);
      ctx.closePath();ctx.fill();
    });

    // cats
    cats.forEach(c=>{
      c.x+=c.vx;c.y+=c.vy;
      c.rot+=c.rotSpd;
      if(c.x<-0.15)c.x=1.15;if(c.x>1.15)c.x=-0.15;
      if(c.y<-0.15)c.y=1.15;if(c.y>1.15)c.y=-0.15;
      ctx.save();
      ctx.translate(c.x*W,c.y*H);
      ctx.rotate(c.rot);
      drawCat(ctx,0,0,{color:c.color,eye:c.eye,hat:c.hat,pattern:c.pattern,dir:c.dir,scale:c.scale});
      ctx.restore();
    });

    // logo
    logoAlpha=Math.min(1,logoAlpha+0.012);
    ctx.globalAlpha=logoAlpha;
    ctx.textAlign='center';
    // title
    const fs=Math.round(Math.min(W*0.09,72));
    ctx.font=`900 ${fs}px 'Segoe UI',Arial`;
    ctx.shadowColor='#c44dff';ctx.shadowBlur=32;
    const grad=ctx.createLinearGradient(W/2-200,0,W/2+200,0);
    grad.addColorStop(0,'#ff9a6c');grad.addColorStop(0.4,'#ff6b9d');
    grad.addColorStop(0.7,'#c44dff');grad.addColorStop(1,'#7af');
    ctx.fillStyle=grad;
    ctx.fillText('Gatos no Espaço',W/2,H*0.44);
    // subtitle
    ctx.shadowBlur=0;
    ctx.font=`${Math.round(fs*0.28)}px 'Segoe UI',Arial`;
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('Among Us com gatinhos fofos',W/2,H*0.44+fs*0.72);
    ctx.globalAlpha=1;
    ctx.shadowBlur=0;

    _raf=requestAnimationFrame(frame);
  }

  // ── música de suspense ──
  let _ac=null,_musicNodes=[];
  function startIntroMusic(){
    try{
      _ac=new(window.AudioContext||window.webkitAudioContext)();
      const ac=_ac;
      if(ac.state==='suspended')ac.resume();
      const master=ac.createGain();master.gain.value=0;master.connect(ac.destination);
      _musicNodes.push(master);
      // fade in suave
      master.gain.linearRampToValueAtTime(0.55,ac.currentTime+2.5);

      // ── drone grave (pad de suspense) ──
      [55,55.3,110,110.5].forEach((hz,i)=>{
        const o=ac.createOscillator();o.type=i<2?'sawtooth':'sine';
        o.frequency.value=hz;
        const lfo=ac.createOscillator();lfo.frequency.value=0.12+i*0.03;
        const lfoG=ac.createGain();lfoG.gain.value=0.8;
        lfo.connect(lfoG);lfoG.connect(o.frequency);
        const g=ac.createGain();g.gain.value=0.08;
        const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=320;lp.Q.value=2;
        o.connect(lp);lp.connect(g);g.connect(master);
        o.start();lfo.start();
        _musicNodes.push(o,lfo);
      });

      // ── pad médio (acorde menor) ──
      // Dm: D3=146.8, F3=174.6, A3=220
      [146.8,174.6,220,293.6].forEach((hz,i)=>{
        const o=ac.createOscillator();o.type='triangle';
        o.frequency.value=hz+Math.random()*0.4;
        const lfo=ac.createOscillator();lfo.frequency.value=0.08+i*0.05;
        const lfoG=ac.createGain();lfoG.gain.value=1.2;
        lfo.connect(lfoG);lfoG.connect(o.frequency);
        const g=ac.createGain();g.gain.value=0.06;
        const lp=ac.createBiquadFilter();lp.type='bandpass';lp.frequency.value=600+i*80;lp.Q.value=1.5;
        o.connect(lp);lp.connect(g);g.connect(master);
        o.start();lfo.start();
        _musicNodes.push(o,lfo);
      });

      // ── pulsação de tensão (batida lenta) ──
      function pulse(delay){
        if(!_ac)return;
        const now=ac.currentTime+delay;
        const o=ac.createOscillator();o.type='sine';o.frequency.value=55;
        const g=ac.createGain();
        g.gain.setValueAtTime(0,now);
        g.gain.linearRampToValueAtTime(0.45,now+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.55);
        o.connect(g);g.connect(master);
        o.start(now);o.stop(now+0.6);
        if(_ac)setTimeout(()=>pulse(0),2200);
      }
      setTimeout(()=>pulse(0),800);

      // ── arpejo sinistro (notas subindo lentamente) ──
      const notes=[130.8,155.6,174.6,196,220,261.6]; // Cm pentatônico
      let ni=0;
      function arp(){
        if(!_ac)return;
        const now=ac.currentTime;
        const o=ac.createOscillator();o.type='sine';
        o.frequency.value=notes[ni%notes.length];ni++;
        const g=ac.createGain();
        g.gain.setValueAtTime(0,now);
        g.gain.linearRampToValueAtTime(0.12,now+0.08);
        g.gain.exponentialRampToValueAtTime(0.001,now+1.1);
        o.connect(g);g.connect(master);
        o.start(now);o.stop(now+1.2);
        if(_ac)setTimeout(arp,700+Math.random()*400);
      }
      setTimeout(arp,1200);

    }catch(e){}
  }

  function stopIntroMusic(){
    if(!_ac)return;
    try{
      _musicNodes.forEach(n=>{try{n.stop&&n.stop();}catch(e){}});
      _ac.close();
    }catch(e){}
    _ac=null;_musicNodes=[];
  }
  window.stopIntroMusic=stopIntroMusic;
  document.addEventListener('visibilitychange',()=>{if(document.hidden)stopIntroMusic();});
  window.addEventListener('beforeunload',()=>stopIntroMusic());

  let _musicStarted=false;

  function _doSkip(){
    if(_done)return;
    _done=true;
    cancelAnimationFrame(_raf);
    stopIntroMusic();
    const ov=document.getElementById('intro-ov');
    ov.style.transition='opacity 0.6s';
    ov.style.opacity='0';
    setTimeout(()=>{
      ov.style.display='none';
      document.getElementById('menu').classList.add('active');
    },620);
  }

  let _musicStartTime=0;

  window.skipIntro=function(){
    if(_done)return;
    if(!_musicStarted){
      // primeiro toque: só inicia música
      _musicStarted=true;
      _musicStartTime=Date.now();
      startIntroMusic();
      const tap=document.getElementById('intro-tap');
      if(tap)tap.textContent='Toque novamente para começar';
      return;
    }
    // segundo toque (ou pelo menos 400ms depois): sai da intro
    if(Date.now()-_musicStartTime<400)return;
    _doSkip();
  };

  window.addEventListener('load',()=>{ frame(); });
})();

// ══ CAT DRAW ══
function drawCat(ctx,x,y,o={}){
  const{color='#f00',eye='#0f6',hat='none',pattern='solid',name='',dir=1,dead=false,alpha=1,scale=1,isPlayer=false}=o;
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);ctx.globalAlpha=alpha;
  if(dead){ctx.rotate(.38*dir);ctx.globalAlpha=alpha*.6;}
  const bw=19,bh=23;
  ctx.beginPath();ctx.ellipse(0,bh+3,bw*.72,4.5,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.28)';ctx.fill();
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=5.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-dir*bw*.75,bh*.4);ctx.quadraticCurveTo(-dir*bw*1.7,-bh*.1,-dir*bw*1.3,-bh*.75);ctx.stroke();ctx.restore();
  ctx.fillStyle=color;[-7,7].forEach(lx=>{ctx.beginPath();ctx.ellipse(lx,bh+3,5.5,7,0,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle=color;ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);ctx.fill();
  if(pattern==='striped'){ctx.save();ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);ctx.clip();ctx.strokeStyle=dk(color,.28);ctx.lineWidth=4;for(let i=-40;i<40;i+=8){ctx.beginPath();ctx.moveTo(i,-bh);ctx.lineTo(i,bh);ctx.stroke();}ctx.restore();}
  else if(pattern==='spotted'){ctx.save();ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);ctx.clip();ctx.fillStyle=dk(color,.28);[[-6,-9,4.5],[8,1,3.5],[-3,10,3.5],[9,-4,3]].forEach(([sx,sy,sr])=>{ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();});ctx.restore();}
  else if(pattern==='tuxedo'){ctx.save();ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);ctx.clip();ctx.fillStyle='#080f1a';ctx.beginPath();ctx.ellipse(0,4,bw*.46,bh*.6,0,0,Math.PI*2);ctx.fill();ctx.restore();}
  [[-1],[1]].forEach(([s])=>{ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(s*7,-bh+3);ctx.lineTo(s*15,-bh-11);ctx.lineTo(s*3,-bh-2);ctx.fill();ctx.fillStyle=lt(color,.36);ctx.beginPath();ctx.moveTo(s*7,-bh+2);ctx.lineTo(s*13,-bh-8);ctx.lineTo(s*4,-bh);ctx.fill();});
  const vx=dir*4;
  const vg=ctx.createRadialGradient(vx-2,-6,1,vx,-4,13);vg.addColorStop(0,'rgba(190,235,255,.88)');vg.addColorStop(1,'rgba(60,140,220,.6)');
  ctx.fillStyle=vg;ctx.beginPath();ctx.ellipse(vx,-4,12,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.34)';ctx.beginPath();ctx.ellipse(vx-3,-7,5,3,-.5,0,Math.PI*2);ctx.fill();
  if(!dead){
    [{ex:vx-5,ey:-5},{ex:vx+4,ey:-5}].forEach(({ex,ey})=>{ctx.fillStyle='white';ctx.beginPath();ctx.arc(ex,ey,3.5,0,Math.PI*2);ctx.fill();ctx.fillStyle=eye;ctx.beginPath();ctx.arc(ex,ey,2.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(ex+.3,ey,1,1.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.8)';ctx.beginPath();ctx.arc(ex+1,ey-1,.7,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#ff88aa';ctx.beginPath();ctx.arc(vx+dir*7.5,-1,2.5,0,Math.PI*2);ctx.fill();
    ctx.save();ctx.strokeStyle='rgba(255,255,255,.38)';ctx.lineWidth=.8;const wx=vx+dir*7.5;[0,2,-2].forEach(dy=>{ctx.beginPath();ctx.moveTo(wx,-1);ctx.lineTo(wx+dir*12,dy);ctx.stroke();});ctx.restore();
  } else {
    [{ex:vx-5,ey:-5},{ex:vx+4,ey:-5}].forEach(({ex,ey})=>{ctx.save();ctx.strokeStyle='#ff3333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ex-3,ey-3);ctx.lineTo(ex+3,ey+3);ctx.moveTo(ex+3,ey-3);ctx.lineTo(ex-3,ey+3);ctx.stroke();ctx.restore();});
  }
  drawHat(ctx,hat,dir,bw,bh);
  if(name){ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillText(name,1,bh+17);ctx.fillStyle=isPlayer?'#00ffaa':'white';ctx.fillText(name,0,bh+16);}
  ctx.restore();
}

function drawHat(ctx,hat,dir,bw,bh){
  const ty=-bh-12;ctx.save();
  switch(hat){
    case'crown':ctx.fillStyle='#ffd700';ctx.beginPath();ctx.moveTo(-11,ty+6);ctx.lineTo(-9,ty-5);ctx.lineTo(-3,ty+2);ctx.lineTo(0,ty-8);ctx.lineTo(3,ty+2);ctx.lineTo(9,ty-5);ctx.lineTo(11,ty+6);ctx.closePath();ctx.fill();ctx.fillStyle='#ff4444';[0,-7,7].forEach(jx=>{ctx.beginPath();ctx.arc(jx,ty-3,2,0,Math.PI*2);ctx.fill();});break;
    case'tophat':ctx.fillStyle='#1a1a1a';ctx.fillRect(-9,ty-13,18,13);ctx.fillRect(-12,ty,24,4);ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(-9,ty-13,18,13);break;
    case'cowboy':ctx.fillStyle='#8B6914';ctx.beginPath();ctx.ellipse(0,ty+2,13,4.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#a07820';ctx.beginPath();ctx.ellipse(0,ty-4,8,8,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8B6914';ctx.fillRect(-8,ty-6,16,6);break;
    case'wizard':ctx.fillStyle='#6633aa';ctx.beginPath();ctx.moveTo(-9,ty+4);ctx.lineTo(0,ty-19);ctx.lineTo(9,ty+4);ctx.closePath();ctx.fill();ctx.fillStyle='#4422aa';ctx.beginPath();ctx.ellipse(0,ty+4,11,3.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffdd00';[[0,ty-10],[-5,ty-4],[5,ty-2]].forEach(([sx,sy])=>{ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fill();});break;
    case'flower':ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(0,ty-2,4.5,0,Math.PI*2);ctx.fill();['#ff6688','#ff88cc','#ff44aa','#ffaa66','#ff66aa'].forEach((pc,i)=>{const a=i/5*Math.PI*2;ctx.fillStyle=pc;ctx.beginPath();ctx.ellipse(Math.cos(a)*8,ty-2+Math.sin(a)*8,4,3,a,0,Math.PI*2);ctx.fill();});ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(0,ty-2,3.5,0,Math.PI*2);ctx.fill();break;
    case'halo':ctx.save();ctx.strokeStyle='#ffee66';ctx.lineWidth=3;ctx.shadowColor='#ffee66';ctx.shadowBlur=10;ctx.beginPath();ctx.ellipse(0,ty-7,10,3.5,0,0,Math.PI*2);ctx.stroke();ctx.restore();break;
    case'propeller':ctx.fillStyle='#cc3333';ctx.beginPath();ctx.arc(0,ty-5,3.5,0,Math.PI*2);ctx.fill();const pa=Date.now()/300;for(let i=0;i<3;i++){ctx.save();ctx.translate(0,ty-5);ctx.rotate(pa+i*2.09);ctx.fillStyle='#5588ff';ctx.beginPath();ctx.ellipse(7,0,7,3,0,0,Math.PI*2);ctx.fill();ctx.restore();}break;
    case'xmas':ctx.fillStyle='#cc2222';ctx.beginPath();ctx.moveTo(-9,ty+4);ctx.lineTo(0,ty-17);ctx.lineTo(9,ty+4);ctx.closePath();ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,ty-17,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(0,ty-5,1.5,0,Math.PI*2);ctx.fill();break;
    case'party':ctx.fillStyle='#ff6622';ctx.beginPath();ctx.moveTo(-8,ty+4);ctx.lineTo(0,ty-16);ctx.lineTo(8,ty+4);ctx.closePath();ctx.fill();['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff'].forEach((pc,i)=>{const a=i/5*Math.PI*2-Math.PI/2;ctx.fillStyle=pc;ctx.beginPath();ctx.arc(Math.cos(a)*14,ty-8+Math.sin(a)*4,2,0,Math.PI*2);ctx.fill();});break;
    case'horns':ctx.fillStyle='#cc2200';[[-7,ty+3],[7,ty+3]].forEach(([hx,hy])=>{ctx.beginPath();ctx.moveTo(hx-4,hy+2);ctx.lineTo(hx,hy-12);ctx.lineTo(hx+4,hy+2);ctx.closePath();ctx.fill();});break;
    case'bow':ctx.fillStyle='#ff44aa';[-1,1].forEach(s=>{ctx.save();ctx.translate(s*6,ty-2);ctx.beginPath();ctx.ellipse(0,0,7,4,s*.5,0,Math.PI*2);ctx.fill();ctx.restore();});ctx.fillStyle='#ff66cc';ctx.beginPath();ctx.arc(0,ty-2,3,0,Math.PI*2);ctx.fill();break;
  }
  ctx.restore();
}

function dk(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${~~(r*(1-a))},${~~(g*(1-a))},${~~(b*(1-a))})`;}
function lt(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${~~(r+(255-r)*a)},${~~(g+(255-g)*a)},${~~(b+(255-b)*a)})`;}
function h2rgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}

function pickT(b){
  if(!b.alive)return;
  const r=ROOMS[Math.floor(Math.random()*ROOMS.length)];
  b.tRoom=r;b.tX=r.x+25+Math.random()*(r.w-50);b.tY=r.y+25+Math.random()*(r.h-50);b.timer=90+Math.random()*150;
}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function updBots(dt){
  if(G.phase!=='play')return;
  G.bots.forEach(b=>{
    if(!b.alive)return;
    if(b.isImp){
      b.killCD-=dt/60;
      if(b.killCD<=0){const tgts=[G.player,...G.bots].filter(c=>c.alive&&!c.isImp&&c.id!==b.id&&dst(b,c)<52);if(tgts.length){kill(tgts[0],b);b.killCD=5;return;}}
      if(b.killCD<2.5){const crew=[G.player,...G.bots].filter(c=>c.alive&&!c.isImp);if(crew.length){const nr=crew.sort((a,c)=>dst(b,a)-dst(b,c))[0];b.tX=nr.x;b.tY=nr.y;}}
    }
    b.timer-=dt;if(b.timer<=0)pickT(b);
    const dx=b.tX-b.x,dy=b.tY-b.y,d=Math.hypot(dx,dy);
    if(d>5){const nx=b.x+dx/d*b.spd,ny=b.y+dy/d*b.spd;if(walkable(nx,b.y))b.x=nx;if(walkable(b.x,ny))b.y=ny;b.dir=dx>0?1:-1;}
  });
}

function _playDeath(isPlayer){
  try{
    const ac=getAC();
    const master=ac.createGain();master.gain.value=0.7;master.connect(ac.destination);

    // grito: voz sintética descendo em pitch
    const screamDur=0.7+Math.random()*0.3;
    const osc=ac.createOscillator();osc.type='sawtooth';
    osc.frequency.setValueAtTime(isPlayer?680:520,ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80,ac.currentTime+screamDur);
    // vibrato de pânico
    const vib=ac.createOscillator();vib.frequency.value=18;
    const vibG=ac.createGain();vibG.gain.value=40;
    vib.connect(vibG);vibG.connect(osc.frequency);
    // formant para soar vocal
    const f1=ac.createBiquadFilter();f1.type='bandpass';f1.frequency.value=900;f1.Q.value=2;
    const f2=ac.createBiquadFilter();f2.type='bandpass';f2.frequency.value=2200;f2.Q.value=3;
    const gS=ac.createGain();
    gS.gain.setValueAtTime(0,ac.currentTime);
    gS.gain.linearRampToValueAtTime(0.55,ac.currentTime+0.04);
    gS.gain.setValueAtTime(0.5,ac.currentTime+screamDur*0.4);
    gS.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+screamDur);
    osc.connect(f1);f1.connect(f2);f2.connect(gS);gS.connect(master);
    vib.start();osc.start();
    osc.stop(ac.currentTime+screamDur);vib.stop(ac.currentTime+screamDur);

    // baque de corpo caindo
    const thudDur=0.18;
    const tbuf=ac.createBuffer(1,Math.ceil(ac.sampleRate*thudDur),ac.sampleRate);
    const td=tbuf.getChannelData(0);
    for(let i=0;i<td.length;i++){
      const t2=i/ac.sampleRate;
      td[i]=(Math.random()*2-1)*Math.pow(1-t2/thudDur,3);
    }
    const tSrc=ac.createBufferSource();tSrc.buffer=tbuf;
    const tlp=ac.createBiquadFilter();tlp.type='lowpass';tlp.frequency.value=180;tlp.Q.value=2;
    const tg=ac.createGain();tg.gain.value=0.9;
    tSrc.connect(tlp);tlp.connect(tg);tg.connect(master);
    tSrc.start(ac.currentTime+screamDur*0.6);
  }catch(e){}
}

function kill(t,by){
  t.alive=false;
  _playDeath(t.isPlayer);
  const side=t.x>by.x?1:-1; // cai para o lado oposto ao assassino
  G.deathAnims.push({
    x:t.x, y:t.y,
    vx:0, vy:0,
    rot:0, rotSpd:side*0.22,
    startY:t.y,
    color:t.color,eye:t.eye,hat:t.hat,pattern:t.pattern,name:t.name,dir:t.dir
  });
  if(t.isPlayer)showNotif(`😿 Você foi eliminado por ${by.name}! Vire fantasma...`);
  checkWin();
}

function ejectAnim(t){
  const ec=document.getElementById('eject-c');
  ec.width=innerWidth; ec.height=innerHeight;
  ec.style.display='block';
  const ex=ec.getContext('2d');

  // Gera estrelas fixas + estrelas de velocidade
  const stars=Array.from({length:180},()=>({
    x:Math.random()*innerWidth, y:Math.random()*innerHeight,
    r:Math.random()*1.6+.3, a:Math.random()*.7+.3,
    spd:Math.random()*1.2+.2
  }));

  // Gato começa fora da tela esquerda, voa até sair pela direita
  const catY=innerHeight*.42+( Math.random()-.5)*60;
  const scale=3.5;
  let catX=-80;
  const vx=innerWidth/110; // atravessa em ~110 frames (~1.8s)
  let rot=0; let frame=0; let alpha=1;

  function drawFrame(){
    ex.clearRect(0,0,ec.width,ec.height);

    // Fundo negro
    ex.fillStyle='#020408';
    ex.fillRect(0,0,ec.width,ec.height);

    // Estrelas se movendo (parallax simples)
    stars.forEach(s=>{
      s.x-=s.spd;
      if(s.x<0)s.x=ec.width;
      ex.beginPath();ex.arc(s.x,s.y,s.r,0,Math.PI*2);
      ex.fillStyle=`rgba(255,255,255,${s.a})`;ex.fill();
    });

    // Rastro de luz atrás do gato
    const grad=ex.createLinearGradient(catX-120,catY,catX,catY);
    grad.addColorStop(0,'rgba(255,255,255,0)');
    grad.addColorStop(1,'rgba(255,255,255,0.12)');
    ex.fillStyle=grad;ex.fillRect(catX-140,catY-18*scale*.5,140,18*scale*.5);

    // Texto
    ex.globalAlpha=alpha;
    ex.font=`bold ${innerWidth<500?16:20}px Arial`;
    ex.textAlign='center';ex.fillStyle='#aabbcc';
    ex.fillText(`${t.name} foi expulso...`,ec.width/2,ec.height*.78);
    ex.font=`${innerWidth<500?13:16}px Arial`;
    ex.fillStyle=t.isImp?'#ff6688':'#88aaff';
    ex.fillText(t.isImp?'Era o IMPOSTOR 😈':'Era inocente 😢',ec.width/2,ec.height*.78+30);

    // Gato grande girando
    ex.save();
    ex.translate(catX,catY);
    ex.rotate(rot);
    drawCat(ex,0,0,{color:t.color,eye:t.eye,hat:t.hat,pattern:t.pattern,name:'',dir:1,scale});
    ex.restore();
    ex.globalAlpha=1;

    catX+=vx; rot+=0.04; frame++;

    // Fade out nos últimos 30 frames após sair da tela
    if(catX>ec.width+80){
      alpha=Math.max(0,alpha-0.045);
      if(alpha<=0){ec.style.display='none';return;}
    }
    requestAnimationFrame(drawFrame);
  }
  drawFrame();
}

function updDeathAnims(){

let _stepLast=0,_stepSide=0;
function _playStep(){
  try{
    const now=Date.now();
    if(now-_stepLast<210)return;
    _stepLast=now;_stepSide^=1;
    const ac=getAC();
    const dur=0.055;
    const buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*dur),ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const t=i/ac.sampleRate;
      d[i]=(Math.random()*2-1)*Math.pow(1-t/dur,2.5);
    }
    const src=ac.createBufferSource();src.buffer=buf;
    const lp=ac.createBiquadFilter();lp.type='lowpass';
    lp.frequency.value=_stepSide?380:320;
    lp.Q.value=1.2;
    const g=ac.createGain();g.gain.value=0.28;
    src.connect(lp);lp.connect(g);g.connect(ac.destination);
    src.start();src.stop(ac.currentTime+dur);
  }catch(e){}
}

function updPlayer(dt){
  if(G.phase!=='play')return;
  const p=G.player;if(!p.alive)return;
  let vx=0,vy=0;
  if(keys.ArrowLeft||keys.KeyA)vx=-1;if(keys.ArrowRight||keys.KeyD)vx=1;
  if(keys.ArrowUp||keys.KeyW)vy=-1;if(keys.ArrowDown||keys.KeyS)vy=1;
  if(_jvx||_jvy){vx=_jvx;vy=_jvy;}
  if(vx&&vy){vx*=.707;vy*=.707;}
  const nx=p.x+vx*p.spd,ny=p.y+vy*p.spd;
  const moved=(vx&&walkable(nx,p.y))||(vy&&walkable(p.x,ny));
  if(vx&&walkable(nx,p.y))p.x=nx;if(vy&&walkable(p.x,ny))p.y=ny;
  if(moved)_playStep();
  if(vx)p.dir=vx>0?1:-1;
  if(p.isImp&&p.killCD>0)p.killCD-=dt/60;
  camX=Math.max(0,Math.min(p.x-gc.width/2,WW-gc.width));
  camY=Math.max(0,Math.min(p.y-gc.height/2,WH-gc.height));
  updUseBtn();
}

function updUseBtn(){
  const p=G.player,ub=document.getElementById('usebtn');
  if(!p.alive||G.phase!=='play'){ub.style.display='none';return;}
  if(dst(p,EMG)<48&&!G.emergUsed){ub.style.display='block';ub.textContent='🚨 Reunião!';return;}
  const nT=G.tasks.find(t=>!t.done&&dst(p,t)<42);
  if(nT){ub.style.display='block';ub.textContent='⚡ '+nT.lbl;return;}
  const nB=G.bodies.find(b=>!b.reported&&dst(p,b)<46);
  if(nB){ub.style.display='block';ub.textContent='📢 Reportar corpo!';return;}
  ub.style.display='none';
}

function tryUse(){
  const p=G.player;if(G.phase!=='play'||!p.alive)return;
  if(dst(p,EMG)<48&&!G.emergUsed){G.emergUsed=true;meeting('emergency',p.name,null);return;}
  const nT=G.tasks.find(t=>!t.done&&dst(p,t)<42);if(nT){openTask(nT);return;}
  const nB=G.bodies.find(b=>!b.reported&&dst(p,b)<46);if(nB){nB.reported=true;meeting('body',p.name,nB);return;}
}

function tryKill(){
  const p=G.player;if(!p.isImp||!p.alive||p.killCD>0)return;
  const t=G.bots.filter(b=>b.alive&&!b.isImp&&dst(p,b)<58).sort((a,b)=>dst(p,a)-dst(p,b))[0];
  if(t){kill(t,p);p.killCD=18;showNotif('☠️ '+t.name+' eliminado!');}
  else showNotif('Chegue mais perto de alguém!');
}

let _scratchTask=null,_scratchProg=0,_scratchSide=1,_scratchFlashes=[],_scratchRaf=null,_scratchListener=null;

function drawClaw(ctx,cx,cy,mirror,alpha){
  // 4 diagonal claw marks, top-left to bottom-right
  const claws=[
    {ox:-80,oy:-110, ex:10,  ey:110,  ctrl:[{x:-50,y:-20},{x:30,y:40}]},
    {ox:-35,oy:-120, ex:50,  ey:100,  ctrl:[{x:-5, y:-30},{x:70,y:30}]},
    {ox: 15,oy:-115, ex:95,  ey:95,   ctrl:[{x:40, y:-25},{x:110,y:25}]},
    {ox: 65,oy:-110, ex:140, ey:90,   ctrl:[{x:90, y:-20},{x:155,y:20}]},
  ];
  ctx.save();
  ctx.translate(cx,cy);
  if(mirror)ctx.scale(-1,1);
  ctx.globalAlpha=alpha;
  claws.forEach((c,i)=>{
    const w=Math.max(1,7-i*0.8);
    ctx.beginPath();
    ctx.moveTo(c.ox,c.oy);
    ctx.bezierCurveTo(c.ctrl[0].x,c.ctrl[0].y,c.ctrl[1].x,c.ctrl[1].y,c.ex,c.ey);
    // outer glow
    ctx.shadowColor='#ff0000';ctx.shadowBlur=18;
    ctx.strokeStyle=`rgb(255,${30+i*15},0)`;
    ctx.lineWidth=w+4;ctx.lineCap='round';
    ctx.globalAlpha=alpha*0.35;ctx.stroke();
    // inner bright
    ctx.globalAlpha=alpha;
    ctx.strokeStyle=`rgb(255,${80+i*20},${i*10})`;
    ctx.lineWidth=w;ctx.stroke();
    ctx.shadowBlur=0;
  });
  ctx.restore();
}

function drawScratchPost(ctx,W,H){
  const pw=W*0.28, cx=W/2;
  // base platform
  const bh=H*0.06, by=H*0.90;
  ctx.fillStyle='#5c3a10';
  ctx.beginPath();
  ctx.ellipse(cx,by+bh*0.5,pw*0.7,bh*0.5,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#7a4e1c';
  ctx.fillRect(cx-pw*0.65,by,pw*1.3,bh*0.5);
  // rope-wrapped pole
  const poleTop=H*0.10, poleH=H*0.80;
  const rw=pw*0.38;
  // base pole color
  ctx.fillStyle='#8B6914';
  ctx.fillRect(cx-rw/2,poleTop,rw,poleH);
  // rope segments (alternating bands)
  const nSegs=28;
  const segH=poleH/nSegs;
  for(let i=0;i<nSegs;i++){
    ctx.fillStyle=i%2===0?'#c8922a':'#a87020';
    ctx.fillRect(cx-rw/2,poleTop+i*segH,rw,segH);
    // rope twist lines
    ctx.strokeStyle=i%2===0?'#a87020':'#c8922a';
    ctx.lineWidth=1.5;ctx.globalAlpha=0.5;
    ctx.beginPath();
    ctx.moveTo(cx-rw/2,poleTop+i*segH+segH*0.3);
    ctx.lineTo(cx+rw/2,poleTop+i*segH+segH*0.7);
    ctx.stroke();
    ctx.globalAlpha=1;
  }
  // pole border
  ctx.strokeStyle='#6b4a08';ctx.lineWidth=3;
  ctx.strokeRect(cx-rw/2,poleTop,rw,poleH);
  // top cap
  ctx.fillStyle='#7a4e1c';
  ctx.beginPath();ctx.ellipse(cx,poleTop,rw*0.58,rw*0.18,0,0,Math.PI*2);ctx.fill();
}

function scratchLoop(){
  const ov=document.getElementById('scratch-ov');
  if(ov.style.display==='none')return;
  const sc=document.getElementById('scratch-c');
  const ctx=sc.getContext('2d');
  sc.width=innerWidth;sc.height=innerHeight;
  const W=sc.width,H=sc.height;
  // dark bg
  ctx.fillStyle='#0a0500';ctx.fillRect(0,0,W,H);
  // scratching post
  drawScratchPost(ctx,W,H);
  // draw all active flashes
  _scratchFlashes=_scratchFlashes.filter(f=>{
    f.alpha-=0.055;
    if(f.alpha<=0)return false;
    drawClaw(ctx,f.x,f.y,f.mirror,f.alpha);
    return true;
  });
  _scratchRaf=requestAnimationFrame(scratchLoop);
}

function openScratchTask(task){
  _scratchTask=task;_scratchProg=0;_scratchSide=1;_scratchFlashes=[];
  const ov=document.getElementById('scratch-ov');
  ov.style.display='block';
  document.getElementById('scratch-bar').style.height='0%';
  document.getElementById('scratch-hint').style.opacity='1';
  cancelAnimationFrame(_scratchRaf);
  scratchLoop();
  window.scratchTap=(e)=>{
    e.preventDefault();
    _doScratch();
  };
  _scratchListener=(e)=>{
    if(e.code!=='ControlLeft'&&e.code!=='ControlRight')return;
    e.preventDefault();
    if(ov.style.display==='none')return;
    _doScratch();
  };
  let _meowIndex=0;
  function _playMeow(){
    try{
      const ac=getAC();
      const type=_meowIndex%3;_meowIndex++;
      const master=ac.createGain();master.connect(ac.destination);

      if(type===0){
        // miado curto agudo: "miau!" rápido
        const dur=0.38;
        const osc=ac.createOscillator();osc.type='triangle';
        const form=ac.createBiquadFilter();form.type='bandpass';form.frequency.value=1100;form.Q.value=1.8;
        const g=ac.createGain();
        osc.frequency.setValueAtTime(680,ac.currentTime);
        osc.frequency.linearRampToValueAtTime(820,ac.currentTime+0.08);
        osc.frequency.linearRampToValueAtTime(420,ac.currentTime+dur);
        g.gain.setValueAtTime(0,ac.currentTime);
        g.gain.linearRampToValueAtTime(0.55,ac.currentTime+0.04);
        g.gain.linearRampToValueAtTime(0.4,ac.currentTime+0.15);
        g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
        osc.connect(form);form.connect(g);g.connect(master);
        osc.start();osc.stop(ac.currentTime+dur);

      } else if(type===1){
        // miado longo reclamão: "miaaaau~"
        const dur=0.65;
        const osc=ac.createOscillator();osc.type='sawtooth';
        const form=ac.createBiquadFilter();form.type='bandpass';form.frequency.value=900;form.Q.value=2.2;
        const form2=ac.createBiquadFilter();form2.type='peaking';form2.frequency.value=2200;form2.gain.value=10;form2.Q.value=1.5;
        const g=ac.createGain();
        osc.frequency.setValueAtTime(520,ac.currentTime);
        osc.frequency.linearRampToValueAtTime(760,ac.currentTime+0.12);
        osc.frequency.setValueAtTime(760,ac.currentTime+0.12);
        osc.frequency.linearRampToValueAtTime(580,ac.currentTime+0.4);
        osc.frequency.linearRampToValueAtTime(340,ac.currentTime+dur);
        g.gain.setValueAtTime(0,ac.currentTime);
        g.gain.linearRampToValueAtTime(0.5,ac.currentTime+0.06);
        g.gain.setValueAtTime(0.45,ac.currentTime+0.35);
        g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
        osc.connect(form);form.connect(form2);form2.connect(g);g.connect(master);
        osc.start();osc.stop(ac.currentTime+dur);

      } else {
        // miado rouco surpreso: "rreow!" com vibrato
        const dur=0.45;
        const osc=ac.createOscillator();osc.type='sawtooth';
        const vib=ac.createOscillator();vib.type='sine';vib.frequency.value=7;
        const vibG=ac.createGain();vibG.gain.value=28;
        const form=ac.createBiquadFilter();form.type='bandpass';form.frequency.value=800;form.Q.value=1.5;
        const hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=200;
        const g=ac.createGain();
        osc.frequency.setValueAtTime(300,ac.currentTime);
        osc.frequency.linearRampToValueAtTime(700,ac.currentTime+0.07);
        osc.frequency.linearRampToValueAtTime(500,ac.currentTime+dur);
        vib.connect(vibG);vibG.connect(osc.frequency);
        g.gain.setValueAtTime(0,ac.currentTime);
        g.gain.linearRampToValueAtTime(0.5,ac.currentTime+0.05);
        g.gain.setValueAtTime(0.42,ac.currentTime+0.2);
        g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
        osc.connect(form);form.connect(hp);hp.connect(g);g.connect(master);
        vib.start();osc.start();
        osc.stop(ac.currentTime+dur);vib.stop(ac.currentTime+dur);
      }
      master.gain.value=0.7;
    }catch(e){}
  }

  function _doScratch(){
    if(ov.style.display==='none')return;
    // add flash
    // spawn claws inside the post area
    const _pw=innerWidth*0.28*0.38;
    const cx=innerWidth/2+(_pw/2-Math.random()*_pw);
    const cy=innerHeight*(0.12+Math.random()*0.74);
    _scratchFlashes.push({x:cx,y:cy,mirror:_scratchSide<0,alpha:1.0});
    _scratchSide*=-1;
    _playMeow();
    // fill bar
    _scratchProg=Math.min(100,_scratchProg+6.5);
    document.getElementById('scratch-bar').style.height=_scratchProg+'%';
    // drain slowly
    clearTimeout(window._scratchDrain);
    window._scratchDrain=setTimeout(()=>{
      const drain=setInterval(()=>{
        _scratchProg=Math.max(0,_scratchProg-1.2);
        const b=document.getElementById('scratch-bar');
        if(b)b.style.height=_scratchProg+'%';
        if(_scratchProg<=0||ov.style.display==='none')clearInterval(drain);
      },80);
    },600);
    if(_scratchProg>=100){
      document.removeEventListener('keydown',_scratchListener);
      setTimeout(()=>{closeScratchTask();completeTask(_scratchTask);},350);
    }
  }
  document.addEventListener('keydown',_scratchListener);
}

window.closeScratchTask=()=>{
  document.getElementById('scratch-ov').style.display='none';
  cancelAnimationFrame(_scratchRaf);_scratchRaf=null;
  if(_scratchListener){document.removeEventListener('keydown',_scratchListener);_scratchListener=null;}
  clearTimeout(window._scratchDrain);
};

// ══ BEDS TASK ══
let _bedsTask=null,_bedsMade=0,_bedsPawX=0,_bedsPawY=0,_bedsPawPulse=0,_bedsRaf=null,_bedsClick=null;

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

function drawBed(ctx,x,y,w,h,messy){
  // frame
  const fr=ctx.createLinearGradient(x,y,x,y+h);
  fr.addColorStop(0,'#5a3210');fr.addColorStop(1,'#3a1f08');
  ctx.fillStyle=fr;rr(ctx,x,y,w,h,10);ctx.fill();
  ctx.strokeStyle='#7a4820';ctx.lineWidth=2;ctx.stroke();
  // mattress
  ctx.fillStyle='#d4c4a8';rr(ctx,x+6,y+6,w-12,h-12,7);ctx.fill();
  // pillow
  ctx.fillStyle='#f0e8d0';rr(ctx,x+10,y+10,w-20,32,6);ctx.fill();
  ctx.strokeStyle='#c8bca0';ctx.lineWidth=1;ctx.stroke();
  if(messy){
    const bx=x+8,by=y+44,ww=w-16;
    ctx.fillStyle='#6a4fbc';
    ctx.beginPath();
    ctx.moveTo(bx,by);ctx.lineTo(bx+ww,by);
    ctx.bezierCurveTo(bx+ww*.8,by+h*.35,bx+ww*.5,by+h*.25,bx+ww*.7,by+h*.5);
    ctx.bezierCurveTo(bx+ww*.9,by+h*.65,bx+ww*.4,by+h*.55,bx+ww*.6,by+h*.7);
    ctx.lineTo(bx,by+h*.55);
    ctx.bezierCurveTo(bx+w*.15,by+h*.45,bx+w*.05,by+h*.25,bx,by);
    ctx.fill();
    ctx.strokeStyle='#5a3fac';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(bx+10,by+15);ctx.bezierCurveTo(bx+30,by+5,bx+50,by+25,bx+70,by+10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx+20,by+30);ctx.bezierCurveTo(bx+45,by+20,bx+60,by+40,bx+80,by+25);ctx.stroke();
    // cat peeking out
    const hx=x+w/2-12,hy=y+h-38;
    ctx.fillStyle='#888';ctx.beginPath();ctx.arc(hx+12,hy+12,12,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(hx+2,hy+4);ctx.lineTo(hx-4,hy-6);ctx.lineTo(hx+8,hy+2);ctx.fill();
    ctx.beginPath();ctx.moveTo(hx+22,hy+4);ctx.lineTo(hx+28,hy-6);ctx.lineTo(hx+16,hy+2);ctx.fill();
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(hx+7,hy+12,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+17,hy+12,2,0,Math.PI*2);ctx.fill();
  } else {
    const bx=x+8,by=y+44,bw=w-16,bh=h-50;
    const ng=ctx.createLinearGradient(bx,by,bx,by+bh);
    ng.addColorStop(0,'#8a6fdc');ng.addColorStop(1,'#5a3fac');
    ctx.fillStyle=ng;rr(ctx,bx,by,bw,bh,5);ctx.fill();
    ctx.strokeStyle='#a080ec';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(bx,by+22);ctx.lineTo(bx+bw,by+22);ctx.stroke();
    ctx.fillStyle='#b090fc';rr(ctx,bx,by,bw,22,5);ctx.fill();
    ctx.fillStyle='rgba(0,255,136,0.9)';ctx.font=`bold ${Math.floor(h*.3)}px sans-serif`;
    ctx.textAlign='center';ctx.fillText('✓',x+w/2,y+h*.78);
  }
}

function drawPaw(ctx,x,y,pulse){
  const s=1+Math.sin(pulse)*.12;
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  // glow
  ctx.shadowColor='#ffaaaa';ctx.shadowBlur=20;
  // palm
  ctx.fillStyle='#f4a0a0';
  ctx.beginPath();ctx.arc(0,8,22,0,Math.PI*2);ctx.fill();
  // toe pads
  const toes=[{x:-16,y:-12},{x:-6,y:-20},{x:6,y:-20},{x:16,y:-12}];
  toes.forEach(t=>{ctx.beginPath();ctx.ellipse(t.x,t.y,8,10,0,0,Math.PI*2);ctx.fill();});
  ctx.shadowBlur=0;
  // inner pink
  ctx.fillStyle='#e08080';
  ctx.beginPath();ctx.arc(0,10,14,0,Math.PI*2);ctx.fill();
  toes.forEach(t=>{ctx.beginPath();ctx.ellipse(t.x,t.y,5,6,0,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}

function bedsLoop(){
  const ov=document.getElementById('beds-ov');
  if(ov.style.display==='none')return;
  const sc=document.getElementById('beds-c');
  const ctx=sc.getContext('2d');
  sc.width=innerWidth;sc.height=innerHeight;
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,sc.width,sc.height);
  // title + progress drawn on canvas
  ctx.fillStyle='#aaa';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText('😴 Arrumar Camas — clique na patinha!',sc.width/2,34);
  ctx.fillStyle='#00ff88';ctx.font='bold 13px sans-serif';
  ctx.fillText(`Camas arrumadas: ${_bedsMade} / 3`,sc.width/2,56);
  // draw 3 beds
  const bw=160,bh=120,gap=60;
  const totalW=bw*3+gap*2;
  const bx0=sc.width/2-totalW/2;
  const by=sc.height/2-bh/2-10;
  for(let i=0;i<3;i++){
    drawBed(ctx,bx0+i*(bw+gap),by,bw,bh,i>=_bedsMade);
  }
  // paw
  _bedsPawPulse+=0.07;
  drawPaw(ctx,_bedsPawX,_bedsPawY,_bedsPawPulse);
  _bedsRaf=requestAnimationFrame(bedsLoop);
}

function movePaw(){
  const sc=document.getElementById('beds-c');
  const margin=80;
  _bedsPawX=margin+Math.random()*(sc.width-margin*2);
  _bedsPawY=margin+Math.random()*(sc.height-margin*2);
}

function openBedsTask(task){
  _bedsTask=task;_bedsMade=0;
  const ov=document.getElementById('beds-ov');
  ov.style.display='block';
  cancelAnimationFrame(_bedsRaf);
  movePaw();
  bedsLoop();
  function _playFluff(){
    try{
      const ac=getAC();
      const sr=ac.sampleRate;
      const dur=0.22+Math.random()*0.12;
      const buf=ac.createBuffer(1,Math.ceil(sr*dur),sr);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++){
        const t=i/sr;
        const env=Math.pow(t/dur,0.3)*Math.pow(1-t/dur,1.8);
        d[i]=(Math.random()*2-1)*env;
      }
      const src=ac.createBufferSource();src.buffer=buf;
      // whoosh: lowpass que abre e fecha rápido
      const lp=ac.createBiquadFilter();lp.type='lowpass';
      lp.frequency.setValueAtTime(200,ac.currentTime);
      lp.frequency.linearRampToValueAtTime(2800,ac.currentTime+dur*0.35);
      lp.frequency.exponentialRampToValueAtTime(300,ac.currentTime+dur);
      lp.Q.value=1.5;
      const g=ac.createGain();g.gain.value=0.9;
      src.connect(lp);lp.connect(g);g.connect(ac.destination);
      src.start();src.stop(ac.currentTime+dur);
    }catch(e){}
  }
  _bedsClick=(e)=>{
    if(ov.style.display==='none')return;
    const dx=e.clientX-_bedsPawX,dy=e.clientY-_bedsPawY;
    if(Math.hypot(dx,dy)<38){
      _bedsMade++;
      _playFluff();
      if(_bedsMade>=3){
        ov.removeEventListener('click',_bedsClick);
        setTimeout(()=>{closeBedsTask();completeTask(_bedsTask);},400);
      } else {
        movePaw();
      }
    }
  };
  ov.addEventListener('click',_bedsClick);
}

// ══ REFEIT TASK ══
let _refeitTask=null,_refeitListener=null,_refeitServed=0,_refeitRaf=null,_refeitShake=0,_refeitFlying=[];
const _refeitTotal=4;

function drawSandwich(ctx,cx,cy,sc){
  // tray
  ctx.fillStyle='#2255cc';rr(ctx,cx-sc*90,cy+sc*20,sc*180,sc*22,sc*6);ctx.fill();
  // plate
  ctx.fillStyle='#ccc';ctx.beginPath();ctx.ellipse(cx,cy+sc*18,sc*70,sc*14,0,0,Math.PI*2);ctx.fill();
  // bread bottom
  ctx.fillStyle='#c8860a';rr(ctx,cx-sc*58,cy-sc*10,sc*116,sc*28,sc*8);ctx.fill();
  ctx.fillStyle='#e09a18';rr(ctx,cx-sc*58,cy-sc*10,sc*116,sc*12,sc*4);ctx.fill();
  // lettuce
  ctx.fillStyle='#2a8a2a';
  for(let i=0;i<8;i++){ctx.beginPath();ctx.ellipse(cx-sc*50+i*sc*14,cy-sc*14,sc*12,sc*8,Math.sin(i)*0.4,0,Math.PI*2);ctx.fill();}
  // bread top
  ctx.fillStyle='#c8860a';rr(ctx,cx-sc*55,cy-sc*44,sc*110,sc*32,sc*14);ctx.fill();
  ctx.fillStyle='#dda020';rr(ctx,cx-sc*55,cy-sc*44,sc*110,sc*14,sc*10);ctx.fill();
  // sign stick
  ctx.fillStyle='#8B5A2B';ctx.fillRect(cx-sc*2,cy-sc*80,sc*4,sc*40);
  // sign board
  ctx.fillStyle='#e8c84a';rr(ctx,cx-sc*62,cy-sc*120,sc*124,sc*44,sc*6);ctx.fill();
  ctx.strokeStyle='#8B5A2B';ctx.lineWidth=sc*2;ctx.stroke();
  // sign text
  ctx.fillStyle='#1a3a0a';ctx.font=`bold ${Math.floor(sc*11)}px 'Courier New',monospace`;ctx.textAlign='center';
  ctx.fillText('🐾 SANDUÍCHE',cx,cy-sc*96);
  ctx.fillText('COM ERVA DE GATO 🐾',cx,cy-sc*82);
}

function drawRefeitScene(ctx,w,h,served,shake){
  ctx.fillStyle='#060606';ctx.fillRect(0,0,w,h);
  const cx=w/2+Math.sin(shake*0.8)*6*Math.max(0,1-shake*0.15);
  const cy=h*0.54;
  const sc=Math.min(w,h)/420;
  // heart pixel art
  const hx=cx-sc*110,hy=cy-sc*155;
  ctx.fillStyle='#e0305a';
  [[1,0],[2,0],[0,1],[1,1],[2,1],[3,1],[0,2],[1,2],[2,2],[3,2],[1,3],[2,3],[2,4]].forEach(([px,py])=>{
    ctx.fillRect(hx+px*sc*9,hy+py*sc*9,sc*8,sc*8);
  });
  // cat body (pixel blocks)
  const bx=cx,by=cy-sc*60;
  // body
  ctx.fillStyle='#e07818';ctx.beginPath();ctx.ellipse(bx,by,sc*42,sc*52,0,0,Math.PI*2);ctx.fill();
  // belly
  ctx.fillStyle='#f5d0a0';ctx.beginPath();ctx.ellipse(bx,by+sc*14,sc*22,sc*28,0,0,Math.PI*2);ctx.fill();
  // head
  ctx.fillStyle='#e07818';ctx.beginPath();ctx.arc(bx,by-sc*50,sc*36,0,Math.PI*2);ctx.fill();
  // ears
  ctx.fillStyle='#e07818';
  ctx.beginPath();ctx.moveTo(bx-sc*26,by-sc*78);ctx.lineTo(bx-sc*38,by-sc*100);ctx.lineTo(bx-sc*10,by-sc*80);ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+sc*26,by-sc*78);ctx.lineTo(bx+sc*38,by-sc*100);ctx.lineTo(bx+sc*10,by-sc*80);ctx.fill();
  // inner ears pink
  ctx.fillStyle='#f090a0';
  ctx.beginPath();ctx.moveTo(bx-sc*24,by-sc*80);ctx.lineTo(bx-sc*33,by-sc*96);ctx.lineTo(bx-sc*13,by-sc*81);ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+sc*24,by-sc*80);ctx.lineTo(bx+sc*33,by-sc*96);ctx.lineTo(bx+sc*13,by-sc*81);ctx.fill();
  // stripes
  ctx.fillStyle='#8b3a00';
  [[bx-sc*10,by-sc*84],[bx,by-sc*88],[bx+sc*10,by-sc*84]].forEach(([sx,sy])=>{ctx.fillRect(sx-sc*3,sy-sc*4,sc*6,sc*10);});
  // face white muzzle
  ctx.fillStyle='#f5f0e0';ctx.beginPath();ctx.ellipse(bx,by-sc*42,sc*18,sc*13,0,0,Math.PI*2);ctx.fill();
  // eyes
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(bx-sc*13,by-sc*55,sc*5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(bx+sc*13,by-sc*55,sc*5,0,Math.PI*2);ctx.fill();
  // nose
  ctx.fillStyle='#cc4466';ctx.beginPath();ctx.arc(bx,by-sc*44,sc*3,0,Math.PI*2);ctx.fill();
  // whiskers
  ctx.strokeStyle='#fff';ctx.lineWidth=sc;
  [[-sc*18,-sc*41,-sc*36,-sc*39],[sc*18,-sc*41,sc*36,-sc*39],[-sc*18,-sc*38,-sc*36,-sc*40],[sc*18,-sc*38,sc*36,-sc*40]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(bx+x1,by+y1);ctx.lineTo(bx+x2,by+y2);ctx.stroke();});
  // collar red
  ctx.fillStyle='#cc2222';rr(ctx,bx-sc*22,by-sc*18,sc*44,sc*10,sc*5);ctx.fill();
  // arms holding tray
  ctx.fillStyle='#e07818';
  ctx.beginPath();ctx.ellipse(bx-sc*65,by+sc*10,sc*18,sc*10,Math.PI*0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(bx+sc*65,by+sc*10,sc*18,sc*10,-Math.PI*0.3,0,Math.PI*2);ctx.fill();
  // tail
  ctx.strokeStyle='#e07818';ctx.lineWidth=sc*10;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(bx+sc*40,by+sc*20);ctx.bezierCurveTo(bx+sc*80,by+sc*40,bx+sc*100,by-sc*20,bx+sc*80,by-sc*50);ctx.stroke();
  // legs
  ctx.fillStyle='#e07818';ctx.beginPath();ctx.ellipse(bx-sc*18,by+sc*62,sc*14,sc*20,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(bx+sc*18,by+sc*62,sc*14,sc*20,0,0,Math.PI*2);ctx.fill();
  // sandwich
  drawSandwich(ctx,cx,cy+sc*10,sc);
  // progress text
  const done=served>=_refeitTotal;
  ctx.fillStyle=done?'#00ff88':'#ffcc44';
  ctx.font=`bold ${Math.floor(sc*18)}px sans-serif`;ctx.textAlign='center';
  ctx.shadowColor=done?'#00ff88':'#ff8800';ctx.shadowBlur=16;
  ctx.fillText(done?'✅ Todos servidos!':`Pressione qualquer tecla para servir! (${served}/${_refeitTotal})`,w/2,h*0.92);
  ctx.shadowBlur=0;
}

function drawFlyingPiece(ctx,f){
  ctx.save();
  ctx.translate(f.x,f.y);
  ctx.rotate(f.rot);
  ctx.globalAlpha=Math.max(0,f.alpha);
  const s=f.size;
  // bread bottom
  ctx.fillStyle='#c8860a';rr(ctx,-s,-s*0.3,s*2,s*0.7,s*0.2);ctx.fill();
  // lettuce
  ctx.fillStyle='#2a8a2a';
  for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(-s*0.6+i*s*0.4,0,s*0.3,s*0.2,Math.sin(i)*0.5,0,Math.PI*2);ctx.fill();}
  // bread top
  ctx.fillStyle='#d4920e';rr(ctx,-s,-s,s*2,s*0.75,s*0.35);ctx.fill();
  ctx.restore();
}

function refeitLoop(){
  const ov=document.getElementById('refeit-ov');
  if(ov.style.display==='none')return;
  const sc=document.getElementById('refeit-c');
  const ctx=sc.getContext('2d');
  sc.width=innerWidth;sc.height=innerHeight;
  drawRefeitScene(ctx,sc.width,sc.height,_refeitServed,_refeitShake);
  if(_refeitShake>0)_refeitShake--;
  // update + draw flying pieces
  _refeitFlying=_refeitFlying.filter(f=>{
    f.x+=f.vx; f.y+=f.vy; f.vy+=f.grav;
    f.rot+=f.rotSpd;
    f.alpha-=0.012;
    drawFlyingPiece(ctx,f);
    return f.alpha>0;
  });
  _refeitRaf=requestAnimationFrame(refeitLoop);
}

function openRefeitTask(task){
  _refeitTask=task;_refeitServed=0;_refeitShake=0;_refeitFlying=[];
  const ov=document.getElementById('refeit-ov');
  ov.style.display='block';
  cancelAnimationFrame(_refeitRaf);
  refeitLoop();
  let _refeitLastPress=0;
  function _playSwoosh(){
    try{
      const ac=getAC();
      const sr=ac.sampleRate;
      const dur=0.18+Math.random()*0.08;
      const buf=ac.createBuffer(1,Math.ceil(sr*dur),sr);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++){
        const t=i/sr;
        const env=Math.pow(1-t/dur,2.5);
        d[i]=(Math.random()*2-1)*env;
      }
      const src=ac.createBufferSource();src.buffer=buf;
      // sweep de highpass descendente: som de objeto cortando o ar
      const hp=ac.createBiquadFilter();hp.type='highpass';
      hp.frequency.setValueAtTime(3200,ac.currentTime);
      hp.frequency.exponentialRampToValueAtTime(180,ac.currentTime+dur);
      // leve reforço de presença
      const pk=ac.createBiquadFilter();pk.type='peaking';
      pk.frequency.value=1200;pk.gain.value=7;pk.Q.value=1.0;
      const g=ac.createGain();g.gain.value=0.7;
      src.connect(hp);hp.connect(pk);pk.connect(g);g.connect(ac.destination);
      src.start();src.stop(ac.currentTime+dur);
    }catch(e){}
  }
  function _doRefeit(){
    const now=Date.now();if(now-_refeitLastPress<1000)return;_refeitLastPress=now;
    if(_refeitServed>=_refeitTotal)return;
    _refeitServed++;_refeitShake=8;_playSwoosh();
    const sc2=document.getElementById('refeit-c');
    const cx=sc2.width/2, cy=sc2.height*0.54;
    const angle=(Math.random()*Math.PI*1.4)-Math.PI*0.7-Math.PI/2;
    const spd=8+Math.random()*6;
    _refeitFlying.push({x:cx,y:cy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-4,grav:0.28,rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-0.5)*0.22,size:18+Math.random()*12,alpha:1});
    if(_refeitServed>=_refeitTotal){
      document.removeEventListener('keydown',_refeitListener);_refeitListener=null;
      setTimeout(()=>{closeRefeitTask();completeTask(_refeitTask);},700);
    }
  }
  window.refeitTap=(e)=>{e.preventDefault();_doRefeit();};
  _refeitListener=(e)=>{
    if(['Escape','F1','F2','F3','F4','F5','F11','F12'].includes(e.key))return;
    if(e.repeat)return;
    e.preventDefault();
    _doRefeit();
  };
  document.addEventListener('keydown',_refeitListener);
}

window.closeRefeitTask=()=>{
  document.getElementById('refeit-ov').style.display='none';
  cancelAnimationFrame(_refeitRaf);_refeitRaf=null;
  if(_refeitListener){document.removeEventListener('keydown',_refeitListener);_refeitListener=null;}
};
