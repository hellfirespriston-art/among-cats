<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐱 Gatos no Espaço</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050810;color:#fff;font-family:'Segoe UI',Arial,sans-serif}
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
#menu{background:radial-gradient(ellipse at 50% 30%,#0d1b3e 0%,#030810 100%)}
.title{font-size:clamp(2rem,5vw,3.2rem);font-weight:900;background:linear-gradient(135deg,#ff9a6c,#ff6b9d,#c44dff,#7af);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;text-align:center}
.subtitle{color:#8899bb;font-size:1rem;margin-bottom:44px;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.mbtn{background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;padding:13px 42px;border-radius:30px;font-size:1rem;font-weight:700;cursor:pointer;margin:6px;box-shadow:0 4px 20px #667eea44;transition:transform .15s,box-shadow .15s}
.vent-dest{background:linear-gradient(135deg,#0a6e6e,#0aa);border:none;color:#fff;padding:13px 20px;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .12s,box-shadow .12s;box-shadow:0 3px 14px #00aaaa33;text-align:left}
.vent-dest:hover{transform:scale(1.04);box-shadow:0 4px 20px #00ffff55}
.vent-dest.here{background:linear-gradient(135deg,#333,#555);box-shadow:none;opacity:.85}
.mbtn:hover{transform:translateY(-2px);box-shadow:0 6px 28px #667eea55}
.mbtn.sec{background:linear-gradient(135deg,#1a1a3a,#0d0d20);box-shadow:none}
#star-c{position:fixed;inset:0;pointer-events:none;z-index:0}
.menu-ct{position:relative;z-index:1;text-align:center}
#customize{background:radial-gradient(ellipse at 50% 30%,#0d1b3e,#030810);flex-direction:row;gap:0}
.cl{width:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;border-right:1px solid #1a2a4a}
.cr{flex:1;padding:20px 28px;overflow-y:auto;display:flex;flex-direction:column;gap:18px;max-height:100vh}
.pvbox{width:220px;height:220px;background:#0d1530;border-radius:14px;border:2px solid #1e3a6a;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.slbl{font-size:.68rem;text-transform:uppercase;letter-spacing:1.5px;color:#446;font-weight:700;margin-bottom:8px}
.cgrid{display:flex;flex-wrap:wrap;gap:6px}
.cbtn{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
.cbtn.sel{border-color:#fff;transform:scale(1.25)}
.hgrid{display:flex;flex-wrap:wrap;gap:6px}
.hbtn{padding:6px 10px;background:#0d1530;border:2px solid #1e3a6a;border-radius:8px;cursor:pointer;font-size:1rem;transition:all .15s;text-align:center}
.hbtn.sel{border-color:#667eea;background:#1a2a6a}
.pgrid{display:flex;flex-wrap:wrap;gap:6px}
.pbtn{padding:6px 13px;background:#0d1530;border:2px solid #1e3a6a;border-radius:8px;cursor:pointer;font-size:.78rem;color:#99a;transition:all .15s}
.pbtn.sel{border-color:#667eea;color:#fff}
.ninput{background:#0d1530;border:2px solid #1e3a6a;color:#fff;padding:9px 12px;border-radius:9px;font-size:.95rem;width:100%;outline:none}
.ninput:focus{border-color:#667eea}
.playbtn{background:linear-gradient(135deg,#00c6ff,#0072ff);border:none;color:#fff;padding:14px;border-radius:13px;font-size:.95rem;font-weight:700;cursor:pointer;width:100%;margin-top:8px;transition:transform .15s}
.playbtn:hover{transform:translateY(-2px)}
.back{background:none;border:none;color:#446;cursor:pointer;font-size:.82rem;margin-top:8px}
#game{background:#000;padding:0;justify-content:flex-start;align-items:flex-start}
#gc{position:absolute;top:0;left:0}
.ov{display:none;position:fixed;inset:0;background:rgba(3,6,20,.93);z-index:200;align-items:center;justify-content:center;flex-direction:column}
.ov.active{display:flex}
#role-ov .rcard{background:#0d1b3e;border-radius:18px;padding:36px 52px;text-align:center;border:2px solid #2a4a8a;max-width:340px}
.ri{font-size:3.5rem;margin-bottom:10px}
.rt{font-size:1.6rem;font-weight:800;margin-bottom:8px}
.rd{color:#889;font-size:.85rem;line-height:1.65;margin-bottom:22px;white-space:pre-line}
#meet-ov{background:rgba(2,4,15,.97)}
.mtitle{font-size:1.7rem;font-weight:800;color:#ff4444;margin-bottom:6px}
.msub{color:#778;font-size:.83rem;margin-bottom:22px}
.vgrid{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:660px;margin-bottom:18px}
.vcard{background:#0d1b3e;border:2px solid #1e3a6a;border-radius:12px;padding:12px 14px;cursor:pointer;text-align:center;min-width:105px;transition:all .15s}
.vcard:hover{border-color:#667eea;background:#162a5a}
.vcard.voted{border-color:#00ff88;background:#002a16;pointer-events:none}
.vcard.skip{border-color:#ff8800}
.vcard.roulette-on{transform:scale(1.13);border-color:#ffcc33;box-shadow:0 0 0 3px #ffcc33,0 0 22px #ffcc33;background:#2a2410}
.vcard.roulette-pick{transform:scale(1.22);border-color:#ff3344;box-shadow:0 0 0 4px #ff3344,0 0 32px #ff3344;background:#2a0c10;animation:rrpick .35s ease infinite alternate}
@keyframes rrpick{from{box-shadow:0 0 0 4px #ff3344,0 0 18px #ff3344}to{box-shadow:0 0 0 4px #ff6677,0 0 38px #ff6677}}
.vname{font-size:.74rem;color:#ccd;margin-top:6px}
.vtimer{font-size:1.25rem;font-weight:700;color:#ff8800;margin-top:12px}
#task-ov .tbox{background:#0d1b3e;border:2px solid #1e3a6a;border-radius:16px;padding:28px 34px;text-align:center;min-width:310px;max-width:420px}
.ttitle{font-size:1.15rem;font-weight:700;color:#c8d8ff;margin-bottom:16px}
.tbtn{background:#162a5a;border:2px solid #2a5aff;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.9rem;margin:4px;transition:all .15s}
.tbtn:hover{background:#2a5aff}
.tcls{background:none;border:1px solid #223;color:#556;padding:7px 16px;border-radius:7px;cursor:pointer;margin-top:12px}
#end-ov .ebox{text-align:center}
.etitle{font-size:2.6rem;font-weight:900;margin-bottom:10px}
.esub{color:#778;margin-bottom:26px;font-size:.93rem}
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
.taskbar{position:absolute;top:13px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.76);border-radius:18px;padding:7px 18px;min-width:250px;text-align:center}
.tblbl{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:#778;margin-bottom:3px}
.tbtrack{height:8px;background:#111;border-radius:8px;overflow:hidden}
.tbfill{height:100%;background:linear-gradient(to right,#00ff88,#00cc66);border-radius:8px;transition:width .5s}
.killbtn{position:absolute;bottom:22px;right:18px;background:#cc2244;border:none;color:#fff;padding:13px 20px;border-radius:14px;font-size:.9rem;font-weight:700;cursor:pointer;pointer-events:all;display:none;opacity:.35;transition:opacity .2s,transform .15s}
.killbtn.rdy{opacity:1;box-shadow:0 0 18px #ff335577}
.killbtn:active{transform:scale(.95)}
.usebtn{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);background:#1a3ecc;border:none;color:#fff;padding:12px 22px;border-radius:14px;font-size:.85rem;font-weight:700;cursor:pointer;pointer-events:all;display:none;white-space:nowrap}
#jzone{display:none!important}
#dpad{position:absolute;bottom:14px;left:14px;width:154px;height:154px;display:none;pointer-events:all;user-select:none;-webkit-user-select:none;}
.dpad-btn{position:absolute;width:50px;height:50px;background:rgba(255,255,255,.09);border:2px solid rgba(255,255,255,.22);border-radius:10px;color:rgba(255,255,255,.8);font-size:1.35rem;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background .06s,transform .05s;}
.dpad-btn.pressed{background:rgba(255,255,255,.28);transform:scale(.9);}
#dpad-c{position:absolute;top:52px;left:52px;width:50px;height:50px;background:rgba(255,255,255,.03);border-radius:50%;pointer-events:none;}
.notif{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:rgba(255,50,50,.9);color:#fff;padding:9px 20px;border-radius:26px;font-weight:700;z-index:999;pointer-events:none;white-space:nowrap;font-size:.85rem;animation:fi 3.2s forwards}
@keyframes fi{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
@keyframes scanRot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@media(max-width:600px){#customize{flex-direction:column}.cl{width:100%;border-right:none;border-bottom:1px solid #1a2a4a;padding:16px;flex-direction:row;gap:16px;justify-content:center}.cr{padding:14px}}
#lobby-c{position:absolute;inset:0;pointer-events:none;}
#lobby-log{position:absolute;bottom:22px;left:18px;display:flex;flex-direction:column;gap:5px;z-index:3;pointer-events:none;}
.llog-item{padding:3px 10px;background:rgba(0,0,0,0.6);border-radius:7px;font-size:0.73rem;color:#8ab;white-space:nowrap;animation:fi 3.5s forwards;}
#menu-stats{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:2;background:rgba(0,0,0,.55);border:1px solid #1e3a6a;border-radius:20px;padding:6px 18px;font-size:.78rem;color:#8ab;white-space:nowrap}
#menu-ui{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:10px}
#dgrid{display:flex;gap:8px}
.dbtn{background:rgba(13,21,48,.85);border:2px solid #1e3a6a;color:#8ab;padding:7px 16px;border-radius:18px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s}
.dbtn.sel{border-color:#667eea;color:#fff;background:#1a2a6a}
.cpick{width:30px;height:30px;border-radius:50%;border:3px dashed #88a;cursor:pointer;padding:0;background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)}
.cpick::-webkit-color-swatch-wrapper{padding:0;opacity:0}
.cpick::-webkit-color-swatch{border:none;opacity:0}
#fade-ov{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .18s;z-index:5000}
#mchat{display:flex;flex-direction:column;gap:4px;margin:0 auto 14px;max-width:560px;min-height:26px}
.mline{background:rgba(13,27,62,.85);border:1px solid #1e3a6a;border-radius:10px;padding:5px 12px;font-size:.74rem;color:#bcd;text-align:left;animation:fi2 .3s ease-out}
@keyframes fi2{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<canvas id="star-c"></canvas>
<div id="fade-ov"></div>

<!-- INTRO -->
<div id="intro-ov" style="position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer" onclick="skipIntro()">
  <canvas id="intro-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <div id="intro-tap" style="position:absolute;bottom:38px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.45);font-size:.85rem;letter-spacing:2px;pointer-events:none;animation:fi 2s ease-in-out infinite alternate">Toque para começar</div>
  <div style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:.7rem;letter-spacing:1.5px;pointer-events:none;white-space:nowrap;animation:blink 1.1s step-start infinite;color:rgba(180,140,255,0.7)">criado por Sarah e Sidney</div>
</div>

<!-- MENU -->
<div class="screen" id="menu">
  <canvas id="lobby-c"></canvas>
  <div id="lobby-log"></div>
  <div id="menu-stats"></div>
  <div id="menu-ui">
    <div id="dgrid">
      <button class="dbtn" data-d="facil" onclick="setDiff('facil')">😺 Fácil</button>
      <button class="dbtn sel" data-d="normal" onclick="setDiff('normal')">😼 Normal</button>
      <button class="dbtn" data-d="dificil" onclick="setDiff('dificil')">😾 Difícil</button>
    </div>
    <button class="mbtn" onclick="go('customize')" style="font-size:1.15rem;padding:16px 56px;">🎮 Jogar</button>
  </div>
</div>

<!-- PERSONALIZAÇÃO -->
<div class="screen" id="customize">
  <div class="cl">
    <div class="pvbox"><canvas id="prev" width="210" height="210"></canvas></div>
    <button class="playbtn" onclick="startGame()">🚀 Jogar!</button>
    <button class="back" onclick="go('menu')">← Voltar</button>
  </div>
  <div class="cr">
    <div><div class="slbl">Nome</div><input class="ninput" id="pname" maxlength="12" value="Gatão" oninput="updPrev()"></div>
    <div><div class="slbl">Cor do pelo</div><div class="cgrid" id="cgrid"></div></div>
    <div><div class="slbl">Chapéu</div><div class="hgrid" id="hgrid"></div></div>
    <div><div class="slbl">Pelagem</div><div class="pgrid" id="pgrid"></div></div>
    <div><div class="slbl">Cor dos olhos</div><div class="cgrid" id="egrid"></div></div>
    <div><div class="slbl">Acessório</div><div class="hgrid" id="agrid"></div></div>
  </div>
</div>

<!-- JOGO -->
<div class="screen" id="game">
  <canvas id="gc"></canvas>
  <!-- TELA DE EJEÇÃO -->
  <canvas id="eject-c" style="display:none;position:fixed;inset:0;z-index:900;width:100%;height:100%;"></canvas>
  <div id="hud">
    <div class="taskbar">
      <div class="tblbl">Tarefas da tripulação</div>
      <div class="tbtrack"><div class="tbfill" id="tbfill" style="width:0"></div></div>
    </div>
    <button class="killbtn" id="killbtn" onclick="tryKill()">☠️ Matar</button>
    <button class="killbtn" id="sabbtn" style="bottom:80px;background:#aa7700" onclick="trySabotage()">💡 Sabotar</button>
    <button class="killbtn" id="ventbtn" style="bottom:138px;background:#1a8a8a" onclick="tryVent()">🕳️ Vent</button>
    <button class="usebtn" id="usebtn" onclick="tryUse()">⚡ Usar</button>
    <div id="dpad">
      <button class="dpad-btn" id="dbU" style="top:0;left:52px;">▲</button>
      <button class="dpad-btn" id="dbL" style="top:52px;left:0;">◀</button>
      <div id="dpad-c"></div>
      <button class="dpad-btn" id="dbR" style="top:52px;left:104px;">▶</button>
      <button class="dpad-btn" id="dbD" style="top:104px;left:52px;">▼</button>
    </div>
    <div id="jzone"><div class="jbase"></div><div class="jthumb" id="jthumb"></div></div>
  </div>
</div>

<!-- ROLE -->
<div class="ov" id="role-ov">
  <div class="rcard">
    <div class="ri" id="ri"></div>
    <div class="rt" id="rt"></div>
    <div class="rd" id="rd"></div>
    <button class="mbtn" onclick="closeOv('role-ov');G.phase='play';gameRunning=true;lastT=performance.now();loop(lastT)">Começar! 🚀</button>
  </div>
</div>

<!-- MEETING -->
<div class="ov" id="meet-ov">
  <div style="text-align:center">
    <div class="mtitle" id="mtitle"></div>
    <div class="msub" id="msub"></div>
    <div id="mchat"></div>
    <div class="vgrid" id="vgrid"></div>
    <div class="vtimer" id="vtimer"></div>
  </div>
</div>

<!-- VENT (alçapão: escolher saída) -->
<div class="ov" id="vent-ov">
  <div class="rcard" style="max-width:380px;border-color:#0aa">
    <div style="font-size:2rem;margin-bottom:2px">🕳️</div>
    <div style="font-size:1.25rem;font-weight:800;color:#2dd;margin-bottom:4px">Sair em qual sala?</div>
    <div style="font-size:.78rem;color:#9bd;margin-bottom:14px">Toque no destino (ou ⎋ pra sair aqui)</div>
    <div id="vent-grid" style="display:flex;flex-direction:column;gap:9px"></div>
  </div>
</div>

<!-- TASK -->
<div class="ov" id="task-ov">
  <div class="tbox">
    <div class="ttitle" id="ttitle"></div>
    <div id="tcontent"></div>
    <button class="tcls" onclick="closeTask()">✕ Fechar</button>
  </div>
</div>

<!-- REFEIT TASK OVERLAY -->
<div id="refeit-ov" style="display:none;position:fixed;inset:0;z-index:600;background:#000;overflow:hidden">
  <canvas id="refeit-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <button ontouchstart="refeitTap(event)" onmousedown="refeitTap(event)"
    style="position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
    background:linear-gradient(135deg,#cc6600,#ff9900);border:none;color:#fff;
    padding:20px 48px;border-radius:20px;font-size:1.3rem;font-weight:900;
    cursor:pointer;box-shadow:0 0 24px #ff880066;letter-spacing:1px;
    user-select:none;-webkit-user-select:none;touch-action:manipulation;z-index:2">
    🥪 DISTRIBUIR
  </button>
  <button onclick="closeRefeitTask()" style="position:absolute;top:18px;right:18px;background:rgba(0,0,0,.7);border:1px solid #444;color:#888;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;z-index:2">✕ Fechar</button>
</div>

<!-- BEDS TASK OVERLAY -->
<div id="beds-ov" style="display:none;position:fixed;inset:0;z-index:600;background:#000;overflow:hidden;cursor:default">
  <canvas id="beds-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <button onclick="closeBedsTask()" style="position:absolute;top:18px;right:18px;background:rgba(0,0,0,.7);border:1px solid #444;color:#888;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;z-index:2">✕ Fechar</button>
</div>

<!-- SANDBOX TASK OVERLAY -->
<div id="sandbox-ov" style="display:none;position:fixed;inset:0;z-index:600;background:#000;overflow:hidden;cursor:default">
  <canvas id="sandbox-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <button onclick="closeSandboxTask()" style="position:absolute;top:18px;right:18px;background:rgba(0,0,0,.7);border:1px solid #444;color:#888;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;z-index:2">✕ Fechar</button>
</div>

<!-- SCRATCH TASK OVERLAY -->
<div id="scratch-ov" style="display:none;position:fixed;inset:0;z-index:600;background:#000;overflow:hidden">
  <canvas id="scratch-c" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <!-- progress bar -->
  <div style="position:absolute;right:32px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="color:#ff2200;font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);margin-bottom:4px">Velocidade</div>
    <div id="scratch-bar-wrap" style="width:22px;height:220px;background:#1a0000;border:2px solid #550000;border-radius:11px;overflow:hidden;display:flex;flex-direction:column-reverse">
      <div id="scratch-bar" style="width:100%;height:0%;background:linear-gradient(to top,#ff0000,#ff6600);border-radius:11px;transition:height .08s"></div>
    </div>
    <div style="color:#550000;font-size:.6rem">🐾</div>
  </div>
  <!-- mobile tap button -->
  <button id="scratch-tap-btn" ontouchstart="scratchTap(event)" onmousedown="scratchTap(event)"
    style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
    background:linear-gradient(135deg,#cc2200,#ff4400);border:none;color:#fff;
    padding:22px 52px;border-radius:20px;font-size:1.4rem;font-weight:900;
    cursor:pointer;box-shadow:0 0 28px #ff220066;letter-spacing:2px;
    user-select:none;-webkit-user-select:none;touch-action:manipulation">
    🐾 ARRANHAR
  </button>
  <!-- hint -->
  <div id="scratch-hint" style="position:absolute;bottom:28px;left:50%;transform:translateX(-50%);color:#550000;font-size:.82rem;letter-spacing:1px;text-align:center">Pressione <b style="color:#ff4400">CTRL</b> ou toque o botão o mais rápido possível!</div>
  <!-- close -->
  <button onclick="closeScratchTask()" style="position:absolute;top:18px;right:18px;background:none;border:1px solid #330000;color:#550000;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem">✕ Fechar</button>
</div>

<!-- CREW WIN CINEMATIC -->
<canvas id="crew-win-c" style="display:none;position:fixed;inset:0;z-index:950;width:100%;height:100%"></canvas>

<!-- END -->
<div class="ov" id="end-ov">
  <div class="ebox">
    <div class="etitle" id="etitle"></div>
    <div class="esub" id="esub"></div>
    <button class="mbtn" onclick="startGame()">🔄 Jogar Novamente</button><br>
    <button class="back" onclick="go('customize');closeAllOv()" style="margin-top:10px">← Personalizar</button>
  </div>
</div>

<script>
// ══ STARS ══
const SC=document.getElementById('star-c'),sCtx=SC.getContext('2d');
function drawStars(){SC.width=innerWidth;SC.height=innerHeight;for(let i=0;i<180;i++){const x=Math.random()*innerWidth,y=Math.random()*innerHeight,r=Math.random()*1.4+.2,a=Math.random()*.7+.2;sCtx.beginPath();sCtx.arc(x,y,r,0,Math.PI*2);sCtx.fillStyle=`rgba(255,255,255,${a})`;sCtx.fill();}}
drawStars();addEventListener('resize',drawStars);

// ══ CUSTOM DATA ══
// ══ INTRO ══
(function(){
  const cv=document.getElementById('intro-c');
  const ctx=cv.getContext('2d');
  let _raf,_done=false;

  // stars (fixed seed-like positions)
  const stars=Array.from({length:220},()=>({
    x:Math.random(),y:Math.random(),
    r:Math.random()*1.3+0.2,
    a:Math.random()*0.6+0.2,
    twinkle:Math.random()*Math.PI*2
  }));

  // diagonal light streaks like the reference image
  const streaks=[
    {x1:0.62,y1:0,x2:0.72,y2:1},
    {x1:0.70,y1:0,x2:0.80,y2:1},
  ];

  // flying cats
  const catColors=['#cc5500','#ddddff','#ff4444','#4488ff','#00cc55','#ffcc00','#9933ff'];
  const catEyes  =['#00ee66','#44aaff','#ffaa00','#ffffff','#ff3344','#aa44ff'];
  const catPats  =['solid','striped','spotted','tuxedo'];
  const catHats  =['none','crown','tophat','cowboy','wizard','flower','halo'];
  const cats=Array.from({length:7},(_,i)=>({
    x:Math.random(),y:Math.random(),
    vx:(Math.random()-0.5)*0.0018,
    vy:(Math.random()-0.5)*0.0018,
    rot:Math.random()*Math.PI*2,
    rotSpd:(Math.random()-0.5)*0.025,
    scale:0.9+Math.random()*1.4,
    color:catColors[i%catColors.length],
    eye:catEyes[i%catEyes.length],
    hat:catHats[i%catHats.length],
    pattern:catPats[i%catPats.length],
    dir:Math.random()<0.5?1:-1,
  }));

  // logo fade
  let logoAlpha=0,t=0;

  function frame(){
    if(_done)return;
    cv.width=innerWidth;cv.height=innerHeight;
    const W=cv.width,H=cv.height;
    t+=0.016;

    // bg
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    // stars
    stars.forEach(s=>{
      const tw=0.55+0.45*Math.sin(s.twinkle+t*1.8);
      ctx.globalAlpha=s.a*tw;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;

    // diagonal streaks
    streaks.forEach(s=>{
      const grd=ctx.createLinearGradient(s.x1*W,0,s.x2*W,H);
      grd.addColorStop(0,'rgba(255,255,255,0)');
      grd.addColorStop(0.3,'rgba(255,255,255,0.045)');
      grd.addColorStop(0.7,'rgba(255,255,255,0.045)');
      grd.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=grd;
      ctx.beginPath();
      ctx.moveTo(s.x1*W,0);ctx.lineTo(s.x2*W,H);
      ctx.lineTo((s.x2+0.09)*W,H);ctx.lineTo((s.x1+0.09)*W,0);
      ctx.closePath();ctx.fill();
    });

    // cats
    cats.forEach(c=>{
      c.x+=c.vx;c.y+=c.vy;
      c.rot+=c.rotSpd;
      if(c.x<-0.15)c.x=1.15;if(c.x>1.15)c.x=-0.15;
      if(c.y<-0.15)c.y=1.15;if(c.y>1.15)c.y=-0.15;
      ctx.save();
      ctx.translate(c.x*W,c.y*H);
      ctx.rotate(c.rot);
      drawCat(ctx,0,0,{color:c.color,eye:c.eye,hat:c.hat,pattern:c.pattern,dir:c.dir,scale:c.scale});
      ctx.restore();
    });

    // logo
    logoAlpha=Math.min(1,logoAlpha+0.012);
    ctx.globalAlpha=logoAlpha;
    ctx.textAlign='center';
    // title
    const fs=Math.round(Math.min(W*0.09,72));
    ctx.font=`900 ${fs}px 'Segoe UI',Arial`;
    ctx.shadowColor='#c44dff';ctx.shadowBlur=32;
    const grad=ctx.createLinearGradient(W/2-200,0,W/2+200,0);
    grad.addColorStop(0,'#ff9a6c');grad.addColorStop(0.4,'#ff6b9d');
    grad.addColorStop(0.7,'#c44dff');grad.addColorStop(1,'#7af');
    ctx.fillStyle=grad;
    ctx.fillText('Gatos no Espaço',W/2,H*0.44);
    // subtitle
    ctx.shadowBlur=0;
    ctx.font=`${Math.round(fs*0.28)}px 'Segoe UI',Arial`;
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('Among Us com gatinhos fofos',W/2,H*0.44+fs*0.72);
    ctx.globalAlpha=1;
    ctx.shadowBlur=0;

    _raf=requestAnimationFrame(frame);
  }

  // ── música de suspense ──
  let _ac=null,_musicNodes=[];
  function startIntroMusic(){
    try{
      _ac=new(window.AudioContext||window.webkitAudioContext)();
      const ac=_ac;
      if(ac.state==='suspended')ac.resume();
      const master=ac.createGain();master.gain.value=0;master.connect(ac.destination);
      _musicNodes.push(master);
      // fade in suave
      master.gain.linearRampToValueAtTime(0.55,ac.currentTime+2.5);

      // ── drone grave (pad de suspense) ──
      [55,55.3,110,110.5].forEach((hz,i)=>{
        const o=ac.createOscillator();o.type=i<2?'sawtooth':'sine';
        o.frequency.value=hz;
        const lfo=ac.createOscillator();lfo.frequency.value=0.12+i*0.03;
        const lfoG=ac.createGain();lfoG.gain.value=0.8;
        lfo.connect(lfoG);lfoG.connect(o.frequency);
        const g=ac.createGain();g.gain.value=0.08;
        const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=320;lp.Q.value=2;
        o.connect(lp);lp.connect(g);g.connect(master);
        o.start();lfo.start();
        _musicNodes.push(o,lfo);
      });

      // ── pad médio (acorde menor) ──
      // Dm: D3=146.8, F3=174.6, A3=220
      [146.8,174.6,220,293.6].forEach((hz,i)=>{
        const o=ac.createOscillator();o.type='triangle';
        o.frequency.value=hz+Math.random()*0.4;
        const lfo=ac.createOscillator();lfo.frequency.value=0.08+i*0.05;
        const lfoG=ac.createGain();lfoG.gain.value=1.2;
        lfo.connect(lfoG);lfoG.connect(o.frequency);
        const g=ac.createGain();g.gain.value=0.06;
        const lp=ac.createBiquadFilter();lp.type='bandpass';lp.frequency.value=600+i*80;lp.Q.value=1.5;
        o.connect(lp);lp.connect(g);g.connect(master);
        o.start();lfo.start();
        _musicNodes.push(o,lfo);
      });

      // ── pulsação de tensão (batida lenta) ──
      function pulse(delay){
        if(!_ac)return;
        const now=ac.currentTime+delay;
        const o=ac.createOscillator();o.type='sine';o.frequency.value=55;
        const g=ac.createGain();
        g.gain.setValueAtTime(0,now);
        g.gain.linearRampToValueAtTime(0.45,now+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.55);
        o.connect(g);g.connect(master);
        o.start(now);o.stop(now+0.6);
        if(_ac)setTimeout(()=>pulse(0),2200);
      }
      setTimeout(()=>pulse(0),800);

      // ── arpejo sinistro (notas subindo lentamente) ──
      const notes=[130.8,155.6,174.6,196,220,261.6]; // Cm pentatônico
      let ni=0;
      function arp(){
        if(!_ac)return;
        const now=ac.currentTime;
        const o=ac.createOscillator();o.type='sine';
        o.frequency.value=notes[ni%notes.length];ni++;
        const g=ac.createGain();
        g.gain.setValueAtTime(0,now);
        g.gain.linearRampToValueAtTime(0.12,now+0.08);
        g.gain.exponentialRampToValueAtTime(0.001,now+1.1);
        o.connect(g);g.connect(master);
        o.start(now);o.stop(now+1.2);
        if(_ac)setTimeout(arp,700+Math.random()*400);
      }
      setTimeout(arp,1200);

    }catch(e){}
  }

  function stopIntroMusic(){
    if(!_ac)return;
    try{
      _musicNodes.forEach(n=>{try{n.stop&&n.stop();}catch(e){}});
      _ac.close();
    }catch(e){}
    _ac=null;_musicNodes=[];
  }
  window.stopIntroMusic=stopIntroMusic;
  document.addEventListener('visibilitychange',()=>{if(document.hidden)stopIntroMusic();});
  window.addEventListener('beforeunload',()=>stopIntroMusic());

  let _musicStarted=false;

  function _doSkip(){
    if(_done)return;
    _done=true;
    cancelAnimationFrame(_raf);
    stopIntroMusic();
    const ov=document.getElementById('intro-ov');
    ov.style.transition='opacity 0.6s';
    ov.style.opacity='0';
    setTimeout(()=>{
      ov.style.display='none';
      document.getElementById('menu').classList.add('active');
      startLobby();
    },620);
  }

  let _musicStartTime=0;

  window.skipIntro=function(){
    if(_done)return;
    if(!_musicStarted){
      // primeiro toque: só inicia música
      _musicStarted=true;
      _musicStartTime=Date.now();
      startIntroMusic();
      const tap=document.getElementById('intro-tap');
      if(tap)tap.textContent='Toque novamente para começar';
      return;
    }
    // segundo toque (ou pelo menos 400ms depois): sai da intro
    if(Date.now()-_musicStartTime<400)return;
    _doSkip();
  };

  window.addEventListener('load',()=>{ frame(); });
})();

let _gac=null;
function getAC(){
  if(!_gac||_gac.state==='closed'){
    _gac=new(window.AudioContext||window.webkitAudioContext)();
  }
  if(_gac.state==='suspended')_gac.resume();
  return _gac;
}
document.addEventListener('pointerdown',()=>getAC(),{once:true});
document.addEventListener('keydown',()=>getAC(),{once:true});
document.addEventListener('touchstart',()=>getAC(),{once:true});

function _load(){
  try{
    const p=JSON.parse(localStorage.getItem('ac_profile')||'null');
    if(p){
      if(p.name)C.name=String(p.name).slice(0,12);
      if(/^#[0-9a-f]{6}$/i.test(p.color||''))C.color=p.color;
      if(HATS.some(h=>h.id===p.hat))C.hat=p.hat;
      if(PATS.some(x=>x.id===p.pattern))C.pattern=p.pattern;
      if(EYEC.includes(p.eye))C.eye=p.eye;
      if(ACCS.some(a=>a.id===p.acc))C.acc=p.acc;
      if(DIFFS[p.diff])DIFF=p.diff;
    }
    const s=JSON.parse(localStorage.getItem('ac_stats')||'null');
    if(s){STATS.cw=s.cw|0;STATS.iw=s.iw|0;STATS.gp=s.gp|0;}

// ══ CAT DRAW ══
function drawCat(ctx,x,y,o={}){
  const{color='#f00',eye='#0f6',hat='none',pattern='solid',name='',dir=1,dead=false,alpha=1,scale=1,isPlayer=false,bob=0,walk=0,ghost=false,acc='none'}=o;
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);ctx.globalAlpha=alpha;
  if(dead){ctx.rotate(.38*dir);ctx.globalAlpha=alpha*.6;}
  else if(walk)ctx.rotate(Math.sin(walk)*.055);
  const bw=19,bh=20;
  const isDark=(()=>{const {r,g,b}=h2rgb(color);return(r*299+g*587+b*114)/1000<40;})();
  // Sombra (fantasma não tem)
  if(!ghost){
    const shSc=1-bob*.04;
    ctx.beginPath();ctx.ellipse(0,bh+9,bw*.75*shSc,4.5*shSc,0,0,Math.PI*2);ctx.fillStyle=`rgba(0,0,0,${.28-bob*.012})`;ctx.fill();
  }
  if(bob)ctx.translate(0,-bob);
  // Rabo (grande, enrolado pra cima) — saindo do lado oposto à direção
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=6;ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-dir*bw*.75,bh*.4);
  ctx.bezierCurveTo(-dir*bw*2.5,bh*.5,-dir*bw*3.0,-bh*1.0,-dir*bw*1.1,-bh*1.4);
  ctx.stroke();ctx.restore();
  // Mochila (atrás do corpo, lado oposto à direção)
  if(acc==='mochila'&&!dead){ctx.save();ctx.translate(-dir*bw*.82,-2);ctx.fillStyle='#c2483a';rr(ctx,-8,-11,16,24,5);ctx.fill();ctx.fillStyle='#8f2f26';rr(ctx,-8,-3,16,7,3);ctx.fill();ctx.fillStyle='#e8c87a';rr(ctx,-4,-8,8,4,2);ctx.fill();ctx.restore();}
  // Pezinhos (dois arredondados embaixo) — animados ao andar; fantasma não tem
  if(!ghost){ctx.fillStyle=color;[-8,8].forEach((lx,li)=>{const ph=walk?Math.sin(walk+li*Math.PI):0;ctx.beginPath();ctx.ellipse(lx+ph*3.4*dir,bh+7,6.5,Math.max(4.5,8.5-Math.abs(ph)*1.8),0,0,Math.PI*2);ctx.fill();});}
  // Corpo — retângulo arredondado (estilo da Sarah)
  ctx.fillStyle=color;
  const rc=9;
  ctx.beginPath();
  ctx.moveTo(-bw+rc,-bh);ctx.lineTo(bw-rc,-bh);ctx.arcTo(bw,-bh,bw,-bh+rc,rc);
  ctx.lineTo(bw,bh-rc);ctx.arcTo(bw,bh,bw-rc,bh,rc);
  ctx.lineTo(-bw+rc,bh);ctx.arcTo(-bw,bh,-bw,bh-rc,rc);
  ctx.lineTo(-bw,-bh+rc);ctx.arcTo(-bw,-bh,-bw+rc,-bh,rc);
  ctx.closePath();ctx.fill();
  // Padrão
  if(pattern==='striped'){ctx.save();ctx.beginPath();ctx.rect(-bw,-bh,bw*2,bh*2);ctx.clip();ctx.strokeStyle=isDark?'rgba(255,255,255,.18)':dk(color,.28);ctx.lineWidth=4;for(let i=-40;i<40;i+=8){ctx.beginPath();ctx.moveTo(i,-bh);ctx.lineTo(i,bh);ctx.stroke();}ctx.restore();}
  else if(pattern==='spotted'){ctx.save();ctx.beginPath();ctx.rect(-bw,-bh,bw*2,bh*2);ctx.clip();ctx.fillStyle=isDark?'rgba(255,255,255,.18)':dk(color,.28);[[-6,-9,4.5],[8,1,3.5],[-3,10,3.5],[9,-4,3]].forEach(([sx,sy,sr])=>{ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();});ctx.restore();}
  else if(pattern==='tuxedo'){ctx.save();ctx.beginPath();ctx.rect(-bw,-bh,bw*2,bh*2);ctx.clip();ctx.fillStyle=isDark?'rgba(255,255,255,.75)':'#080f1a';ctx.beginPath();ctx.ellipse(0,4,bw*.46,bh*.6,0,0,Math.PI*2);ctx.fill();ctx.restore();}
  // Orelhas pontudas
  [[-1],[1]].forEach(([s])=>{
    ctx.fillStyle=color;
    ctx.beginPath();ctx.moveTo(s*4,-bh);ctx.lineTo(s*17,-bh-14);ctx.lineTo(s*15,-bh+2);ctx.closePath();ctx.fill();
    ctx.fillStyle=lt(color,.38);
    ctx.beginPath();ctx.moveTo(s*5,-bh-1);ctx.lineTo(s*15,-bh-11);ctx.lineTo(s*13,-bh+1);ctx.closePath();ctx.fill();
  });
  // Fantasma: caudinha ondulada embaixo + brilho espectral
  if(ghost){
    ctx.fillStyle=color;
    for(let gi=0;gi<3;gi++){ctx.beginPath();ctx.arc(-12+gi*12,bh+(gi%2?2:5),6.5,0,Math.PI);ctx.fill();}
    ctx.fillStyle='rgba(160,210,255,.28)';
    ctx.beginPath();ctx.ellipse(0,0,bw+2,bh+6,0,0,Math.PI*2);ctx.fill();
  }
  // Cara
  const fy=-4;
  if(!dead){
    const lc=isDark?'rgba(255,255,255,.85)':'#1a1a1a';
    // Sobrancelhas bravas (inclinadas pra dentro)
    ctx.save();ctx.strokeStyle=lc;ctx.lineWidth=2.2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-12,fy-7);ctx.lineTo(-4,fy-3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(12,fy-7);ctx.lineTo(4,fy-3);ctx.stroke();
    ctx.restore();
    // Olhos pequenos e furiosos
    ctx.fillStyle=lc;
    ctx.save();ctx.translate(-7,fy);ctx.rotate(.25);ctx.beginPath();ctx.ellipse(0,0,4,2.8,0,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.save();ctx.translate(7,fy);ctx.rotate(-.25);ctx.beginPath();ctx.ellipse(0,0,4,2.8,0,0,Math.PI*2);ctx.fill();ctx.restore();
    // Nariz
    ctx.fillStyle='#ff88aa';ctx.beginPath();ctx.arc(0,fy+6,2.8,0,Math.PI*2);ctx.fill();
    // Bigodes longos (6, 3 de cada lado — estilo da Sarah)
    ctx.save();ctx.strokeStyle=isDark?'rgba(255,255,255,.75)':'rgba(0,0,0,.55)';ctx.lineWidth=1;ctx.lineCap='round';
    const wp=0,wq=fy+6;
    [[-21,-5],[-22,1],[-19,7]].forEach(([dx,dy])=>{ctx.beginPath();ctx.moveTo(wp-4,wq);ctx.lineTo(wp+dx,wq+dy);ctx.stroke();});
    [[21,-5],[22,1],[19,7]].forEach(([dx,dy])=>{ctx.beginPath();ctx.moveTo(wp+4,wq);ctx.lineTo(wp+dx,wq+dy);ctx.stroke();});
    ctx.restore();
    // Pontinho decorativo (igual ao desenho da Sarah)
    ctx.fillStyle=isDark?'rgba(255,255,255,.35)':dk(color,.38);
    ctx.beginPath();ctx.arc(dir*10,9,2.5,0,Math.PI*2);ctx.fill();
  } else {
    [{ex:-7,ey:fy},{ex:7,ey:fy}].forEach(({ex,ey})=>{ctx.save();ctx.strokeStyle='#ff3333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ex-3,ey-3);ctx.lineTo(ex+3,ey+3);ctx.moveTo(ex+3,ey-3);ctx.lineTo(ex-3,ey+3);ctx.stroke();ctx.restore();});
  }
  // Acessórios da cara/pescoço
  if(acc==='oculos'&&!dead){ctx.save();ctx.strokeStyle='#15171c';ctx.lineWidth=2;ctx.fillStyle='rgba(120,220,255,.3)';[-7,7].forEach(gx=>{ctx.beginPath();ctx.arc(gx,fy,5.6,0,Math.PI*2);ctx.fill();ctx.stroke();});ctx.beginPath();ctx.moveTo(-1.4,fy);ctx.lineTo(1.4,fy);ctx.stroke();ctx.beginPath();ctx.moveTo(-12.6,fy);ctx.lineTo(-17,fy-2);ctx.moveTo(12.6,fy);ctx.lineTo(17,fy-2);ctx.stroke();ctx.restore();}
  if(acc==='coleira'){ctx.save();ctx.strokeStyle='#cc2233';ctx.lineWidth=3.5;ctx.beginPath();ctx.moveTo(-bw+2,bh-6);ctx.quadraticCurveTo(0,bh-1,bw-2,bh-6);ctx.stroke();ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(0,bh-2,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#aa8800';ctx.fillRect(-.7,bh-1.6,1.4,2.6);ctx.restore();}
  drawHat(ctx,hat,dir,bw,bh);

function drawHat(ctx,hat,dir,bw,bh){
  const ty=-bh-12;ctx.save();
  switch(hat){
    case'crown':ctx.fillStyle='#ffd700';ctx.beginPath();ctx.moveTo(-11,ty+6);ctx.lineTo(-9,ty-5);ctx.lineTo(-3,ty+2);ctx.lineTo(0,ty-8);ctx.lineTo(3,ty+2);ctx.lineTo(9,ty-5);ctx.lineTo(11,ty+6);ctx.closePath();ctx.fill();ctx.fillStyle='#ff4444';[0,-7,7].forEach(jx=>{ctx.beginPath();ctx.arc(jx,ty-3,2,0,Math.PI*2);ctx.fill();});break;
    case'tophat':ctx.fillStyle='#1a1a1a';ctx.fillRect(-9,ty-13,18,13);ctx.fillRect(-12,ty,24,4);ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(-9,ty-13,18,13);break;
    case'cowboy':ctx.fillStyle='#8B6914';ctx.beginPath();ctx.ellipse(0,ty+2,13,4.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#a07820';ctx.beginPath();ctx.ellipse(0,ty-4,8,8,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8B6914';ctx.fillRect(-8,ty-6,16,6);break;
    case'wizard':ctx.fillStyle='#6633aa';ctx.beginPath();ctx.moveTo(-9,ty+4);ctx.lineTo(0,ty-19);ctx.lineTo(9,ty+4);ctx.closePath();ctx.fill();ctx.fillStyle='#4422aa';ctx.beginPath();ctx.ellipse(0,ty+4,11,3.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffdd00';[[0,ty-10],[-5,ty-4],[5,ty-2]].forEach(([sx,sy])=>{ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fill();});break;
    case'flower':ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(0,ty-2,4.5,0,Math.PI*2);ctx.fill();['#ff6688','#ff88cc','#ff44aa','#ffaa66','#ff66aa'].forEach((pc,i)=>{const a=i/5*Math.PI*2;ctx.fillStyle=pc;ctx.beginPath();ctx.ellipse(Math.cos(a)*8,ty-2+Math.sin(a)*8,4,3,a,0,Math.PI*2);ctx.fill();});ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(0,ty-2,3.5,0,Math.PI*2);ctx.fill();break;
    case'halo':ctx.save();ctx.strokeStyle='#ffee66';ctx.lineWidth=3;ctx.shadowColor='#ffee66';ctx.shadowBlur=10;ctx.beginPath();ctx.ellipse(0,ty-7,10,3.5,0,0,Math.PI*2);ctx.stroke();ctx.restore();break;
    case'propeller':ctx.fillStyle='#cc3333';ctx.beginPath();ctx.arc(0,ty-5,3.5,0,Math.PI*2);ctx.fill();const pa=Date.now()/300;for(let i=0;i<3;i++){ctx.save();ctx.translate(0,ty-5);ctx.rotate(pa+i*2.09);ctx.fillStyle='#5588ff';ctx.beginPath();ctx.ellipse(7,0,7,3,0,0,Math.PI*2);ctx.fill();ctx.restore();}break;
    case'xmas':ctx.fillStyle='#cc2222';ctx.beginPath();ctx.moveTo(-9,ty+4);ctx.lineTo(0,ty-17);ctx.lineTo(9,ty+4);ctx.closePath();ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,ty-17,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(0,ty-5,1.5,0,Math.PI*2);ctx.fill();break;
    case'party':ctx.fillStyle='#ff6622';ctx.beginPath();ctx.moveTo(-8,ty+4);ctx.lineTo(0,ty-16);ctx.lineTo(8,ty+4);ctx.closePath();ctx.fill();['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff'].forEach((pc,i)=>{const a=i/5*Math.PI*2-Math.PI/2;ctx.fillStyle=pc;ctx.beginPath();ctx.arc(Math.cos(a)*14,ty-8+Math.sin(a)*4,2,0,Math.PI*2);ctx.fill();});break;
    case'horns':ctx.fillStyle='#cc2200';[[-7,ty+3],[7,ty+3]].forEach(([hx,hy])=>{ctx.beginPath();ctx.moveTo(hx-4,hy+2);ctx.lineTo(hx,hy-12);ctx.lineTo(hx+4,hy+2);ctx.closePath();ctx.fill();});break;
    case'bow':ctx.fillStyle='#ff44aa';[-1,1].forEach(s=>{ctx.save();ctx.translate(s*6,ty-2);ctx.beginPath();ctx.ellipse(0,0,7,4,s*.5,0,Math.PI*2);ctx.fill();ctx.restore();});ctx.fillStyle='#ff66cc';ctx.beginPath();ctx.arc(0,ty-2,3,0,Math.PI*2);ctx.fill();break;
  }
  ctx.restore();
}

function dk(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${~~(r*(1-a))},${~~(g*(1-a))},${~~(b*(1-a))})`;}
function lt(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${~~(r+(255-r)*a)},${~~(g+(255-g)*a)},${~~(b+(255-b)*a)})`;}
function h2rgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}

function drawPawTrails(){

function pickT(b){
  if(!b.alive)return;
  const r=ROOMS[Math.floor(Math.random()*ROOMS.length)];

}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

// ══ VISÃO: "olhinho" 👁️ — quem está sendo observado por um tripulante inocente ══
// raio acompanha a tela: a câmera centraliza o jogador, então a meia-diagonal da tela
// = ponto mais longe visível. Assim "se dá pra ver na tela, o gato está de olho".
let VIS=520; // recalculado em resizeGc()
function _updVis(){try{VIS=Math.round(Math.min(840,Math.max(460,Math.hypot(gc.width,gc.height)/2)));}catch(e){VIS=520;}}
function _losClear(ax,ay,bx,by){ // linha de visão sem parede no caminho
  const d=Math.hypot(bx-ax,by-ay),steps=Math.ceil(d/26);
  for(let i=1;i<steps;i++){const t=i/steps;if(!walkable(ax+(bx-ax)*t,ay+(by-ay)*t,2))return false;}
  return true;
}
function sees(o,target){ // 'o' (tripulante inocente vivo) consegue ver 'target'
  if(!o||!target||o===target)return false;
  if(!o.alive||o.ghost||o.isImp)return false; // impostor não testemunha; morto/fantasma não vê
  if(!target.alive||target.ghost)return false;
  if(dst(o,target)>=VIS)return false;
  return _losClear(o.x,o.y,target.x,target.y);
}
// quantos tripulantes inocentes vivos (exceto 'ignore') enxergam 'target'
function watchers(target,ignore){
  let n=0;for(const o of [G.player,...G.bots]){if(o===target||o===ignore)continue;if(sees(o,target))n++;}
  return n;
}
function watched(target,ignore){return watchers(target,ignore)>0;}

// ══ TESTEMUNHA → CORRIDA PRO BOTÃO ══
// Quem vê um assassinato corre pro 🚨. Testemunha sozinha denuncia o assassino;
// se vira turba (gente que encostou no caminho), rola sorteio pra ver quem sai.
function _startRush(wits,killer){
  if(!wits||!wits.length)return;
  G.rushKiller=killer.id;G.btnDone=false;
  wits.forEach(o=>{
    if(o.isPlayer)showNotif('👁️ Você viu o crime! Corra ao 🚨 e aperte pra denunciar '+killer.name+'!');
    else{o.toBtn=true;o.panic=true;}
  });
}
function _btnPressed(){ // um bot em pânico alcançou o botão
  const killerId=G.rushKiller;
  const crowd=G.bots.filter(b=>b.alive&&b.toBtn).length;
  if(crowd>=2)meeting('chaos','A turba',null);            // virou tumulto → sorteio
  else meeting('accuse','A testemunha',null,false,killerId); // testemunha sozinha → ejeta o assassino
}

function updBots(dt){
  if(G.phase!=='play')return;
  G.bots.forEach(b=>{
    if(!b.alive)return;
    if(G.phase!=='play')return; // reunião começou no meio do loop
    if(b.toBtn){ // 🏃 testemunha em pânico correndo pro botão de emergência
      b.tX=EMG.x;b.tY=EMG.y;
      G.bots.forEach(o=>{if(o!==b&&o.alive&&!o.toBtn&&o.id!==G.rushKiller&&dst(o,b)<28){o.toBtn=true;o.panic=true;}}); // quem encosta no caminho é arrastado junto
      if(!G.btnDone&&dst(b,EMG)<46){G.btnDone=true;_btnPressed();return;}
      const dx=EMG.x-b.x,dy=EMG.y-b.y,d=Math.hypot(dx,dy);
      if(d>5){const sp=b.spd*1.5,nx=b.x+dx/d*sp,ny=b.y+dy/d*sp;if(walkable(nx,b.y))b.x=nx;if(walkable(b.x,ny))b.y=ny;b.dir=dx>0?1:-1;b.walkPhase=(b.walkPhase||0)+.4;}
      return;
    }
    if(!b.isImp){const bd=G.bodies.find(bo=>!bo.reported&&dst(b,bo)<62);if(bd){bd.reported=true;showNotif('💀 '+b.name+' encontrou um corpo!');meeting('body',b.name,bd,true);return;}}
    if(b.isImp){
      b.killCD-=dt/60;
      b.sabT-=dt/60;
      if(b.sabT<=0&&!G.sabotage){startSabotage();b.sabT=40+Math.random()*30;}
      if(b.killCD<=0){const tgts=[G.player,...G.bots].filter(c=>c.alive&&!c.isImp&&c.id!==b.id&&dst(b,c)<52);if(tgts.length&&kill(tgts[0],b)){b.killCD=G.df.botKillCD;const vi=VENTS.findIndex(v=>dst(b,v)<130);if(vi>=0&&Math.random()<.5){const o=VENTS[(vi+1)%VENTS.length];b.x=o.x;b.y=o.y;_playVent();}pickT(b);return;}}
      if(b.killCD<2.5*G.df.huntR){const crew=[G.player,...G.bots].filter(c=>c.alive&&!c.isImp);if(crew.length){const nr=crew.sort((a,c)=>dst(b,a)-dst(b,c))[0];b.tX=nr.x;b.tY=nr.y;}}
    } else if(G.sabotage){
      // tripulantes correm pro painel de luz e consertam
      if(Math.random()<.012){b.tX=LPANEL.x+(Math.random()-.5)*30;b.tY=LPANEL.y+34+(Math.random()-.5)*20;b.timer=600;}
      if(dst(b,LPANEL)<60){G.sabFix+=dt/60;if(G.sabFix>=2.2)fixSabotage(b.name);}
    }
    b.timer-=dt;if(b.timer<=0)pickT(b);
    const spdMul=(!b.isImp&&G.sabotage)?.6:1;
    const dx=b.tX-b.x,dy=b.tY-b.y,d=Math.hypot(dx,dy);
    if(d>5){const nx=b.x+dx/d*b.spd*spdMul,ny=b.y+dy/d*b.spd*spdMul;if(walkable(nx,b.y))b.x=nx;if(walkable(b.x,ny))b.y=ny;b.dir=dx>0?1:-1;const bwp=(b.walkPhase||0)+.3;b.walkPhase=bwp;if(Math.floor(bwp*2)%7===0){const s=Math.cos(bwp)>0?1:-1;_spawnPaw(b.x+s*7,b.y+10,b.dir,b.color,s);}}else b.walkPhase=0;
  });
}

function _playDeath(isPlayer){
  try{
    const ac=getAC();
    const master=ac.createGain();master.gain.value=0.7;master.connect(ac.destination);

    // grito: voz sintética descendo em pitch
    const screamDur=0.7+Math.random()*0.3;
    const osc=ac.createOscillator();osc.type='sawtooth';
    osc.frequency.setValueAtTime(isPlayer?680:520,ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80,ac.currentTime+screamDur);
    // vibrato de pânico
    const vib=ac.createOscillator();vib.frequency.value=18;
    const vibG=ac.createGain();vibG.gain.value=40;
    vib.connect(vibG);vibG.connect(osc.frequency);
    // formant para soar vocal
    const f1=ac.createBiquadFilter();f1.type='bandpass';f1.frequency.value=900;f1.Q.value=2;
    const f2=ac.createBiquadFilter();f2.type='bandpass';f2.frequency.value=2200;f2.Q.value=3;
    const gS=ac.createGain();
    gS.gain.setValueAtTime(0,ac.currentTime);
    gS.gain.linearRampToValueAtTime(0.55,ac.currentTime+0.04);
    gS.gain.setValueAtTime(0.5,ac.currentTime+screamDur*0.4);
    gS.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+screamDur);
    osc.connect(f1);f1.connect(f2);f2.connect(gS);gS.connect(master);
    vib.start();osc.start();
    osc.stop(ac.currentTime+screamDur);vib.stop(ac.currentTime+screamDur);

    // baque de corpo caindo
    const thudDur=0.18;
    const tbuf=ac.createBuffer(1,Math.ceil(ac.sampleRate*thudDur),ac.sampleRate);
    const td=tbuf.getChannelData(0);
    for(let i=0;i<td.length;i++){
      const t2=i/ac.sampleRate;
      td[i]=(Math.random()*2-1)*Math.pow(1-t2/thudDur,3);
    }
    const tSrc=ac.createBufferSource();tSrc.buffer=tbuf;
    const tlp=ac.createBiquadFilter();tlp.type='lowpass';tlp.frequency.value=180;tlp.Q.value=2;
    const tg=ac.createGain();tg.gain.value=0.9;
    tSrc.connect(tlp);tlp.connect(tg);tg.connect(master);
    tSrc.start(ac.currentTime+screamDur*0.6);
  }catch(e){}
}

function ejectAnim(t){
  const ec=document.getElementById('eject-c');
  ec.width=innerWidth; ec.height=innerHeight;
  ec.style.display='block';
  const ex=ec.getContext('2d');

  // Gera estrelas fixas + estrelas de velocidade
  const stars=Array.from({length:180},()=>({
    x:Math.random()*innerWidth, y:Math.random()*innerHeight,
    r:Math.random()*1.6+.3, a:Math.random()*.7+.3,
    spd:Math.random()*1.2+.2
  }));

  // Gato começa fora da tela esquerda, voa até sair pela direita
  const catY=innerHeight*.42+( Math.random()-.5)*60;
  const scale=3.5;
  let catX=-80;
  const vx=innerWidth/110; // atravessa em ~110 frames (~1.8s)
  let rot=0; let frame=0; let alpha=1;

  function drawFrame(){
    ex.clearRect(0,0,ec.width,ec.height);

    // Fundo negro
    ex.fillStyle='#020408';
    ex.fillRect(0,0,ec.width,ec.height);

    // Estrelas se movendo (parallax simples)
    stars.forEach(s=>{
      s.x-=s.spd;
      if(s.x<0)s.x=ec.width;
      ex.beginPath();ex.arc(s.x,s.y,s.r,0,Math.PI*2);
      ex.fillStyle=`rgba(255,255,255,${s.a})`;ex.fill();
    });

    // Rastro de luz atrás do gato
    const grad=ex.createLinearGradient(catX-120,catY,catX,catY);
    grad.addColorStop(0,'rgba(255,255,255,0)');
    grad.addColorStop(1,'rgba(255,255,255,0.12)');
    ex.fillStyle=grad;ex.fillRect(catX-140,catY-18*scale*.5,140,18*scale*.5);

    // Texto
    ex.globalAlpha=alpha;
    ex.font=`bold ${innerWidth<500?16:20}px Arial`;
    ex.textAlign='center';ex.fillStyle='#aabbcc';
    ex.fillText(`${t.name} foi expulso...`,ec.width/2,ec.height*.78);
    ex.font=`${innerWidth<500?13:16}px Arial`;
    ex.fillStyle=t.isImp?'#ff6688':'#88aaff';
    ex.fillText(t.isImp?'Era o IMPOSTOR 😈':'Era inocente 😢',ec.width/2,ec.height*.78+30);

    // Gato grande girando
    ex.save();
    ex.translate(catX,catY);
    ex.rotate(rot);
    drawCat(ex,0,0,{color:t.color,eye:t.eye,hat:t.hat,pattern:t.pattern,acc:t.acc,name:'',dir:1,scale});
    ex.restore();
    ex.globalAlpha=1;

    catX+=vx; rot+=0.04; frame++;

    // Fade out nos últimos 30 frames após sair da tela
    if(catX>ec.width+80){
      alpha=Math.max(0,alpha-0.045);
      if(alpha<=0){ec.style.display='none';return;}
    }
    requestAnimationFrame(drawFrame);
  }
  drawFrame();
}

let _stepLast=0,_stepSide=0;
function _playStep(){
  try{
    const now=Date.now();
    if(now-_stepLast<210)return;
    _stepLast=now;_stepSide^=1;
    const ac=getAC();
    const dur=0.055;
    const buf=ac.createBuffer(1,Math.ceil(ac.sampleRate*dur),ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const t=i/ac.sampleRate;
      d[i]=(Math.random()*2-1)*Math.pow(1-t/dur,2.5);
    }
    const src=ac.createBufferSource();src.buffer=buf;
    const lp=ac.createBiquadFilter();lp.type='lowpass';
    lp.frequency.value=_stepSide?380:320;
    lp.Q.value=1.2;
    const g=ac.createGain();g.gain.value=0.28;
    src.connect(lp);lp.connect(g);g.connect(ac.destination);
    src.start();src.stop(ac.currentTime+dur);
  }catch(e){}
}

function updPlayer(dt){
  if(G.phase!=='play')return;
  if(G.inHatch!=null)return;             // travado dentro do alçapão (menu aberto)
  const p=G.player;if(!p.alive&&!p.ghost)return;
  const ghost=!p.alive;
  let vx=0,vy=0;
  if(keys.ArrowLeft||keys.KeyA)vx=-1;if(keys.ArrowRight||keys.KeyD)vx=1;
  if(keys.ArrowUp||keys.KeyW)vy=-1;if(keys.ArrowDown||keys.KeyS)vy=1;
  if(_jvx||_jvy){vx=_jvx;vy=_jvy;}
  if(vx&&vy){vx*=.707;vy*=.707;}
  const spd=p.spd*(ghost?1.1:1);
  const nx=p.x+vx*spd,ny=p.y+vy*spd;
  if(ghost){
    // fantasma atravessa paredes (sem passos, sem patinhas)
    if(vx)p.x=Math.max(20,Math.min(WW-20,nx));
    if(vy)p.y=Math.max(20,Math.min(WH-20,ny));
    if(vx||vy)p.walkPhase=(p.walkPhase||0)+.22;else p.walkPhase=0;
  } else {
    const moved=(vx&&walkable(nx,p.y))||(vy&&walkable(p.x,ny));
    if(vx&&walkable(nx,p.y))p.x=nx;if(vy&&walkable(p.x,ny))p.y=ny;
    if(moved){_playStep();const wp=(p.walkPhase||0)+.32;p.walkPhase=wp;if(Math.floor(wp/.32)!==Math.floor((wp-.32)/.32)&&Math.floor(wp*2)%6===0){const side=Math.cos(wp)>0?1:-1;_spawnPaw(p.x+side*7,p.y+10,p.dir,p.color,side);}}else p.walkPhase=0;
  }
  if(vx)p.dir=vx>0?1:-1;
  if(p.isImp&&p.killCD>0)p.killCD-=dt/60;
  if(p.isImp&&G.sabCD>0)G.sabCD-=dt/60;
  camX=Math.max(0,Math.min(p.x-gc.width/2,WW-gc.width));
  camY=Math.max(0,Math.min(p.y-gc.height/2,WH-gc.height));
  updUseBtn();
}

function updUseBtn(){
